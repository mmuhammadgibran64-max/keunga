<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard | Gibran Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --purple: #7c3aed; --bg: #0f0a19; --card: #1a1425; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; padding: 20px; padding-bottom: 100px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 10px; }
        
        /* Button Style */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .btn-print { background: var(--purple); color: white; }
        .btn-dl { background: #2d243d; color: white; border: 1px solid #4c1d95; }

        /* Stat Cards */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #2d243d; }
        .stat-card h2 { font-size: 24px; margin: 10px 0 0; color: #a78bfa; }

        /* Chart Section */
        .chart-box { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #2d243d; margin-bottom: 20px; }

        /* Table Section */
        .section-title { font-size: 16px; font-weight: 800; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        .table-wrapper { background: var(--card); border-radius: 20px; border: 1px solid #2d243d; overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #150e21; padding: 15px; text-align: left; color: var(--text-muted); }
        td { padding: 15px; border-top: 1px solid #251b36; }

        /* Badge & Image */
        .badge { padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 10px; }
        .bg-purple { background: rgba(124, 58, 237, 0.1); color: #a78bfa; }
        .img-ttd { width: 45px; height: 25px; background: white; border-radius: 4px; object-fit: contain; }

        /* Navigation Bawah */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #150e21; display: flex; border-top: 1px solid #251b36; padding: 15px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #4b5563; text-decoration: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--purple); }
        .nav-item b { display: block; font-size: 20px; }

        /* Print Mode */
        @media print { .btn-group, .nav { display: none; } body { background: white; color: black; } .stat-card, .chart-box, .table-wrapper { border: 1px solid #ddd; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="font-size: 22px; margin: 0;">Analytics <span style="color:var(--purple)">Pro</span></h1>
        <p style="font-size: 11px; color: var(--text-muted); margin: 5px 0 0;">Monitoring Dua Database Aktif</p>
    </div>
    <div class="btn-group">
        <button class="btn btn-print" onclick="window.print()">🖨️ Print</button>
        <button class="btn btn-dl" onclick="exportData()">📥 Export</button>
    </div>
</div>

<div class="grid-stats">
    <div class="stat-card">
        <small style="color:var(--text-muted)">TOTAL SETORAN</small>
        <h2 id="total-setoran">Rp 0</h2>
    </div>
    <div class="stat-card">
        <small style="color:var(--text-muted)">ITEM GUDANG</small>
        <h2 id="total-item">0 Items</h2>
    </div>
</div>

<div class="chart-box">
    <p style="font-size: 13px; font-weight: 800; margin-bottom: 15px;">PERFORMANCE TRENDS</p>
    <canvas id="mainChart" style="height: 180px;"></canvas>
</div>

<div class="section-title">💰 Aktivitas Keuangan (DB 1)</div>
<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>NAMA</th>
                <th>TARGET</th>
                <th>NOMINAL</th>
                <th>TTD</th>
            </tr>
        </thead>
        <tbody id="table-keuangan"></tbody>
    </table>
</div>

<div class="section-title">📦 Inventaris Gudang (DB 2)</div>
<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>BARANG</th>
                <th>TYPE</th>
                <th>STOK</th>
                <th>STATUS</th>
            </tr>
        </thead>
        <tbody id="table-gudang"></tbody>
    </table>
</div>

<nav class="nav">
    <a href="#" class="nav-item active"><b>🏠</b>Home</a>
    <a href="#" class="nav-item"><b>💰</b>Setoran</a>
    <a href="#" class="nav-item"><b>📄</b>Laporan</a>
    <a href="#" class="nav-item"><b>📦</b>Gudang</a>
    <a href="#" class="nav-item"><b>⚙️</b>Settings</a>
</nav>

<script>
    // CONFIG 1: TEMPAT MASUK DATA
    const conf1 = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const app1 = firebase.initializeApp(conf1, "app1");
    const db1 = firebase.database(app1);

    // CONFIG 2: GUDANG BARANG
    const conf2 = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const app2 = firebase.initializeApp(conf2, "app2");
    const db2 = firebase.database(app2);

    // 1. Ambil Data Keuangan
    db1.ref('db_gibran/setoran').on('value', snap => {
        const list = document.getElementById('table-keuangan');
        list.innerHTML = "";
        let total = 0;
        snap.forEach(c => {
            const d = c.val();
            total += Number(d.nominal || 0);
            list.innerHTML += `<tr>
                <td><b>${d.nama}</b></td>
                <td><span class="badge bg-purple">${d.target}</span></td>
                <td>Rp ${Number(d.nominal).toLocaleString()}</td>
                <td><img src="${d.ttd}" class="img-ttd"></td>
            </tr>`;
        });
        document.getElementById('total-setoran').innerText = "Rp " + total.toLocaleString();
    });

    // 2. Ambil Data Gudang
    db2.ref('stok_gudang').on('value', snap => {
        const list = document.getElementById('table-gudang');
        list.innerHTML = "";
        document.getElementById('total-item').innerText = snap.numChildren() + " Items";
        snap.forEach(c => {
            const d = c.val();
            list.innerHTML += `<tr>
                <td><b>${d.nama}</b></td>
                <td>${d.jenis} / ${d.tipe}</td>
                <td>${d.stok} Qty</td>
                <td><span class="badge bg-purple">Active</span></td>
            </tr>`;
        });
    });

    // 3. Setup Chart (Bar)
    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],
            datasets: [{ data: [10, 25, 15, 30, 20, 45, 35], backgroundColor: '#7c3aed', borderRadius: 6 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
    });

    // 4. Fitur Export ke File Manager
    function exportData() {
        const data = { report_date: new Date().toLocaleString(), status: "Success" };
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Laporan_GibranHub.json';
        a.click();
    }
</script>
</body>
</html>
