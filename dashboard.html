<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v13.5 | ULTIMATE FIREBASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--neon); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; text-shadow: 0 0 10px var(--neon); }
        .nav-btn { background: transparent; border: 1px solid rgba(0,210,255,0.2); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-align: left; border-radius: 4px; transition: 0.3s; outline: none; }
        .nav-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); font-weight: bold; }
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top, #0a111a 0%, #05070a 100%); }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.15); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.75rem; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 10px; text-transform: uppercase; }
        label { display: block; font-size: 10px; color: var(--neon); font-family: 'Orbitron'; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; margin-bottom: 10px; font-size: 13px; outline: none; box-sizing: border-box; font-family: 'Rajdhani'; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-action:hover { box-shadow: 0 0 20px var(--neon); }
        .calc-display { background: #000; padding: 15px; text-align: right; border: 1px solid var(--neon); color: var(--neon-green); font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 10px; border-radius: 5px; min-height: 40px; }
        #video { width: 100%; height: 220px; background: #000; border: 2px solid var(--neon); border-radius: 8px; display: none; transform: scaleX(-1); margin-bottom: 10px; object-fit: cover; }
        .status-bar { position: fixed; bottom: 10px; right: 20px; font-size: 9px; color: var(--neon-green); font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="loader"><h2 style="font-family: Orbitron; color: var(--neon);">SYSTEM_BOOTING...</h2></div>

    <div class="wrapper">
        <nav>
            <div class="logo">GIBRAN_HUB</div>
            <button class="nav-btn active" onclick="show('main-hub', this)">● DASHBOARD</button>
            <button class="nav-btn" onclick="show('warehouse', this)">● GUDANG BARANG</button>
            <button class="nav-btn" onclick="show('sales', this)">● PENJUALAN & ABSEN</button>
            <button class="nav-btn" onclick="show('settings', this)">● PENGATURAN</button>
        </nav>

        <main>
            <div id="main-hub" class="section active">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    <div class="card">
                        <div class="card-h">FORM LAPORAN & SETORAN</div>
                        <label>JENIS</label>
                        <select id="lap-jenis"><option>LAPORAN UMUM</option><option>SETORAN BU TATI</option></select>
                        <label>NAMA</label><input type="text" id="lap-nama" placeholder="Input nama...">
                        <label>CATATAN</label><textarea id="lap-catatan" rows="3" placeholder="Isi laporan..."></textarea>
                        <button class="btn-action" onclick="kirimKeFirebase('laporan', {jenis: val('lap-jenis'), nama: val('lap-nama'), note: val('lap-catatan')})">KIRIM KE CLOUD</button>
                    </div>
                    <div class="card">
                        <div class="card-h">CLOUD NOTES (AUTO-SAVE)</div>
                        <textarea id="catatan-cloud" rows="5" placeholder="Tulis di sini..."></textarea>
                        <div class="calc-display" id="calc-val">0</div>
                        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                            <button class="nav-btn" onclick="calc('7')">7</button><button class="nav-btn" onclick="calc('8')">8</button><button class="nav-btn" onclick="calc('9')">9</button><button class="nav-btn" onclick="calc('/')">/</button>
                            <button class="nav-btn" onclick="calc('C')">C</button><button class="nav-btn" onclick="calc('0')">0</button><button class="nav-btn" onclick="calc('=')">=</button><button class="nav-btn" onclick="calc('+')">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="warehouse" class="section">
                <div class="card">
                    <div class="card-h">UPDATE STOK GUDANG</div>
                    <label>NAMA BARANG</label><input type="text" id="gd-nama">
                    <label>JUMLAH STOK</label><input type="number" id="gd-stok">
                    <button class="btn-action" onclick="kirimKeFirebase('gudang', {barang: val('gd-nama'), stok: val('gd-stok')})">UPDATE KE FIREBASE</button>
                </div>
            </div>

            <div id="sales" class="section">
                <div class="card">
                    <div class="card-h">PENJUALAN & ABSENSI</div>
                    <div id="step-1">
                        <label>NAMA PENJUAL</label><input type="text" id="sl-nama">
                        <label>JAM</label><input type="time" id="sl-jam">
                        <button class="btn-action" onclick="nextStep(2)">LANJUT</button>
                    </div>
                    <div id="step-2" style="display:none;">
                        <label>DETAIL LAKU</label><textarea id="sl-laku" rows="3" placeholder="Contoh: 5 Cup, 2 Cone..."></textarea>
                        <button class="btn-action" onclick="nextStep(3)">LANJUT KE ABSEN</button>
                    </div>
                    <div id="step-3" style="display:none;">
                        <video id="video" autoplay playsinline></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                        <button class="btn-action" id="btn-cam" onclick="startCamera()">BUKA KAMERA</button>
                        <button class="btn-action" id="btn-snap" style="display:none; background:var(--neon-green)" onclick="takeSnapshot()">AMBIL FOTO</button>
                    </div>
                    <div id="step-4" style="display:none;">
                        <label>TOTAL PENGHASILAN (RP)</label><input type="number" id="sl-duit">
                        <button class="btn-action" style="background:var(--neon-green); color:black;" onclick="finishSales()">KIRIM SEMUA</button>
                    </div>
                </div>
            </div>

            <div id="settings" class="section">
                <div class="card" style="text-align:center">
                    <div class="card-h">SYSTEM CONTROL</div>
                    <button class="btn-action" style="background:var(--neon-red); color:white" onclick="location.reload()">REBOOT HUB</button>
                </div>
            </div>
        </main>
    </div>

    <div class="status-bar" id="sync-status">FIREBASE: CONNECTED</div>

    <script>
        // 1. CONFIG FIREBASE
        const firebaseConfig = { databaseURL: "https://catatan-ac4a2-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let capturedImage = "";

        // 2. FUNGSI KIRIM DATA
        function kirimKeFirebase(folder, dataObj) {
            document.getElementById('loader').style.display = 'flex';
            dataObj.waktu = new Date().toLocaleString();
            db.ref('gibran_hub/' + folder).push(dataObj)
            .then(() => { alert("DATA TERSIMPAN!"); location.reload(); })
            .catch(() => { alert("ERROR!"); document.getElementById('loader').style.display='none'; });
        }

        // 3. AUTO-SAVE CATATAN
        const noteRef = db.ref('gibran_hub/catatan_live');
        noteRef.on('value', (s) => { if(s.val()) document.getElementById('catatan-cloud').value = s.val().teks; });
        document.getElementById('catatan-cloud').addEventListener('input', (e) => {
            noteRef.set({ teks: e.target.value, updated: new Date().toLocaleTimeString() });
            document.getElementById('sync-status').innerText = "FIREBASE: SYNCING...";
            setTimeout(() => document.getElementById('sync-status').innerText = "FIREBASE: CONNECTED", 1000);
        });

        // 4. LOGIKA SALES & KAMERA
        function nextStep(n) {
            for(let i=1; i<=4; i++) document.getElementById('step-'+i).style.display = 'none';
            document.getElementById('step-'+n).style.display = 'block';
        }

        async function startCamera() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            document.getElementById('btn-cam').style.display = 'none';
            document.getElementById('btn-snap').style.display = 'block';
        }

        function takeSnapshot() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            capturedImage = canvas.toDataURL('image/jpeg', 0.5);
            video.srcObject.getTracks().forEach(t => t.stop());
            nextStep(4);
        }

        function finishSales() {
            kirimKeFirebase('sales_dan_absen', {
                nama: val('sl-nama'), jam: val('sl-jam'), laku: val('sl-laku'), duit: val('sl-duit'), foto: capturedImage
            });
        }

        // 5. HELPERS
        function val(id) { return document.getElementById(id).value; }
        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        let curIn = "";
        function calc(v) {
            const d = document.getElementById('calc-val');
            if(v==='C'){curIn=""; d.innerText="0";}
            else if(v==='='){try{curIn=eval(curIn).toString(); d.innerText=curIn;}catch{d.innerText="ERR";}}
            else{curIn+=v; d.innerText=curIn;}
        }
        window.onload = () => setTimeout(() => document.getElementById('loader').style.display='none', 1000);
    </script>
</body>
</html>
