<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | SESUAI DESAIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #3b82f6; --dark: #0f172a; --bg: #f8fafc; --purple: #6d28d9; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 100px; }
        
        header { background: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f1f5f9; position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 15px; font-weight: 800; margin: 0; font-family: 'Orbitron'; }

        main { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        /* STYLE INPUT SESUAI SCREEN 4 & 5 */
        label { display: block; font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        .input-pro { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #f1f5f9; background: #f8fafc; font-family: inherit; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; font-weight: 700; }
        
        /* KOTAK INPUT KHUSUS (Screen 4) */
        .stat-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-box { background: #eff6ff; padding: 12px; border-radius: 14px; border: 1px solid #dbeafe; }
        .stat-box span { font-size: 10px; font-weight: 800; color: var(--blue); display: block; margin-bottom: 4px; }
        .stat-box input { border: none; background: transparent; font-size: 18px; font-weight: 800; width: 100%; outline: none; color: var(--dark); }

        /* PILIHAN PENERIMA (Screen 6) */
        .penerima-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .penerima-item { padding: 15px; border-radius: 12px; border: 2px solid #f1f5f9; text-align: center; cursor: pointer; font-weight: 800; background: #f8fafc; transition: 0.3s; }
        .penerima-item.active { border-color: var(--purple); background: #f5f3ff; color: var(--purple); }

        /* LABA BOX (Screen 4 Bottom) */
        .laba-card { background: var(--dark); color: white; border-radius: 24px; padding: 25px; margin-top: 10px; }
        .laba-card h2 { font-family: 'Orbitron'; font-size: 30px; margin: 10px 0; color: #4ade80; }
        .laba-grid { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-top: 15px; }

        /* NAVIGASI BAWAH */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #f1f5f9; z-index: 1000; }
        .nav-item { text-align: center; cursor: pointer; color: #cbd5e1; font-size: 10px; font-weight: 800; flex: 1; }
        .nav-item.active { color: var(--blue); }

        .btn-kirim { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--purple); color: white; font-weight: 800; font-size: 16px; cursor: pointer; }
        .hidden { display: none; }
        canvas { border: 2px dashed #e2e8f0; border-radius: 16px; width: 100%; height: 140px; background: #fcfcfc; }
    </style>
</head>
<body>

<header>
    <button style="border:none; background:none; font-size:20px;">←</button>
    <h3 class="header-title" id="page-title">PENGATURAN</h3>
    <span style="color:var(--blue); font-size:22px;">🔔</span>
</header>

<main>
    <div id="page-pengaturan" class="content-page">
        <div class="card" style="text-align:center;">
            <div style="width:60px; height:60px; border-radius:50%; background:#f1f5f9; margin:0 auto 10px; border:2px solid var(--blue);"></div>
            <h4 style="margin:0;">Gibran Hub</h4>
            <p style="font-size:12px; color:#888;">Manajemen Bisnis Terpadu</p>
        </div>

        <label>🏠 Manajemen Operasional</label>
        <div class="card">
            <label>Pemasukan Produk (Bks)</label>
            <div class="stat-input-grid">
                <div class="stat-box"><span>PEYEK</span><input type="number" id="ops-peyek" value="0"></div>
                <div class="stat-box"><span>SLONDOK</span><input type="number" id="ops-slondok" value="0"></div>
            </div>
            
            <label>Metode Pembayaran</label>
            <select id="ops-metode" class="input-pro">
                <option>Cash / Tunai</option>
                <option>Transfer</option>
            </select>

            <label>Biaya & Beban</label>
            <div style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px;">
                <button style="padding:10px 15px; border-radius:10px; border:1px solid #eee; background:white; font-size:12px; font-weight:700;">🔥 LPG</button>
                <button style="padding:10px 15px; border-radius:10px; border:1px solid #eee; background:white; font-size:12px; font-weight:700;">⚡ Listrik</button>
                <button style="padding:10px 15px; border-radius:10px; border:1px solid #eee; background:white; font-size:12px; font-weight:700;">⛽ Bensin</button>
            </div>
        </div>
    </div>

    <div id="page-setoran" class="content-page hidden">
        <div class="card">
            <label>Unggah Nota / Bukti</label>
            <div style="border:2px dashed var(--purple); padding:25px; border-radius:15px; text-align:center; background:#f5f3ff; margin-bottom:15px;">
                <span style="font-size:24px;">📸</span><br>
                <label style="color:var(--purple); margin:0;">Pilih Gambar</label>
                <input type="file" style="opacity:0; position:absolute; left:0; width:100%; height:50px; cursor:pointer;">
            </div>

            <label>Nama Penyetor</label>
            <input type="text" id="s-nama" class="input-pro" placeholder="Masukkan nama Anda">
            
            <label>Setor Ke Siapa</label>
            <div class="penerima-grid">
                <div class="penerima-item active" onclick="selUser(this, 'Bu Tati')">Bu Tati</div>
                <div class="penerima-item" onclick="selUser(this, 'Bu Ami')">Bu Ami</div>
            </div>

            <label>Jumlah Setoran (Rp)</label>
            <input type="number" id="s-nominal" class="input-pro" placeholder="0">

            <label>Konfirmasi Tanda Tangan</label>
            <canvas id="canvas-sig"></canvas>
            <p style="text-align:right; color:red; font-size:11px; cursor:pointer; font-weight:800;" onclick="clearTTD()">HAPUS</p>
        </div>
        <button class="btn-kirim" onclick="saveSetoran()">KIRIM SEKARANG ➔</button>
    </div>

    <div id="page-dashboard" class="content-page hidden">
        <div class="laba-card">
            <p style="font-size:11px; opacity:0.7; margin:0;">ESTIMASI LABA BERSIH</p>
            <h2 id="disp-laba">Rp 0</h2>
            <div class="laba-grid">
                <div><label style="color:#94a3b8;">PENJUALAN</label><p id="disp-jual" style="margin:0; font-weight:800;">Rp 0</p></div>
                <div><label style="color:#94a3b8;">BEBAN</label><p id="disp-beban" style="margin:0; font-weight:800;">Rp 0</p></div>
            </div>
        </div>

        <div class="card" style="margin-top:20px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <b style="font-size:14px;">📦 Dana Cadangan</b>
                <span style="color:var(--blue); font-size:12px; font-weight:800;">0% Target</span>
            </div>
            <div style="width:100%; height:10px; background:#f1f5f9; border-radius:20px; overflow:hidden;">
                <div style="width:0%; height:100%; background:var(--blue);"></div>
            </div>
            <p style="font-size:10px; color:#94a3b8; margin-top:8px;">*Estimasi stok bahan baku bulan depan</p>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <div class="nav-item" onclick="show('page-dashboard', this)"><i>🏠</i>BERANDA</div>
    <div class="nav-item" onclick="show('page-setoran', this)"><i>📝</i>SETORAN</div>
    <div class="nav-item active" onclick="show('page-pengaturan', this)"><i>⚙️</i>SETTING</div>
</nav>

<script>
    // FIREBASE CONFIG SESUAI MILIK USER
    const firebaseConfig = {
      apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
      databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let recPenerima = "Bu Tati";

    function show(id, el) {
        document.querySelectorAll('.content-page').forEach(p => p.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('page-title').innerText = id.replace('page-', '').toUpperCase();
    }

    function selUser(el, name) {
        document.querySelectorAll('.penerima-item').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        recPenerima = name;
    }

    // TTD CANVAS
    const canvas = document.getElementById('canvas-sig');
    const ctx = canvas.getContext('2d');
    let sign = false;
    canvas.width = canvas.offsetWidth; canvas.height = 140;
    canvas.addEventListener('mousedown', () => sign = true);
    canvas.addEventListener('mousemove', (e) => {
        if(!sign) return;
        const r = canvas.getBoundingClientRect();
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
        ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
    });
    canvas.addEventListener('mouseup', () => { sign = false; ctx.beginPath(); });
    function clearTTD() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.beginPath(); }

    async function saveSetoran() {
        const payload = {
            nama: document.getElementById('s-nama').value,
            nominal: document.getElementById('s-nominal').value,
            penerima: recPenerima,
            ttd: canvas.toDataURL(),
            time: Date.now()
        };
        await db.ref('setoran_final').push(payload);
        alert("✅ Berhasil dikirim ke " + recPenerima);
    }
</script>
</body>
</html>
