<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Setoran - Gibran Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --purple: #8b5cf6; --dark-bg: #0f0a19; --card-bg: #1a1425; --text: #ffffff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark-bg); color: var(--text); padding-bottom: 100px; }
        
        /* Header Screen 6 */
        .header { display: flex; align-items: center; padding: 20px; background: #150e21; border-bottom: 1px solid #251b36; position: sticky; top: 0; z-index: 100; }
        .header .back-btn { font-size: 20px; cursor: pointer; }
        .header h3 { flex: 1; text-align: center; margin: 0; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .title-large { color: #c084fc; font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }

        /* Form Style */
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #cbd5e1; }
        .upload-card { border: 2px dashed #4c1d95; border-radius: 20px; padding: 40px 20px; text-align: center; background: rgba(139, 92, 246, 0.05); margin-bottom: 25px; cursor: pointer; }
        
        .input-pro { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #2d243d; background: #1a1425; color: white; font-family: inherit; box-sizing: border-box; font-size: 14px; margin-bottom: 20px; outline: none; }
        .input-pro:focus { border-color: var(--purple); }

        /* Canvas TTD */
        .canvas-container { background: #1a1425; border-radius: 18px; border: 1.5px solid #2d243d; margin-bottom: 10px; position: relative; overflow: hidden; }
        #canvas { width: 100%; height: 180px; touch-action: none; cursor: crosshair; }
        .clear-btn { text-align: right; color: #f43f5e; font-size: 12px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }

        /* Button Utama */
        .btn-send { width: 100%; padding: 18px; border-radius: 16px; border: none; background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-send:active { transform: scale(0.98); }

        /* NAVIGASI BAWAH (Screen 9 Style) - TERHUBUNG KE GITHUB */
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #150e21; display: flex; border-top: 1px solid #251b36; padding: 15px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; text-decoration: none; color: #4b5563; transition: 0.3s; }
        .nav-item.active { color: #a78bfa; }
        .nav-item b { display: block; font-size: 22px; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="header">
    <div class="back-btn" onclick="history.back()">←</div>
    <h3>Kirim Setoran</h3>
    <div style="font-size: 18px;">🔔</div>
</header>

<div class="container">
    <h1 class="title-large">Unggah Setoran</h1>
    <p class="subtitle">Pastikan data nominal dan target sudah benar.</p>

    <div class="upload-card" onclick="alert('Fitur Upload File Aktif')">
        <span style="font-size: 40px; display: block; margin-bottom: 10px;">📸</span>
        <span style="font-weight: 700; font-size: 14px;">Klik untuk Unggah Bukti</span>
        <p style="font-size: 11px; color: #94a3b8; margin: 5px 0 0;">Format JPG, PNG, atau PDF</p>
    </div>

    <label>Nama Penyetor</label>
    <input type="text" id="s-nama" class="input-pro" placeholder="Masukkan nama lengkap">

    <label>Nominal Setoran (Rp)</label>
    <input type="number" id="s-nominal" class="input-pro" placeholder="Contoh: 500000">

    <label>Target Setoran</label>
    <select id="s-target" class="input-pro">
        <option value="Bu Tati">Setor ke Bu Tati</option>
        <option value="Bu Ami">Setor ke Bu Ami</option>
    </select>

    <label>Tanda Tangan Digital</label>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <div class="clear-btn" onclick="clearSign()">HAPUS TANDA TANGAN</div>

    <button class="btn-send" onclick="sendData()">KIRIM DATA SEKARANG ➔</button>
</div>

<nav class="nav-bottom">
    <a href="https://mmuhammadgibran64-max.github.io/keunga/dashboard.html" class="nav-item">
        <b>🏠</b><span>Home</span>
    </a>
    <a href="#" class="nav-item active">
        <b>💰</b><span>Setoran</span>
    </a>
    <a href="#" class="nav-item">
        <b>📄</b><span>Laporan</span>
    </a>
    <a href="#" class="nav-item">
        <b>📦</b><span>Gudang</span>
    </a>
    <a href="#" class="nav-item">
        <b>⚙️</b><span>Settings</span>
    </a>
</nav>

<script>
    // CONFIG FIREBASE LO
    const firebaseConfig = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com"
    };

    // Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Logika Canvas Tanda Tangan
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = 180;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) { drawing = true; draw(e); }
    function end() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#c084fc';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', end);

    function clearSign() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
    }

    // Fungsi Kirim ke Firebase
    async function sendData() {
        const nama = document.getElementById('s-nama').value;
        const nominal = document.getElementById('s-nominal').value;
        const target = document.getElementById('s-target').value;
        const ttd = canvas.toDataURL();

        if(!nama || !nominal) return alert("Isi nama dan nominal dulu, Bro!");

        const payload = {
            nama: nama,
            nominal: nominal,
            target: target,
            ttd: ttd,
            timestamp: Date.now()
        };

        try {
            // Masuk ke folder db_gibran/setoran supaya kebaca di Dashboard GitHub
            await db.ref('db_gibran/setoran').push(payload);
            alert("🚀 Data Berhasil Terkirim ke Dashboard!");
            location.reload(); 
        } catch (error) {
            alert("Gagal Kirim: " + error.message);
        }
    }
</script>
</body>
</html>
