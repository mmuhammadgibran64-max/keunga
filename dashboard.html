<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Bukti dan Laporan</title>
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set } from "firebase/database"; 
        import { getStorage, ref as storageRef, uploadBytes } from "firebase/storage"; 

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
            authDomain: "tempat-masuk-nya-data.firebaseapp.com",
            databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
            projectId: "tempat-masuk-nya-data",
            storageBucket: "tempat-masuk-nya-data.appspot.com",
            messagingSenderId: "918742049565",
            appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4",
            measurementId: "G-C0EBFBVVVJ"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const storage = getStorage(app);

        // Function to upload bukti setor
        window.uploadBuktiSetor = function(nama, tanggal, file) {
            const storageReference = storageRef(storage, 'bukti_setor/' + file.name);
            uploadBytes(storageReference, file).then((snapshot) => {
                console.log("Bukti setor berhasil diunggah!");

                snapshot.ref.getDownloadURL().then((downloadURL) => {
                    const data = {
                        nama: nama,
                        tanggal: tanggal,
                        fileUrl: downloadURL
                    };

                    set(ref(database, 'bukti_setor/' + nama), data)
                        .then(() => {
                            console.log("Data bukti setor berhasil disimpan!");
                        })
                        .catch((error) => {
                            console.error("Error menyimpan data: ", error);
                        });
                });
            }).catch((error) => {
                console.error("Error mengupload bukti setor: ", error);
            });
        };

        // Function to submit laporan
        window.submitLaporan = function(namaPenerima, tanggalLapor, laporan) {
            const data = {
                nama: namaPenerima,
                tanggal: tanggalLapor,
                laporan: laporan
            };
            
            set(ref(database, 'laporan/' + namaPenerima), data)
                .then(() => {
                    console.log("Laporan berhasil dikirim!");
                })
                .catch((error) => {
                    console.error("Error mengirim laporan: ", error);
                });
        };

        // Handle upload bukti
        window.handleUploadBukti = function() {
            const nama = document.getElementById('namaSetor').value;
            const tanggal = document.getElementById('tanggalSetor').value;
            const file = document.getElementById('fileBukti').files[0];
            uploadBuktiSetor(nama, tanggal, file);
        };

        // Handle submit laporan
        window.handleSubmitLaporan = function() {
            const nama = document.getElementById('namaPelapor').value;
            const tanggal = document.getElementById('tanggalLapor').value;
            const laporan = document.getElementById('laporan').value;
            submitLaporan(nama, tanggal, laporan);
        };
    </script>
</head>
<body>
    <h1>Upload Bukti Setor</h1>
    <input type="text" id="namaSetor" placeholder="Nama Lengkap" required>
    <input type="date" id="tanggalSetor" required>
    <input type="file" id="fileBukti" required>
    <button onclick="handleUploadBukti()">Kirim Setoran</button>

    <h1>Kirim Laporan</h1>
    <input type="text" id="namaPelapor" placeholder="Nama Pelapor" required>
    <input type="date" id="tanggalLapor" required>
    <textarea id="laporan" placeholder="Detail Laporan" required></textarea>
    <button onclick="handleSubmitLaporan()">Kirim Laporan</button>
</body>
</html>
