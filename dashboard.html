<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setoran - Gibran Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --purple: #6d28d9; --dark-bg: #120d1d; --card-bg: #1e162e; --text: #ffffff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark-bg); color: var(--text); padding-bottom: 40px; }
        
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header h3 { flex: 1; text-align: center; margin: 0; font-size: 18px; }

        h1.title { color: #a855f7; font-size: 24px; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #e2e8f0; }

        /* Upload Box (Screen 6/7) */
        .upload-area { 
            border: 2px dashed var(--purple); border-radius: 20px; 
            padding: 40px 20px; text-align: center; 
            background: rgba(109, 40, 217, 0.05); margin-bottom: 20px;
            cursor: pointer; position: relative;
        }
        .upload-area span { display: block; font-size: 14px; font-weight: 700; color: #a855f7; margin-top: 10px; }

        /* Form Inputs */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input, .input-group select {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #332a44;
            background: #1e162e; color: white; font-family: inherit; box-sizing: border-box; font-size: 15px;
        }

        /* Pilih Penerima (Screen 6) */
        .grid-penerima { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .opt-penerima { 
            padding: 16px; border-radius: 12px; border: 1px solid #332a44; 
            text-align: center; background: #1e162e; cursor: pointer; font-weight: 700;
        }
        .opt-penerima.active { border-color: var(--purple); background: rgba(109, 40, 217, 0.2); color: #c084fc; }

        /* Tanda Tangan (Screen 6) */
        .canvas-container { background: #1e162e; border-radius: 16px; margin-bottom: 10px; position: relative; border: 1px solid #332a44; }
        #signature-pad { width: 100%; height: 200px; touch-action: none; border-radius: 16px; }
        .clear-btn { text-align: right; color: #f43f5e; font-size: 12px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }

        .btn-submit { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: var(--purple); color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <div onclick="history.back()">←</div>
    <h3>Kirim Setoran</h3>
</div>

<div class="container">
    <h1 class="title">Unggah Setoran</h1>
    <p class="subtitle">Pastikan semua data yang Anda masukkan sudah benar.</p>

    <label>Bukti Setor</label>
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <img src="https://cdn-icons-png.flaticon.com/512/3097/3097412.png" width="40" style="filter: invert(1);">
        <span>Unggah Bukti Setor</span>
        <small style="color: #64748b; font-size: 10px;">JPG, PNG atau PDF (Maks 5MB)</small>
        <input type="file" id="file-input" hidden>
    </div>

    <label>Nama Penyetor</label>
    <div class="input-group">
        <input type="text" id="nama" placeholder="Masukkan nama lengkap Anda">
    </div>

    <label>Tanggal Setor</label>
    <div class="input-group">
        <input type="date" id="tanggal">
    </div>

    <label>Setor Ke Siapa</label>
    <div class="grid-penerima">
        <div class="opt-penerima active" onclick="setPenerima(this, 'Bu Tati')">Bu Tati</div>
        <div class="opt-penerima" onclick="setPenerima(this, 'Bu Ami')">Bu Ami</div>
    </div>

    <label>Tanda Tangan Digital</label>
    <div class="canvas-container">
        <canvas id="signature-pad"></canvas>
    </div>
    <div class="clear-btn" onclick="clearCanvas()">Hapus Tanda Tangan</div>

    <button class="btn-submit" onclick="submitData()">Kirim Setoran ➤</button>
</div>

<script>
    // FIREBASE CONFIG SESUAI LINK LO
    const firebaseConfig = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        authDomain: "tempat-masuk-nya-data.firebaseapp.com",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
        projectId: "tempat-masuk-nya-data",
        storageBucket: "tempat-masuk-nya-data.firebasestorage.app",
        messagingSenderId: "918742049565",
        appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let selectedPenerima = "Bu Tati";

    function setPenerima(el, name) {
        document.querySelectorAll('.opt-penerima').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        selectedPenerima = name;
    }

    // Canvas Logic (TTD)
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.width = canvas.offsetWidth;
    canvas.height = 200;

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#a855f7';
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    async function submitData() {
        const nama = document.getElementById('nama').value;
        const tgl = document.getElementById('tanggal').value;
        const ttd = canvas.toDataURL();

        if(!nama || !tgl) { alert("Isi nama dan tanggal dulu, Bro!"); return; }

        try {
            await database.ref('setoran_data').push({
                nama: nama,
                tanggal: tgl,
                penerima: selectedPenerima,
                tanda_tangan: ttd,
                waktu_simpan: Date.now()
            });
            alert("✅ Berhasil! Data Setoran dikirim ke " + selectedPenerima);
            location.reload();
        } catch (e) {
            alert("Gagal kirim data: " + e.message);
        }
    }
</script>
</body>
</html>
