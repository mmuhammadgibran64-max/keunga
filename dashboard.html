<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | ENTERPRISE v10.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-line { width: 250px; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); position: relative; overflow: hidden; }
        .scan-line::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #fff, transparent); animation: scan 1.5s infinite; }
        @keyframes scan { 100% { left: 100%; } }

        header { padding: 15px 30px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.1); padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.65rem; margin-bottom: 12px; letter-spacing: 2px; border-left: 3px solid var(--neon); padding-left: 10px; }

        input, select, textarea { width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; box-sizing: border-box; font-size: 12px; margin-bottom: 10px; }
        label { display: block; font-size: 9px; margin-bottom: 4px; color: var(--neon); font-family: 'Orbitron'; }
        
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 9px; width: 100%; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        #video { width: 100%; height: 150px; background: #000; border: 1px solid var(--neon); border-radius: 5px; object-fit: cover; display: none; margin-bottom: 10px; }
        .step-loading { display: none; text-align: center; color: var(--neon-green); font-family: 'Orbitron'; font-size: 9px; padding: 10px; }
        .hidden-step { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">CLEANING CACHE & SYNCING...</h2>
        <div class="scan-line"></div>
    </div>

    <header>
        <div class="logo">GIBRAN_HUB v10.1</div>
        <div style="font-family: 'Orbitron'; font-size: 10px; color: var(--neon-green);">DATA REFRESHED</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-h">SETORAN & LAPORAN</div>
            <label>NAMA</label><input type="text" placeholder="...">
            <label>TANGGAL</label><input type="date">
            <button class="btn" onclick="alert('Sent to: tempat masuk nya data')">KIRIM DATA</button>
        </div>

        <div class="card">
            <div class="card-h">GUDANG BARANG</div>
            <input type="text" placeholder="Nama Barang">
            <input type="number" placeholder="Stok (0=Kosong)">
            <button class="btn" style="border-color: var(--neon-green); color: var(--neon-green);">UPDATE GUDANG</button>
        </div>

        <div class="card" id="sales-section">
            <div class="card-h">PENJUALAN & ABSENSI</div>
            
            <div id="step-1">
                <label>NAMA PETUGAS</label>
                <input type="text" id="nama-sales">
                <button class="btn" onclick="nextStep(1)">LANJUT</button>
            </div>

            <div id="step-2" class="hidden-step">
                <label>JAM OPERASIONAL</label>
                <input type="time">
                <button class="btn" onclick="nextStep(2)">VERIFIKASI</button>
            </div>

            <div id="step-3" class="hidden-step">
                <label>ABSEN WAJAH (KAMERA REAL)</label>
                <video id="video" autoplay></video>
                <button class="btn" id="start-cam" onclick="startCamera()">BUKA KAMERA</button>
                <button class="btn" id="snap-btn" style="display:none; border-color:var(--neon-green); color:var(--neon-green);" onclick="takeSnapshot()">AMBIL FOTO</button>
            </div>

            <div id="step-4" class="hidden-step">
                <label>PENGHASILAN HARI INI</label>
                <input type="number">
                <div id="gaji-alert" style="display:none; border:1px solid var(--neon-green); padding:10px; margin-bottom:10px;">
                    <label>INPUT GAJI ANDA</label>
                    <input type="number" placeholder="Nominal Gaji...">
                </div>
                <button class="btn" onclick="alert('Terkirim ke sheet: penjualan dan gajian'); location.reload();">FINISH</button>
            </div>

            <div id="step-loading" class="step-loading">PROCESSING...</div>
        </div>

        <div class="card">
            <div class="card-h">RIWAYAT & SEARCH GAJIAN</div>
            <input type="text" id="search-input" placeholder="Cari tanggal atau nama...">
            <button class="btn" onclick="searchGaji()">CARI DATA</button>
            <div id="riwayat-box" style="margin-top:15px; font-size:11px; color:rgba(255,255,255,0.4); text-align:center;">
                <p id="no-data">-- Belum ada riwayat gajian --</p>
                <canvas id="canvas" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => { 
            document.getElementById('loader').style.display = 'none'; 
            // Cek jadwal gajian (awal, tengah, akhir bulan)
            const d = new Date().getDate();
            if(d === 1 || d === 15 || d >= 28) document.getElementById('gaji-alert').style.display = 'block';
        }, 2000);

        function nextStep(n) {
            document.getElementById('step-'+n).style.display = 'none';
            document.getElementById('step-loading').style.display = 'block';
            setTimeout(() => {
                document.getElementById('step-loading').style.display = 'none';
                document.getElementById('step-'+(n+1)).style.display = 'block';
            }, 1500);
        }

        async function startCamera() {
            const v = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            v.srcObject = stream; v.style.display = 'block';
            document.getElementById('start-cam').style.display = 'none';
            document.getElementById('snap-btn').style.display = 'block';
        }

        function takeSnapshot() {
            alert('Wajah terverifikasi!');
            const v = document.getElementById('video');
            v.srcObject.getTracks().forEach(t => t.stop());
            nextStep(3);
        }

        function searchGaji() {
            document.getElementById('step-loading').style.display = 'block';
            setTimeout(() => {
                document.getElementById('step-loading').style.display = 'none';
                alert('Data tidak ditemukan atau belum ada riwayat gajian.');
            }, 2000);
        }
    </script>
</body>
</html>
