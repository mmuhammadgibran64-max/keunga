<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibran Hub - Fix Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --purple: #a855f7; --dark: #0f172a; --card: #1e293b; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; padding-bottom: 100px; }
        
        header { background: #0f172a; padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; }
        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* CARDS */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* INPUTS */
        label { display: block; font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        .input-pro { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; }

        /* NAVIGASI */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; display: flex; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--purple); font-weight: 800; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 5px; font-style: normal; }

        /* TTD */
        canvas { background: #020617; border-radius: 15px; width: 100%; height: 150px; border: 1px dashed #475569; touch-action: none; }
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; background: var(--purple); color: white; font-weight: 800; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <h3 id="page-title" style="margin:0; font-size:16px; letter-spacing:1px;">HOME DASHBOARD</h3>
</header>

<div class="container">
    <div id="v-home">
        <div class="card" style="background: linear-gradient(135deg, #6d28d9, #4c1d95);">
            <label style="color:rgba(255,255,255,0.7)">Total Saldo Setoran</label>
            <h2 id="total-val" style="font-size:32px; margin:10px 0;">Rp 0</h2>
        </div>
        <div class="stat-grid">
            <div class="card">
                <label>Laporan</label>
                <h3 id="count-laporan">0</h3>
            </div>
            <div class="card">
                <label>Barang</label>
                <h3 id="count-gudang">0</h3>
            </div>
        </div>
    </div>

    <div id="v-setoran" class="hidden">
        <div class="card">
            <label>Nama Penyetor</label>
            <input type="text" id="s-nama" class="input-pro" placeholder="Nama Anda">
            <label>Jumlah Uang (Rp)</label>
            <input type="number" id="s-nominal" class="input-pro" placeholder="0">
            <label>Tanda Tangan</label>
            <canvas id="can-setoran"></canvas>
            <p onclick="clearCanvas('can-setoran')" style="text-align:right; color:red; font-size:11px; cursor:pointer;">Hapus TTD</p>
        </div>
        <button class="btn-main" onclick="simpan('setoran')">KIRIM SETORAN</button>
    </div>

    <div id="v-laporan" class="hidden">
        <div class="card">
            <label>Detail Kejadian/Laporan</label>
            <textarea id="l-teks" class="input-pro" style="height:100px;"></textarea>
            <label>Tanda Tangan Pelapor</label>
            <canvas id="can-laporan"></canvas>
        </div>
        <button class="btn-main" onclick="simpan('laporan')">KIRIM LAPORAN</button>
    </div>

    <div id="v-gudang" class="hidden">
        <div class="card">
            <label>Nama Barang</label>
            <input type="text" id="g-item" class="input-pro">
            <div class="stat-grid">
                <div><label>Stok</label><input type="number" id="g-stok" class="input-pro"></div>
                <div><label>Harga</label><input type="number" id="g-harga" class="input-pro"></div>
            </div>
        </div>
        <button class="btn-main" onclick="simpan('gudang')">UPDATE GUDANG</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="tab('home', this)"><i>🏠</i>HOME</div>
    <div class="nav-item" onclick="tab('setoran', this)"><i>💰</i>SETORAN</div>
    <div class="nav-item" onclick="tab('laporan', this)"><i>📄</i>LAPORAN</div>
    <div class="nav-item" onclick="tab('gudang', this)"><i>📦</i>GUDANG</div>
</nav>

<script>
    // CONFIG TERBARU LO
    const firebaseConfig = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com"
    };

    // Inisialisasi Tunggal (Anti-Error)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Navigasi Tab
    function tab(name, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        ['home', 'setoran', 'laporan', 'gudang'].forEach(v => {
            document.getElementById('v-' + v).classList.add('hidden');
        });
        document.getElementById('v-' + name).classList.remove('hidden');
        document.getElementById('page-title').innerText = name.toUpperCase() + " VIEW";
        
        if(name === 'home') updateStats();
    }

    // TTD Handler
    function initCanvas(id) {
        const cvs = document.getElementById(id);
        const ctx = cvs.getContext('2d');
        let draw = false;
        cvs.width = cvs.offsetWidth; cvs.height = 150;

        cvs.addEventListener('mousedown', () => draw = true);
        cvs.addEventListener('mousemove', (e) => {
            if(!draw) return;
            const r = cvs.getBoundingClientRect();
            ctx.lineWidth = 3; ctx.strokeStyle = '#a855f7';
            ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
        });
        cvs.addEventListener('mouseup', () => { draw = false; ctx.beginPath(); });
        // Touch for Mobile
        cvs.addEventListener('touchstart', (e) => { draw = true; e.preventDefault(); });
        cvs.addEventListener('touchmove', (e) => {
            const r = cvs.getBoundingClientRect();
            const t = e.touches[0];
            ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke();
            e.preventDefault();
        });
    }

    function clearCanvas(id) {
        const cvs = document.getElementById(id);
        cvs.getContext('2d').clearRect(0,0,cvs.width,cvs.height);
        cvs.getContext('2d').beginPath();
    }

    initCanvas('can-setoran');
    initCanvas('can-laporan');

    // Simpan Data
    async function simpan(type) {
        let data = { tgl: Date.now() };
        if(type === 'setoran') {
            data.nama = document.getElementById('s-nama').value;
            data.nominal = document.getElementById('s-nominal').value;
            data.ttd = document.getElementById('can-setoran').toDataURL();
        } else if(type === 'laporan') {
            data.teks = document.getElementById('l-teks').value;
            data.ttd = document.getElementById('can-laporan').toDataURL();
        } else if(type === 'gudang') {
            data.item = document.getElementById('g-item').value;
            data.stok = document.getElementById('g-stok').value;
        }

        try {
            await db.ref('db_gibran/' + type).push(data);
            alert("✅ Berhasil dikirim!");
            location.reload();
        } catch(e) { alert("Gagal: " + e.message); }
    }

    // Update Dashboard
    function updateStats() {
        db.ref('db_gibran/setoran').on('value', snap => {
            let total = 0; snap.forEach(c => { total += Number(c.val().nominal || 0); });
            document.getElementById('total-val').innerText = "Rp " + total.toLocaleString();
        });
        db.ref('db_gibran/laporan').on('value', snap => {
            document.getElementById('count-laporan').innerText = snap.numChildren();
        });
        db.ref('db_gibran/gudang').on('value', snap => {
            document.getElementById('count-gudang').innerText = snap.numChildren();
        });
    }
    updateStats();
</script>
</body>
</html>
