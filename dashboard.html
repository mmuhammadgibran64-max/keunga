<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v28.0</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* CSS lo di sini... */
    </style>
</head>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(20, 20, 20, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--cyan); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 100px; }
        
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.1); color: #888; padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; }

        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 250px; }

        input, select { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .act-btn { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 9px; font-family: 'Orbitron'; color: white; margin-right: 5px; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:30px; font-size:18px;">GIBRAN HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING & REKAP</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT & DOMPET</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG SYSTEM</button>
        <button class="nav-btn" onclick="show('setting-view', this)">PENGATURAN & CS</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">DATA GRAFIK MASUK</div><canvas id="rekapChart" style="max-height: 200px;"></canvas></div>
            <div class="card"><div class="card-h">MONITORING TRANSAKSI</div><div style="overflow-x:auto;"><table><thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TUJUAN</th></tr></thead><tbody id="tbody-monitor"></tbody></table></div></div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col card"><div class="card-h">INPUT LAPORAN</div><input type="text" id="l-nama" placeholder="Nama"><input type="date" id="l-tgl"><button class="btn-main" style="background:var(--red); color:white" onclick="simpan('LAPORAN','l-')">KIRIM LAPORAN</button></div>
                <div class="flex-col card"><div class="card-h">INPUT SETORAN</div><input type="text" id="s-nama" placeholder="Nama"><input type="date" id="s-tgl"><button class="btn-main" style="background:var(--cyan); color:black" onclick="simpan('SETORAN','s-')">KIRIM SETORAN</button></div>
            </div>

          <div class="card" style="border: 2px solid var(--gold);">
    <div class="card-h">DOMPET DIGITAL - SISA SALDO</div>
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 12px; color: var(--gold); font-family: 'Orbitron';">SALDO AKHIR SAAT INI</span>
        <h1 id="saldo-akhir" style="color:var(--gold); font-family:'Orbitron'; margin: 5px 0; font-size: 40px;">Rp 0</h1>
    </div>
    
    <div class="flex-row">
        <div class="flex-col">
            <label style="font-size: 10px; color: var(--cyan);">UANG MASUK (Rp)</label>
            <input type="number" id="w-masuk" placeholder="0">
        </div>
        <div class="flex-col">
            <label style="font-size: 10px; color: var(--red);">UANG KELUAR / SISA (Rp)</label>
            <input type="number" id="w-keluar" placeholder="0">
        </div>
    </div>
    <button class="btn-main" style="background:var(--gold); color:black; margin-top: 10px;" onclick="updateW()">SIMPAN & UPDATE SALDO</button>

    <div style="margin-top: 30px;">
        <div class="card-h">RIWAYAT TRANSAKSI & DOWNLOAD LAPORAN</div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>TANGGAL & JAM</th>
                        <th>MASUK</th>
                        <th>KELUAR</th>
                        <th>AKSI</th>
                    </tr>
                </thead>
                <tbody id="tbody-wallet"></tbody>
            </table>
        </div>
    </div>
</div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">INPUT BARANG GUDANG</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Nama Barang" class="flex-col">
                    <input type="text" id="g-jenis" placeholder="Jenis" class="flex-col">
                    <input type="number" id="g-jumlah" placeholder="Jumlah" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--purple); color:white" onclick="sendG()">SIMPAN BARANG</button>
            </div>
            <div class="card"><div class="card-h">DAFTAR STOK</div><div style="overflow-x:auto;"><table><thead><tr><th>NAMA</th><th>JENIS</th><th>JML</th><th>STOK</th><th>AKSI</th></tr></thead><tbody id="tbody-gudang"></tbody></table></div></div>
        </div>

        <div id="setting-view" class="section">
            <div class="card"><div class="card-h">PENGATURAN PROFIL</div><input type="text" id="p-nama" placeholder="Nama Admin"><button class="btn-main" style="background:var(--cyan); color:black">SAVE SETTING</button></div>
        </div>
    </main>
</div>

<script>
// --- FIREBASE CONFIG BARU ---
    const firebaseConfig = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        authDomain: "tempat-masuk-nya-data.firebaseapp.com",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
        projectId: "tempat-masuk-nya-data",
        storageBucket: "tempat-masuk-nya-data.firebasestorage.app",
        messagingSenderId: "918742049565",
        appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4",
        measurementId: "G-C0EBFBVVVJ"
    };

    // Konfigurasi Database Terpisah
    const cGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const cWallet = { databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com" };

    // Inisialisasi (Cukup Sekali Saja per App)
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig); 
    }
    
    // Inisialisasi App Tambahan
    const appG = firebase.apps.find(a => a.name === "G") || firebase.initializeApp(cGudang, "G");
    const appW = firebase.apps.find(a => a.name === "W") || firebase.initializeApp(cWallet, "W");

    // Definisikan Database (HANYA SEKALI SAJA)
    const dbD = firebase.database();       // Untuk Laporan & Setoran (Default)
    const dbG = firebase.database(appG);    // Untuk Gudang
    const dbW = firebase.database(appW);    // Untuk Dompet/Wallet
   // --- LOGIC DOMPET (SISA SALDO) - VERSI FIX ANTI EROR ---
    function dlPDF(tgl, m, k) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("STRUK DOMPET DIGITAL - GIBRAN HUB", 10, 20);
        doc.setFont("helvetica", "normal");
        doc.text("------------------------------------------", 10, 25);
        doc.text(`Waktu Transaksi : ${tgl}`, 10, 35);
        doc.text(`Uang Masuk      : Rp ${m.toLocaleString()}`, 10, 45);
        doc.text(`Uang Keluar     : Rp ${k.toLocaleString()}`, 10, 55);
        doc.text(`Sisa Per Item   : Rp ${(m-k).toLocaleString()}`, 10, 65);
        doc.save(`Struk_${tgl.replace(/[/, :]/g, '_')}.pdf`);
    }

    function updateW() {
        const masuk = parseInt(document.getElementById('w-masuk').value) || 0;
        const keluar = parseInt(document.getElementById('w-keluar').value) || 0;
        if(masuk === 0 && keluar === 0) return alert("Isi angka dulu!");

        dbW.ref('riwayat').push({
            tgl: new Date().toLocaleString('id-ID'),
            m: masuk,
            k: keluar
        }).then(() => {
            document.getElementById('w-masuk').value = "";
            document.getElementById('w-keluar').value = "";
        });
    }

    dbW.ref('riwayat').on('value', s => {
        const tb = document.getElementById('tbody-wallet'); 
        if(!tb) return;
        tb.innerHTML = "";
        let total = 0;
        s.forEach(c => {
            const r = c.val(); 
            const key = c.key;
            // Kita pakai r.m dan r.k supaya singkron dengan fungsi updateW di atas
            total += (r.m - r.k);
            tb.innerHTML += `
                <tr>
                    <td>${r.tgl}</td>
                    <td style="color:#00ff88">+ Rp ${r.m.toLocaleString()}</td>
                    <td style="color:#ff0055">- Rp ${r.k.toLocaleString()}</td>
                    <td>
                        <button class="act-btn" style="background:red" onclick="if(confirm('Hapus data ini?')) dbW.ref('riwayat/${key}').remove()">HAPUS</button>
                        <button class="act-btn" style="background:var(--cyan); color:black" onclick="dlPDF('${r.tgl}', ${r.m}, ${r.k})">PDF</button>
                    </td>
                </tr>`;
        });
        document.getElementById('saldo-akhir').innerText = "Rp " + total.toLocaleString();
    });

    // --- LOGIC GUDANG ---
    function sendG() {
        dbG.ref('stok').push({ nm:v('g-nama'), jn:v('g-jenis'), jml:v('g-jumlah'), st:v('g-stok') });
    }
    dbG.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const r = c.val();
            tb.innerHTML += `<tr><td>${r.nm}</td><td>${r.jn}</td><td>${r.jml}</td><td>${r.st}</td><td><button class="act-btn" style="background:red" onclick="dbG.ref('stok/${c.key}').remove()">HAPUS</button></td></tr>`;
        });
    });

    // --- LOGIC TRANSAKSI & CHART ---
    function simpan(t, p) {
        dbD.ref('transaksi').push({ tipe:t, nama:v(p+'nama'), tgl:v(p+'tgl') });
    }
    dbD.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = "";
        let L=0, S=0;
        s.forEach(c => {
            const r = c.val(); r.tipe === "LAPORAN" ? L++ : S++;
            tb.innerHTML += `<tr><td>${r.tipe}</td><td>${r.nama}</td><td>${r.tgl}</td><td>UNIT</td></tr>`;
        });
        renderChart(L, S);
    });

    let chart;
    function renderChart(l, s) {
        const ctx = document.getElementById('rekapChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'bar', data:{ labels:['LAPORAN','SETORAN'], datasets:[{ data:[l, s], backgroundColor:['#ff0055','#00d4ff'] }] } });
    }

    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function v(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
