<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v21.0 | DATA CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --green: #00ff88; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--purple); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .logo { font-family: 'Orbitron'; color: var(--red); font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(112, 0, 255, 0.3); color: var(--purple); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .nav-btn.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #100a1a, #050505); padding-bottom: 100px; }
        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--red); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,0,85,0.2); padding-bottom: 8px; }

        .action-btn { padding: 8px 12px; font-size: 10px; font-family: 'Orbitron'; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; transition: 0.3s; }
        .btn-del { background: var(--red); color: white; }
        .btn-down { background: var(--purple); color: white; }
        .btn-print { background: var(--green); color: black; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        th { text-align: left; color: var(--purple); border-bottom: 2px solid var(--purple); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* Style khusus untuk print beneran */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; background: white !important; }
            .action-btn, nav { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('dash-view', this)">● MONITORING & CONTROL</button>
        <button class="nav-btn" onclick="show('input-view', this)">● INPUT SETOR/LAPOR</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">● GUDANG & NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">● LOGOUT</button>
    </nav>

    <main>
        <div id="dash-view" class="section active">
            <div class="grid" style="margin-bottom: 20px;">
                <div class="card">
                    <div class="card-h">STATISTIK LIVE</div>
                    <canvas id="chartS" height="120"></canvas>
                </div>
            </div>

            <div class="card" id="print-area">
                <div class="card-h">LIVE DATA SETORAN</div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>TANGGAL</th>
                                <th>NAMA</th>
                                <th>KEPADA</th>
                                <th>TTD</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="table-setoran">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">... (Isi Form Input) ...</div>
        <div id="gudang-view" class="section">... (Isi Gudang) ...</div>
    </main>
</div>

<script>
    // CONFIG DB
    const configU = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    firebase.initializeApp(configU, "appU");
    const dbU = firebase.database(firebase.app("appU"));

    // LOAD DATA KE TABEL DENGAN BUTTON BARU
    dbU.ref('setoran').on('value', snapshot => {
        const tbody = document.getElementById('table-setoran');
        tbody.innerHTML = "";
        snapshot.forEach(child => {
            const v = child.val();
            const key = child.key;
            tbody.innerHTML += `
                <tr>
                    <td>${v.tgl}</td>
                    <td>${v.nama}</td>
                    <td>${v.ke}</td>
                    <td>${v.ttd}</td>
                    <td>
                        <button class="action-btn btn-down" onclick="downloadPDF('${key}', '${v.nama}')">DOWN</button>
                        <button class="action-btn btn-print" onclick="window.print()">PRINT</button>
                        <button class="action-btn btn-del" onclick="hapusData('${key}')">HAPUS</button>
                    </td>
                </tr>
            `;
        });
    });

    // FITUR HAPUS DATA
    function hapusData(key) {
        if(confirm("Yakin hapus data ini secara permanen?")) {
            dbU.ref('setoran/' + key).remove()
            .then(() => alert("Data Terhapus!"))
            .catch(err => alert("Gagal: " + err));
        }
    }

    // FITUR DOWNLOAD PDF (MASUK KE FILE MANAGER)
    async function downloadPDF(key, nama) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        dbU.ref('setoran/' + key).once('value', s => {
            const d = s.val();
            doc.setFontSize(20);
            doc.text("BUKTI SETORAN GIBRAN HUB", 10, 20);
            doc.setFontSize(12);
            doc.text(`Nama: ${d.nama}`, 10, 40);
            doc.text(`Tanggal: ${d.tgl}`, 10, 50);
            doc.text(`Tujuan: ${d.ke}`, 10, 60);
            doc.text(`Paraf: ${d.ttd}`, 10, 70);
            
            if(d.img) {
                doc.addImage(d.img, 'JPEG', 10, 80, 100, 75);
            }
            
            doc.save(`Setoran_${nama}_${d.tgl}.pdf`);
        });
    }

    // Chart & UI Logic tetap sama
    const ctxS = document.getElementById('chartS');
    const chartS = new Chart(ctxS, { type: 'bar', data: { labels: ['Total Data'], datasets: [{ label: 'Setoran', data: [0], backgroundColor: '#ff0055' }] } });
    dbU.ref('setoran').on('value', s => { chartS.data.datasets[0].data = [s.numChildren()]; chartS.update(); });

    function show(id, b) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); 
        b.classList.add('active'); 
    }
</script>
</body>
</html>
