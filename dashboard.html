<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v28.6 | ENTERPRISE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.95); --purple: #bc13fe; --green: #00ff88; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0d1621, #050505); padding-bottom: 100px; }
        .nav-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.1); color: #777; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 10px; text-align: left; transition: 0.4s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); }
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .card-h { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; text-transform: uppercase; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 250px; }
        label { font-size: 10px; color: #aaa; font-family: 'Orbitron'; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 10px; font-family: 'Rajdhani'; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--cyan); border-bottom: 1px solid var(--cyan); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .act-btn { padding: 6px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 8px; font-family: 'Orbitron'; color: white; margin-right: 2px; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div style="text-align:center; margin-bottom:20px;">
            <img id="display-foto" src="https://via.placeholder.com/80" class="profile-img">
            <div id="display-nama" style="font-family:'Orbitron'; color:var(--cyan); font-size:14px;">USER_NAME</div>
        </div>
        <button class="nav-btn active" onclick="show('mon-view', this)">📊 MONITORING</button>
        <button class="nav-btn" onclick="show('sales-view', this)">💰 SALES & LABA RUGI</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">📦 GUDANG</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ SETTING PROFIL</button>
    </nav>

    <main>
        <div id="sales-view" class="section">
            <div class="flex-row">
                <div class="flex-col card">
                    <div class="card-h">INPUT PENJUALAN HARIAN</div>
                    <label>PRODUK</label>
                    <select id="p-produk">
                        <option value="Peye Kacang Kecil">Peye Kacang Kecil</option>
                        <option value="Peye Kacang Besar">Peye Kacang Besar</option>
                        <option value="Slondok (Orang)">Slondok (Orang)</option>
                        <option value="Opak (Orang)">Opak (Orang)</option>
                        <option value="Kacang (Sendiri)">Kacang (Sendiri)</option>
                        <option value="Kue Sus (Orang)">Kue Sus (Orang)</option>
                        <option value="Rengginang Isi 3">Rengginang Isi 3</option>
                    </select>
                    <label>JUMLAH (Bungkus)</label><input type="number" id="p-qty" placeholder="0">
                    <label>HARGA JUAL TOTAL (Rp)</label><input type="number" id="p-total" placeholder="Rp">
                    <button class="btn-main" style="background:var(--green); color:black" onclick="saveSales()">SIMPAN PENJUALAN</button>
                </div>
                <div class="flex-col card">
                    <div class="card-h">INPUT PENGELUARAN & MODAL</div>
                    <label>KATEGORI</label>
                    <select id="e-kat">
                        <option value="Bahan (Tepung/Kacang/Dll)">Bahan Baku</option>
                        <option value="Operasional (Gas)">Operasional</option>
                        <option value="Kemasan (Plastik/Stiker)">Kemasan</option>
                    </select>
                    <label>NOMINAL (Rp)</label><input type="number" id="e-rp" placeholder="Rp">
                    <button class="btn-main" style="background:var(--red); color:white" onclick="saveExpense()">SIMPAN PENGELUARAN</button>
                </div>
            </div>

            <div class="card" style="border: 2px solid var(--gold);">
                <div class="card-h" style="color:var(--gold)">LAPORAN LABA RUGI REAL-TIME</div>
                <div class="flex-row" style="text-align: center;">
                    <div class="flex-col">
                        <label>TOTAL PENJUALAN</label>
                        <h2 id="lr-jual" style="color:var(--green)">Rp 0</h2>
                    </div>
                    <div class="flex-col">
                        <label>TOTAL BIAYA (BAHAN+OPS)</label>
                        <h2 id="lr-biaya" style="color:var(--red)">Rp 0</h2>
                    </div>
                    <div class="flex-col">
                        <label>LABA BERSIH</label>
                        <h2 id="lr-net" style="text-shadow: 0 0 10px var(--cyan);">Rp 0</h2>
                    </div>
                    <div class="flex-col" style="border-left: 1px solid #333;">
                        <label>DANA CADANGAN STOK (10%)</label>
                        <h2 id="lr-cadangan" style="color:var(--gold)">Rp 0</h2>
                    </div>
                </div>
                <button class="btn-main" style="background:var(--purple); color:white; width: 200px; margin: 20px auto; display: block;" onclick="printLR()">PRINT LAPORAN LABA RUGI</button>
            </div>
        </div>

        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">SALES ANALYTICS</div><canvas id="rekapChart" style="max-height: 200px;"></canvas></div>
            <div class="card">
                <div class="card-h">HISTORY PENJUALAN</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>WAKTU</th><th>PRODUK</th><th>QTY</th><th>TOTAL</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-sales"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">GUDANG ENTRY</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Barang" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok" class="flex-col">
                    <button class="btn-main" style="background:var(--cyan); color:black; flex: 0.5;" onclick="sendG()">UPDATE</button>
                </div>
            </div>
            <div class="card">
                <div class="card-h">INVENTORY LIST</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NAMA</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="setting-view" class="section">
            <div class="card">
                <div class="card-h">PENGATURAN PROFIL USAHA</div>
                <div class="flex-row">
                    <div class="flex-col">
                        <label>NAMA PEMILIK / USAHA</label><input type="text" id="prof-nama">
                        <label>NOMOR WA TERDAFTAR</label><input type="text" id="prof-wa">
                    </div>
                    <div class="flex-col">
                        <label>FOTO PROFIL (UPLOAD)</label>
                        <input type="file" id="prof-file" accept="image/*">
                        <p style="font-size: 10px; color: #666;">*Foto akan disimpan secara lokal/database profil.</p>
                    </div>
                </div>
                <button class="btn-main" style="background:var(--cyan); color:black;" onclick="saveProfile()">SIMPAN PERUBAHAN PROFIL</button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIGS ---
    const configProfile = {
        apiKey: "AIzaSyDHZv0Ofds9O3Tyg0PJzjj326eG1hbDhug",
        authDomain: "nama--profile.firebaseapp.com",
        databaseURL: "https://nama--profile-default-rtdb.firebaseio.com",
        projectId: "nama--profile",
        storageBucket: "nama--profile.firebasestorage.app",
        appId: "1:341046321280:web:29f9e0ea8dc7ae64198665"
    };

    const configGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };

    firebase.initializeApp(configProfile);
    const dbP = firebase.database(); 
    const appG = firebase.initializeApp(configGudang, "G");
    const dbG = firebase.database(appG);

    // --- PROFILE LOGIC ---
    function saveProfile() {
        const file = document.getElementById('prof-file').files[0];
        const data = { n: v('prof-nama'), w: v('prof-wa') };
        if(file) {
            const r = new FileReader(); r.onload = (e) => { data.img = e.target.result; dbP.ref('user').set(data); };
            r.readAsDataURL(file);
        } else { dbP.ref('user').update(data); }
        alert("Profil Terupdate!");
    }
    dbP.ref('user').on('value', s => {
        const d = s.val(); if(!d) return;
        document.getElementById('display-nama').innerText = d.n;
        document.getElementById('prof-nama').value = d.n;
        document.getElementById('prof-wa').value = d.w;
        if(d.img) document.getElementById('display-foto').src = d.img;
    });

    // --- SALES & LABA RUGI LOGIC (REAL CALCULATION) ---
    function saveSales() {
        const d = { tipe: 'JUAL', p: v('p-produk'), q: v('p-qty'), tot: parseInt(v('p-total')), tgl: new Date().toLocaleString() };
        dbP.ref('finance').push(d);
    }
    function saveExpense() {
        const d = { tipe: 'BIAYA', p: v('e-kat'), tot: parseInt(v('e-rp')), tgl: new Date().toLocaleString() };
        dbP.ref('finance').push(d);
    }

    dbP.ref('finance').on('value', s => {
        const tb = document.getElementById('tbody-sales'); tb.innerHTML = "";
        let TJual = 0, TBiaya = 0;
        s.forEach(c => {
            const r = c.val();
            if(r.tipe === 'JUAL') {
                TJual += r.tot;
                tb.innerHTML += `<tr><td>${r.tgl}</td><td>${r.p}</td><td>${r.q}</td><td>${r.tot.toLocaleString()}</td><td><button class="act-btn" style="background:#333" onclick="dbP.ref('finance/${c.key}').remove()">X</button></td></tr>`;
            } else { TBiaya += r.tot; }
        });
        const LabaNet = TJual - TBiaya;
        const Cadangan = LabaNet > 0 ? LabaNet * 0.1 : 0;

        document.getElementById('lr-jual').innerText = "Rp " + TJual.toLocaleString();
        document.getElementById('lr-biaya').innerText = "Rp " + TBiaya.toLocaleString();
        document.getElementById('lr-net').innerText = "Rp " + LabaNet.toLocaleString();
        document.getElementById('lr-cadangan').innerText = "Rp " + Cadangan.toLocaleString();
        updateChart(TJual, TBiaya);
    });

    // --- PRINT LABA RUGI ---
    function printLR() {
        const j = document.getElementById('lr-jual').innerText;
        const b = document.getElementById('lr-biaya').innerText;
        const n = document.getElementById('lr-net').innerText;
        const c = document.getElementById('lr-cadangan').innerText;
        const p = window.open('', '_blank');
        p.document.write(`<html><head><title>LabaRugi</title><style>body{font-family:sans-serif;padding:40px;}.box{border:2px solid #000;padding:20px;}h2{text-align:center;}</style></head><body><div class="box"><h2>LAPORAN LABA RUGI PRO</h2><hr><p>Total Penjualan: <b>${j}</b></p><p>Total Biaya: <b>${b}</b></p><hr><h3>LABA BERSIH: ${n}</h3><p>Dana Cadangan (10%): ${c}</p></div><script>window.print();<\/script></body></html>`);
    }

    // --- GUDANG LOGIC ---
    function sendG() { dbG.ref('stok').push({ nm:v('g-nama'), st:v('g-stok') }); }
    dbG.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => { const r = c.val(); tb.innerHTML += `<tr><td>${r.nm}</td><td>${r.st}</td><td><button class="act-btn" style="background:#333" onclick="dbG.ref('stok/${c.key}').remove()">X</button></td></tr>`; });
    });

    // --- UTILS ---
    let chart;
    function updateChart(j, b) {
        const ctx = document.getElementById('rekapChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'pie', data:{ labels:['Penjualan','Biaya'], datasets:[{ data:[j,b], backgroundColor:[ '#00ff88', '#ff0055' ] }] }, options:{plugins:{legend:{position:'bottom',labels:{color:'white'}}}} });
    }
    function show(id, btn) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
    }
    function v(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
