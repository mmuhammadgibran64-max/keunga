<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibran Hub | Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #f8fbff; margin: 0; padding: 0; }
        header { background: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; }
        main { padding: 20px; max-width: 500px; margin: auto; }
        
        .upload-box { border: 2px dashed #bde0fe; border-radius: 20px; padding: 30px; text-align: center; background: #f0f7ff; margin-bottom: 20px; cursor: pointer; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        .input-field { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .btn-send { background: #00c3ff; color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .btn-print { background: #f1f4f9; color: #333; border: 1px solid #ddd; padding: 15px; border-radius: 15px; width: 30%; font-weight: bold; cursor: pointer; }
        
        .sig-canvas { border: 1px solid #ddd; background: white; width: 100%; height: 150px; border-radius: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <button onclick="location.href='index.html'" style="border:none; background:none; font-size:20px;">←</button>
    <h2 id="page-title" style="margin:0; font-size:18px;">Input Data</h2>
    <button onclick="window.print()" style="border:none; background:none; font-size:20px;">📥</button>
</header>

<main>
    <div id="section-media">
        <label id="label-media">Bukti Foto</label>
        <div class="upload-box" onclick="document.getElementById('file-in').click()">
            <div id="upload-placeholder">☁️<br><b>Upload Gambar</b></div>
            <img id="preview" style="width:100%; display:none; border-radius:15px;">
            <input type="file" id="file-in" hidden accept="image/*">
        </div>
    </div>

    <div class="input-group">
        <label id="label-nama">Nama</label>
        <input type="text" id="inp-nama" class="input-field" placeholder="Masukkan...">
    </div>

    <div id="section-extra">
        <div class="input-group">
            <label>Tanggal</label>
            <input type="date" id="inp-tgl" class="input-field">
        </div>
        <label>Penerima</label>
        <select id="inp-target" class="input-field">
            <option value="Bu Tati">Bu Tati</option>
            <option value="Bu Ami">Bu Ami</option>
        </select>
    </div>

    <div id="section-gudang" class="hidden">
        <div class="input-group">
            <label>Tipe Barang</label>
            <select id="inp-tipe" class="input-field">
                <option value="Elektronik">Elektronik</option>
                <option value="Mebel">Mebel</option>
            </select>
        </div>
        <div class="input-group">
            <label>Jumlah (Unit)</label>
            <input type="number" id="inp-qty" class="input-field" placeholder="0">
        </div>
    </div>

    <label>Tanda Tangan <span style="float:right; color:red; cursor:pointer;" onclick="clearSig()">Hapus</span></label>
    <canvas id="canvas-sig" class="sig-canvas"></canvas>

    <div style="display:flex; gap:10px; margin-top:30px;">
        <button class="btn-print" onclick="window.print()">🖨️ Cetak</button>
        <button class="btn-send" id="btn-submit" onclick="submitData()">➤ Kirim Data</button>
    </div>
</main>

<script>
    // CONFIG 1: UNTUK SETORAN & LAPORAN
    const config1 = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com"
    };
    // CONFIG 2: UNTUK GUDANG
    const config2 = {
        apiKey: "AIzaSyDLlsp7eBXRtWXDdnww8TcBrD7iFyfVj-k",
        databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'SETORAN';
    
    // Inisialisasi Firebase berdasarkan mode
    const app = firebase.initializeApp(mode === 'GUDANG' ? config2 : config1);
    const db = firebase.database();

    // Atur Tampilan Berdasarkan Mode
    document.getElementById('page-title').innerText = "Kirim " + mode;
    if(mode === 'GUDANG') {
        document.getElementById('section-media').classList.add('hidden');
        document.getElementById('section-extra').classList.add('hidden');
        document.getElementById('section-gudang').classList.remove('hidden');
        document.getElementById('label-nama').innerText = "Nama Barang";
    }

    // Canvas Signature
    const canvas = document.getElementById('canvas-sig');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mousemove', (e) => { if(drawing) ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }

    // Foto Preview
    document.getElementById('file-in').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = () => { 
            document.getElementById('preview').src = reader.result;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('upload-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function submitData() {
        const data = {
            nama: document.getElementById('inp-nama').value,
            ttd: canvas.toDataURL(),
            waktu: new Date().toISOString()
        };

        if(mode === 'GUDANG') {
            data.tipe = document.getElementById('inp-tipe').value;
            data.jumlah = document.getElementById('inp-qty').value;
        } else {
            data.tanggal = document.getElementById('inp-tgl').value;
            data.target = document.getElementById('inp-target').value;
            data.foto = document.getElementById('preview').src;
        }

        try {
            await db.ref(mode.toLowerCase()).push(data);
            alert("✅ Berhasil dikirim ke Database " + mode);
            window.location.href = 'index.html';
        } catch(e) { alert("Gagal!"); }
    }
</script>
</body>
</html>
