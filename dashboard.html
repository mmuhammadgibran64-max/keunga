<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gibran Hub - Quad System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --purple: #8b5cf6; --dark-bg: #0f0a19; --card-bg: #1a1425; --text: #ffffff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark-bg); color: var(--text); padding-bottom: 90px; }
        
        .header { display: flex; align-items: center; padding: 20px; background: #150e21; border-bottom: 1px solid #251b36; position: sticky; top: 0; z-index: 100; }
        .header h3 { flex: 1; text-align: center; margin: 0; font-size: 16px; font-weight: 800; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .title-large { color: #c084fc; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; font-size: 12px; margin-bottom: 20px; }

        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #cbd5e1; }

        /* UPLOAD & CARDS */
        .card-pro { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1.5px solid #2d243d; }
        .upload-card { border: 2px dashed #4c1d95; border-radius: 20px; padding: 30px 20px; text-align: center; background: rgba(139, 92, 246, 0.05); margin-bottom: 20px; }

        /* INPUTS */
        .input-pro { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #2d243d; background: #1a1425; color: white; font-family: inherit; box-sizing: border-box; font-size: 14px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ANALYTICS STYLE (Screen 9) */
        .stat-card { background: linear-gradient(135deg, #6d28d9, #4c1d95); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .stat-val { font-size: 28px; font-weight: 800; margin: 5px 0; }
        
        /* NAVIGASI BAWAH (4 Menu) */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #150e21; display: flex; border-top: 1px solid #251b36; padding: 12px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 9px; font-weight: 700; color: #4b5563; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--purple); transform: translateY(-3px); }
        .nav-item b { font-size: 18px; display: block; margin-bottom: 2px; }

        /* TTD & BUTTON */
        #canvas { width: 100%; height: 160px; background: #1a1425; border-radius: 18px; border: 1.5px solid #2d243d; touch-action: none; }
        .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; background: #7c3aed; color: white; font-weight: 800; font-size: 15px; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header class="header">
    <div onclick="location.reload()">←</div>
    <h3 id="head-label">DASHBOARD PERFORMANCE</h3>
    <div style="font-size: 18px;">🔔</div>
</header>

<div class="container">
    
    <div id="view-home">
        <h1 class="title-large">Overview</h1>
        <p class="subtitle">Real-time performance metrics</p>
        
        <div class="stat-card">
            <label style="color: #ddd;">Total Setoran</label>
            <div class="stat-val">Rp 0</div>
            <small>+0% hari ini</small>
        </div>
        
        <div class="grid-2">
            <div class="card-pro">
                <label>Laporan</label>
                <div style="font-size: 20px; font-weight: 800;">0</div>
            </div>
            <div class="card-pro">
                <label>Stok Gudang</label>
                <div style="font-size: 20px; font-weight: 800;">0</div>
            </div>
        </div>
    </div>

    <div id="view-setoran" class="hidden">
        <h1 class="title-large">Unggah Setoran</h1>
        <div class="upload-card">
            <span style="font-size: 30px;">💰</span>
            <p>Pilih Bukti Transfer</p>
        </div>
        <input type="text" id="s-nama" class="input-pro" placeholder="Nama Penyetor">
        <select id="s-target" class="input-pro">
            <option>Setor ke Bu Tati</option>
            <option>Setor ke Bu Ami</option>
        </select>
    </div>

    <div id="view-laporan" class="hidden">
        <h1 class="title-large">Kirim Laporan</h1>
        <div class="upload-card">
            <span style="font-size: 30px;">📝</span>
            <p>Ambil Foto Laporan</p>
        </div>
        <input type="text" id="l-nama" class="input-pro" placeholder="Nama Pelapor">
        <textarea id="l-ket" class="input-pro" placeholder="Keterangan Laporan" style="height: 100px;"></textarea>
    </div>

    <div id="view-gudang" class="hidden">
        <h1 class="title-large">Input Gudang</h1>
        <label>Nama Barang</label>
        <input type="text" id="g-nama" class="input-pro" placeholder="Contoh: Laptop Pro X15">
        <div class="grid-2">
            <input type="number" id="g-jumlah" class="input-pro" placeholder="Jumlah">
            <input type="number" id="g-stok" class="input-pro" placeholder="Stok">
        </div>
    </div>

    <div id="common-footer" class="hidden">
        <label>Tanda Tangan Digital</label>
        <canvas id="canvas"></canvas>
        <p style="text-align:right; color:#f43f5e; font-size:11px; cursor:pointer; font-weight:800; margin: 10px 0;" onclick="clearSign()">HAPUS</p>
        <button class="btn-action" onclick="sendData()">Kirim Data ➔</button>
    </div>

</div>

<nav class="nav">
    <div class="nav-item active" onclick="switchMode('home', this)"><b>🏠</b>HOME</div>
    <div class="nav-item" onclick="switchMode('setoran', this)"><b>💰</b>SETORAN</div>
    <div class="nav-item" onclick="switchMode('laporan', this)"><b>📄</b>LAPORAN</div>
    <div class="nav-item" onclick="switchMode('gudang', this)"><b>📦</b>GUDANG</div>
</nav>

<script>
    // FIREBASE CONFIG PAKAI LINK TERBARU LO
    const firebaseConfig = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mode = 'home';

    function switchMode(m, el) {
        mode = m;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        
        // Sembunyikan semua view
        ['home', 'setoran', 'laporan', 'gudang'].forEach(v => {
            document.getElementById('view-' + v).classList.add('hidden');
        });
        
        // Tampilkan view pilihan
        document.getElementById('view-' + m).classList.remove('hidden');
        document.getElementById('head-label').innerText = m.toUpperCase();
        
        // Tampilkan TTD jika bukan di home
        if(m === 'home') document.getElementById('common-footer').classList.add('hidden');
        else document.getElementById('common-footer').classList.remove('hidden');
    }

    // Canvas TTD
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    canvas.width = canvas.offsetWidth;
    canvas.height = 160;

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        const r = canvas.getBoundingClientRect();
        ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#c084fc';
        ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
    });
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    function clearSign() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.beginPath(); }

    async function sendData() {
        let payload = { timestamp: Date.now(), sign: canvas.toDataURL() };
        
        if(mode === 'setoran') {
            payload.nama = document.getElementById('s-nama').value;
            payload.target = document.getElementById('s-target').value;
        } else if(mode === 'laporan') {
            payload.nama = document.getElementById('l-nama').value;
            payload.keterangan = document.getElementById('l-ket').value;
        } else if(mode === 'gudang') {
            payload.barang = document.getElementById('g-nama').value;
            payload.jumlah = document.getElementById('g-jumlah').value;
        }

        try {
            await db.ref('app_data/' + mode).push(payload);
            alert('✅ Berhasil Dikirim!');
            location.reload();
        } catch(e) { alert('Gagal!'); }
    }
</script>
</body>
</html>s
