<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.4 | ULTIMATE REPAIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --bg: #050505; --card: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 100px; }

        .logo { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.4rem; margin-bottom: 40px; text-shadow: 0 0 10px var(--cyan); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.2); color: #888; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 12px; text-align: left; transition: 0.3s; outline: none; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); border-color: var(--cyan); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; letter-spacing: 1px; }

        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 300px; }

        label { display: block; font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 12px; outline: none; font-size: 13px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-laporan { background: var(--red); color: white; }
        .btn-setoran { background: var(--cyan); color: black; }
        .btn-print { background: #00ff88; color: black; margin-bottom: 15px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .act-btn { padding: 5px 10px; border-radius: 5px; border: none; font-size: 8px; cursor: pointer; font-family: 'Orbitron'; margin-right: 5px; }
        .del-btn { background: var(--red); color: white; }
        .down-btn { background: var(--cyan); color: black; }

        @media print {
            nav, .btn-main, .act-btn, .card-h, input, label { display: none !important; }
            body { background: white; color: black; }
            .wrapper { display: block; }
            .card { border: 1px solid black; }
            table { color: black; }
            th { border-bottom: 2px solid black; color: black; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card">
                <div class="card-h">OPERATOR STATUS</div>
                <h2 id="user-display" style="color: var(--cyan);">---</h2>
            </div>
            <div class="card">
                <div class="card-h">MONITORING DATA MASUK</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TUJUAN</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-monitor"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col">
                    <div class="card">
                        <div class="card-h">KHUSUS INPUT LAPORAN</div>
                        <label>Nama yang Lapor</label><input type="text" id="l-nama">
                        <label>Tanggal Lapor</label><input type="date" id="l-tgl">
                        <label>Tanda Tangan</label><input type="text" id="l-ttd">
                        <label>Kirim Ke?</label>
                        <select id="l-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                        <button class="btn-main btn-laporan" onclick="sendLaporan()">KIRIM LAPORAN</button>
                    </div>
                </div>
                <div class="flex-col">
                    <div class="card">
                        <div class="card-h">KHUSUS INPUT SETORAN</div>
                        <label>Nama yang Setor</label><input type="text" id="s-nama">
                        <label>Tanggal Setor</label><input type="date" id="s-tgl">
                        <label>Tanda Tangan</label><input type="text" id="s-ttd">
                        <label>Setor Ke?</label>
                        <select id="s-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                        <button class="btn-main btn-setoran" onclick="sendSetoran()">KIRIM SETORAN</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">INPUT STOK BARANG</div>
                <div class="flex-row">
                    <div class="flex-col"><label>NAMA</label><input type="text" id="g-nama"></div>
                    <div class="flex-col"><label>TIPE</label><input type="text" id="g-tipe"></div>
                    <div class="flex-col"><label>JUMLAH</label><input type="number" id="g-jumlah"></div>
                    <div class="flex-col"><label>STOK</label><input type="number" id="g-stok"></div>
                </div>
                <button class="btn-main" style="background:var(--purple); color:white;" onclick="sendGudang()">SIMPAN GUDANG</button>
            </div>
            <div class="card">
                <div class="card-h">DAFTAR STOK GUDANG</div>
                <button class="btn-main btn-print" onclick="window.print()">🖨️ PRINT SEMUA STOK</button>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NAMA</th><th>TIPE</th><th>UKURAN/JML</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card">
                <div class="card-h">CLOUD NOTES (AUTO-SYNC)</div>
                <textarea id="cloud-note" style="height: 400px; background: rgba(0,0,0,0.5);" placeholder="Tulis catatan..."></textarea>
            </div>
        </div>
    </main>
</div>

<script>
    // 1. Perbaiki Firebase Rules kamu dulu di Console (Samakan dengan gambar ke-3 tapi kurung kurawalnya benerin)
    const confData = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const confGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const confNotes = { databaseURL: "https://catatankakulator-default-rtdb.firebaseio.com" };

    const appData = firebase.initializeApp(confData, "DATA");
    const appGudang = firebase.initializeApp(confGudang, "GUDANG");
    const appNotes = firebase.initializeApp(confNotes, "NOTES");

    const dbData = firebase.database(appData);
    const dbGudang = firebase.database(appGudang);
    const dbNotes = firebase.database(appNotes);

    window.onload = () => {
        const u = localStorage.getItem('user_gibran');
        if(!u) window.location.href='index.html';
        document.getElementById('user-display').innerText = u;
    };

    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // -- LAPORAN & SETORAN --
    function sendLaporan() {
        const d = { tipe: "LAPORAN", nm: val('l-nama'), tgl: val('l-tgl'), ttd: val('l-ttd'), tujuan: val('l-tujuan') };
        if(d.nm) dbData.ref('transaksi').push(d).then(() => alert("Terkirim!"));
    }
    function sendSetoran() {
        const d = { tipe: "SETORAN", nm: val('s-nama'), tgl: val('s-tgl'), ttd: val('s-ttd'), tujuan: val('s-tujuan') };
        if(d.nm) dbData.ref('transaksi').push(d).then(() => alert("Terkirim!"));
    }
    dbData.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val();
            tb.innerHTML += `<tr><td>${v.tipe}</td><td>${v.nm}</td><td>${v.tgl}</td><td>${v.tujuan}</td><td>-</td></tr>`;
        });
    });

    // -- GUDANG --
    function sendGudang() {
        const d = { nm: val('g-nama'), tp: val('g-tipe'), uk: val('g-jumlah'), st: val('g-stok') };
        if(d.nm) dbGudang.ref('stok').push(d).then(() => alert("Stok Disimpan!"));
    }
    dbGudang.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val(); const k = c.key;
            tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.tp}</td><td>${v.uk}</td><td>${v.st}</td>
            <td>
                <button class="act-btn del-btn" onclick="delG('${k}')">HAPUS</button>
                <button class="act-btn down-btn" onclick="dlPDF('${v.nm}','${v.st}')">DL</button>
            </td></tr>`;
        });
    });
    function delG(k) { if(confirm("Hapus?")) dbGudang.ref('stok/'+k).remove(); }
    
    function dlPDF(n, s) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text(`LAPORAN STOK: ${n}`, 10, 10);
        doc.text(`Jumlah Stok: ${s}`, 10, 20);
        doc.save(`stok_${n}.pdf`);
    }

    // -- NOTES --
    const noteArea = document.getElementById('cloud-note');
    dbNotes.ref('data').on('value', s => { if(!noteArea.matches(':focus')) noteArea.value = s.val()?.text || ""; });
    noteArea.oninput = (e) => dbNotes.ref('data').set({ text: e.target.value });

    function val(id) { return document.getElementById(id).value; }
    function logout() { localStorage.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
