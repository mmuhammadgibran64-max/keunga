<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v22.0 | FULL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --green: #00ff88; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--purple); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .logo { font-family: 'Orbitron'; color: var(--red); font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(112, 0, 255, 0.3); color: var(--purple); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; outline: none; }
        .nav-btn.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #100a1a, #050505); padding-bottom: 100px; }
        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--red); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,0,85,0.2); padding-bottom: 8px; }

        label { display: block; font-size: 10px; color: var(--purple); font-family: 'Orbitron'; margin: 10px 0 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(112, 0, 255, 0.2); color: white; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 20px; color: white; }
        
        .action-btn { padding: 6px 10px; font-size: 9px; font-family: 'Orbitron'; border: none; border-radius: 4px; cursor: pointer; margin-right: 4px; }
        .btn-del { background: var(--red); color: white; }
        .btn-down { background: var(--purple); color: white; }
        .btn-print { background: var(--green); color: black; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--purple); border-bottom: 2px solid var(--purple); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .img-prev { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid var(--purple); }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
            .action-btn { display: none; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('dash-view', this)">● MONITORING & CONTROL</button>
        <button class="nav-btn" onclick="show('input-view', this)">● INPUT SETOR/LAPOR</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">● GUDANG & NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">● LOGOUT</button>
    </nav>

    <main>
        <div id="dash-view" class="section active">
            <div class="grid">
                <div class="card"><canvas id="chartS" height="150"></canvas></div>
                <div class="card"><canvas id="chartL" height="150"></canvas></div>
            </div>
            <div class="card" id="print-area">
                <div class="card-h">RIWAYAT SETORAN PRO</div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>TGL</th><th>NAMA</th><th>KEPADA</th><th>TTD</th><th>AKSI</th></tr>
                        </thead>
                        <tbody id="table-setoran"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="grid">
                <div class="card">
                    <div class="card-h">FORM BUKTI SETORAN</div>
                    <input type="file" id="s-img" accept="image/*" capture="camera" onchange="preview(this, 'ps')">
                    <img id="ps" class="img-prev">
                    <label>Nama Penyetor</label><input type="text" id="s-nama">
                    <label>Tanggal Setor</label><input type="date" id="s-tgl">
                    <label>Setor Ke</label><select id="s-ke"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>Tanda Tangan</label><input type="text" id="s-ttd">
                    <button class="btn-send" style="background:var(--red)" onclick="kirim('setoran','s')">KIRIM SETORAN</button>
                </div>
                <div class="card">
                    <div class="card-h" style="color:var(--green); border-color:var(--green)">FORM BUKTI LAPORAN</div>
                    <input type="file" id="l-img" accept="image/*" capture="camera" onchange="preview(this, 'pl')">
                    <img id="pl" class="img-prev">
                    <label>Nama Pelapor</label><input type="text" id="l-nama">
                    <label>Tanggal Lapor</label><input type="date" id="l-tgl">
                    <label>Lapor Ke</label><select id="l-ke"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>Tanda Tangan</label><input type="text" id="l-ttd">
                    <button class="btn-send" style="background:var(--green); color:black" onclick="kirim('laporan','l')">KIRIM LAPORAN</button>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="grid">
                <div class="card">
                    <div class="card-h">INPUT BARANG GUDANG</div>
                    <input type="text" id="gn" placeholder="Nama Barang">
                    <input type="text" id="gt" placeholder="Tipe">
                    <input type="text" id="gu" placeholder="Ukuran">
                    <input type="number" id="gs" placeholder="Stok">
                    <button class="btn-send" style="background:var(--purple)" onclick="saveG()">SIMPAN KE GUDANG</button>
                </div>
                <div class="card">
                    <div class="card-h">CLOUD NOTES SYNC</div>
                    <textarea id="notes" rows="12"></textarea>
                </div>
            </div>
            <div class="card">
                <div class="card-h">DAFTAR STOK</div>
                <table>
                    <thead><tr><th>NAMA</th><th>TIPE</th><th>UKURAN</th><th>STOK</th></tr></thead>
                    <tbody id="gtable"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // CONFIG DB
    const configU = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const configG = { databaseURL: "https://gudang-barang-893cd-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const configN = { databaseURL: "https://catatankakulator-default-rtdb.firebaseio.com" };

    firebase.initializeApp(configU, "appU");
    firebase.initializeApp(configG, "appG");
    firebase.initializeApp(configN, "appN");

    const dbU = firebase.database(firebase.app("appU"));
    const dbG = firebase.database(firebase.app("appG"));
    const dbN = firebase.database(firebase.app("appN"));

    // MONITORING & ACTIONS
    dbU.ref('setoran').on('value', snap => {
        const tb = document.getElementById('table-setoran'); tb.innerHTML = "";
        snap.forEach(c => {
            const v = c.val(); const k = c.key;
            tb.innerHTML += `<tr><td>${v.tgl}</td><td>${v.nama}</td><td>${v.ke}</td><td>${v.ttd}</td>
                <td>
                    <button class="action-btn btn-down" onclick="dlPDF('${k}','${v.nama}')">DL</button>
                    <button class="action-btn btn-print" onclick="window.print()">PRT</button>
                    <button class="action-btn btn-del" onclick="delData('${k}')">DEL</button>
                </td></tr>`;
        });
    });

    async function dlPDF(k, n) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        dbU.ref('setoran/'+k).once('value', s => {
            const d = s.val(); doc.text("BUKTI GIBRAN HUB",10,10);
            doc.text(`Nama: ${d.nama}\nTgl: ${d.tgl}\nKe: ${d.ke}\nTTD: ${d.ttd}`,10,20);
            if(d.img) doc.addImage(d.img, 'JPEG', 10, 50, 80, 60);
            doc.save(`Setoran_${n}.pdf`);
        });
    }

    function delData(k) { if(confirm("Hapus?")) dbU.ref('setoran/'+k).remove(); }

    // INPUT LOGIC
    async function kirim(path, pre) {
        const file = document.getElementById(pre+'-img').files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const d = { nama:val(pre+'-nama'), tgl:val(pre+'-tgl'), ke:val(pre+'-ke'), ttd:val(pre+'-ttd'), img:reader.result };
            await dbU.ref(path+'/').push(d); alert("BERHASIL!"); location.reload();
        };
    }

    // GUDANG & NOTES
    function saveG() { dbG.ref('stok/').push({ nm:val('gn'), tp:val('gt'), uk:val('gu'), st:val('gs') }); }
    dbG.ref('stok/').on('value', s => {
        const tb = document.getElementById('gtable'); tb.innerHTML = "";
        s.forEach(c => { const v=c.val(); tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.tp}</td><td>${v.uk}</td><td>${v.st}</td></tr>`; });
    });

    const nA = document.getElementById('notes');
    dbN.ref('notes').on('value', s => { if(s.val() && !nA.matches(':focus')) nA.value = s.val().txt; });
    nA.oninput = (e) => dbN.ref('notes').set({ txt: e.target.value });

    // UI TOOLS
    function val(id) { return document.getElementById(id).value; }
    function show(id, b) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        b.classList.add('active');
    }
    function preview(i, id) { 
        const r = new FileReader(); r.onload = e => { 
            document.getElementById(id).src = e.target.result; 
            document.getElementById(id).style.display = 'block'; 
        }; r.readAsDataURL(i.files[0]); 
    }
    function logout() { localStorage.clear(); window.location.href='index.html'; }

    // CHARTS
    const chartS = new Chart(document.getElementById('chartS'), { type:'bar', data:{ labels:['Setoran'], datasets:[{label:'Total', data:[0], backgroundColor:'#ff0055'}]} });
    dbU.ref('setoran').on('value', s => { chartS.data.datasets[0].data = [s.numChildren()]; chartS.update(); });
</script>
</body>
</html>
