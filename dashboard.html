<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | COMPLETE VERSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #00c3ff; --pink: #ff0088; --dark: #1a1c24; --bg: #f4f7fa; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); padding-bottom: 110px; }
        
        /* HEADER (Style Screen 4/5) */
        header { background: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header-title { font-family: 'Orbitron'; font-size: 13px; margin: 0; flex: 1; text-align: center; }

        main { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }

        /* DASHBOARD RINGKASAN (Screen 2 Style) */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-box { padding: 15px; border-radius: 18px; color: white; position: relative; overflow: hidden; }
        .stat-blue { background: linear-gradient(135deg, #00c3ff, #0084ff); }
        .stat-pink { background: linear-gradient(135deg, #ff0088, #d40071); }
        .stat-box h5 { margin: 0; font-size: 10px; opacity: 0.8; text-transform: uppercase; }
        .stat-box h2 { margin: 5px 0 0; font-size: 18px; font-family: 'Orbitron'; }

        /* INPUTS (Screen 5 Style) */
        label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .input-pro { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #eee; background: #f9f9f9; font-family: 'Rajdhani'; font-weight: 600; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; }

        /* NAVIGASI BAWAH (Screen 1 Style) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); }
        .nav-item { text-align: center; cursor: pointer; color: #ccc; font-size: 10px; font-weight: 700; flex: 1; }
        .nav-item.active { color: var(--blue); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }

        .btn-main { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--blue); color: white; font-weight: 800; font-size: 16px; cursor: pointer; }
        .hidden { display: none; }
        canvas { border: 1.5px dashed #ccc; border-radius: 12px; width: 100%; height: 130px; background: white; }
    </style>
</head>
<body>

<header>
    <button style="border:none; background:none; font-size:20px;" onclick="history.back()">←</button>
    <h3 id="header-text" class="header-title">BERANDA</h3>
    <span>🔔</span>
</header>

<main>
    <div id="sec-dashboard" class="content-sec">
        <div class="grid-stats">
            <div class="stat-box stat-blue">
                <h5>Total Setoran</h5>
                <h2 id="sum-setoran">Rp 0</h2>
            </div>
            <div class="stat-box stat-pink">
                <h5>Barang Gudang</h5>
                <h2 id="sum-gudang">0 Item</h2>
            </div>
        </div>
    </div>

    <div id="sec-setoran" class="content-sec">
        <div class="card">
            <label>Nama Pengirim</label>
            <input type="text" id="s-nama" class="input-pro" placeholder="Nama Lengkap">
            <label>Nominal (Rp)</label>
            <input type="number" id="s-nominal" class="input-pro" placeholder="0">
            <label>Tanda Tangan</label>
            <canvas id="canvas-sig"></canvas>
            <p style="text-align:right; color:red; font-size:10px; cursor:pointer;" onclick="clearTTD()">Hapus TTD</p>
        </div>
        <button class="btn-main" onclick="save('setoran')">KIRIM DATA</button>
    </div>

    <div id="sec-laporan" class="content-sec hidden">
        <div class="card">
            <h4 style="margin:0 0 15px; font-family:'Orbitron'; font-size:11px;">HISTORI TRANSAKSI</h4>
            <div id="list-histori">
                <p style="text-align:center; color:#999;">Memuat data...</p>
            </div>
        </div>
        <button class="btn-main" style="background:var(--pink);" onclick="getLaporan()">REFRESH LAPORAN</button>
    </div>

    <div id="sec-gudang" class="content-sec hidden">
        <div class="card">
            <label>Nama Produk</label>
            <input type="text" id="g-nama" class="input-pro">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div><label>Stok</label><input type="number" id="g-qty" class="input-pro"></div>
                <div><label>Harga Jual</label><input type="number" id="g-jual" class="input-pro"></div>
            </div>
            <label>Supplier</label>
            <input type="text" id="g-vendor" class="input-pro">
        </div>
        <button class="btn-main" style="background:var(--dark);" onclick="save('gudang')">UPDATE STOK</button>
    </div>

    <div id="sec-pengaturan" class="content-sec hidden">
        <div class="card" style="text-align:center; background: var(--dark); color: white;">
            <p style="font-size:10px; opacity:0.6; margin:0;">SALDO USAHA</p>
            <h1 id="total-saldo" style="font-family:'Orbitron'; color:var(--blue);">Rp 0</h1>
        </div>
        <div class="card">
            <label>Nama Usaha</label>
            <input type="text" id="p-usaha" class="input-pro" placeholder="Gibran Hub">
            <label>WhatsApp Admin</label>
            <input type="text" id="p-wa" class="input-pro" value="+62">
            <button class="btn-main" style="background:var(--orange);" onclick="save('profil')">SIMPAN SETTING</button>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="tab('setoran', this)"><i>💰</i>SETORAN</div>
    <div class="nav-item" onclick="tab('laporan', this)"><i>📊</i>LAPORAN</div>
    <div class="nav-item" onclick="tab('gudang', this)"><i>📦</i>GUDANG</div>
    <div class="nav-item" onclick="tab('pengaturan', this)"><i>⚙️</i>SETTING</div>
</nav>

<script>
    const cfgS = { apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs", databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const cfgG = { apiKey: "AIzaSyDLlsp7eBXRtWXDdnww8TcBrD7iFyfVj-k", databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const cfgP = { apiKey: "AIzaSyDHZv0Ofds9O3Tyg0PJzjj326eG1hbDhug", databaseURL: "https://nama--profile-default-rtdb.firebaseio.com" };

    firebase.initializeApp(cfgS);

    function tab(m, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('header-text').innerText = m.toUpperCase();
        
        // Hide all
        document.querySelectorAll('.content-sec').forEach(s => s.classList.add('hidden'));
        
        // Logic Tampil (Dashboard Screen 2 muncul pas di Laporan)
        if(m === 'laporan' || m === 'setoran') document.getElementById('sec-dashboard').classList.remove('hidden');
        document.getElementById('sec-' + m).classList.remove('hidden');

        firebase.app().delete().then(() => {
            let c = (m === 'gudang') ? cfgG : (m === 'pengaturan' ? cfgP : cfgS);
            firebase.initializeApp(c);
            updateStats();
            if(m === 'laporan') getLaporan();
        });
    }

    function updateStats() {
        // Ambil Ringkasan Angka
        firebase.database().ref('setoran').once('value', snap => {
            let total = 0; snap.forEach(c => { total += Number(c.val().nominal || 0); });
            document.getElementById('sum-setoran').innerText = "Rp " + total.toLocaleString();
            document.getElementById('total-saldo').innerText = "Rp " + total.toLocaleString();
        });
    }

    function getLaporan() {
        const list = document.getElementById('list-histori');
        list.innerHTML = "Loading...";
        firebase.database().ref('setoran').limitToLast(10).once('value', snap => {
            list.innerHTML = "";
            snap.forEach(c => {
                const v = c.val();
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee;">
                    <span><b>${v.nama}</b><br><small>${new Date(v.time).toLocaleTimeString()}</small></span>
                    <span style="font-weight:bold; color:green;">Rp ${Number(v.nominal).toLocaleString()}</span>
                </div>`;
            });
        });
    }

    // TTD Canvas
    const canvas = document.getElementById('canvas-sig');
    const ctx = canvas.getContext('2d');
    let ok = false;
    canvas.width = canvas.offsetWidth; canvas.height = 130;
    canvas.addEventListener('mousedown', () => ok = true);
    canvas.addEventListener('mousemove', (e) => {
        if(!ok) return;
        const r = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
    });
    canvas.addEventListener('mouseup', () => { ok = false; ctx.beginPath(); });
    function clearTTD() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.beginPath(); }

    async function save(type) {
        const db = firebase.database();
        let payload = { time: Date.now() };
        if(type === 'setoran') {
            payload.nama = document.getElementById('s-nama').value;
            payload.nominal = document.getElementById('s-nominal').value;
            payload.ttd = canvas.toDataURL();
        } else if(type === 'gudang') {
            payload.nama = document.getElementById('g-nama').value;
            payload.qty = document.getElementById('g-qty').value;
        }
        try {
            await db.ref(type).push(payload);
            alert("✅ Berhasil!");
            location.reload();
        } catch(e) { alert("Error!"); }
    }
    updateStats(); // Jalankan saat start
</script>
</body>
</html>
