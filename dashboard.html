<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | MAINFRAME v7.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        /* 1. Hacker Loading Screen */
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-line { width: 250px; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); position: relative; overflow: hidden; }
        .scan-line::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #fff, transparent); animation: scan 1.5s infinite; }
        @keyframes scan { 100% { left: 100%; } }

        /* 2. Header & Navigasi */
        header { padding: 15px 30px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .nav-tabs { display: flex; gap: 10px; margin: 20px 30px; }
        .tab-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        /* 3. Layout Grid */
        .page { display: none; padding: 0 25px 25px 25px; }
        .page.active { display: block; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.1); padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.65rem; margin-bottom: 15px; letter-spacing: 2px; border-left: 3px solid var(--neon); padding-left: 10px; }

        /* 4. Form Styles */
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 9px; margin-bottom: 4px; color: var(--neon); font-family: 'Orbitron'; }
        input, select, textarea { width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; box-sizing: border-box; font-size: 12px; }
        canvas.sig-pad { border: 1px dashed var(--neon); background: #000; width: 100%; height: 80px; cursor: crosshair; }
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 9px; transition: 0.3s; width: 100%; margin-top: 5px; }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        /* 5. Calculator */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .calc-btn { padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .calc-display { background: #000; color: var(--neon-green); padding: 10px; text-align: right; font-family: 'Orbitron'; margin-bottom: 5px; border: 1px solid var(--neon); }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">ESTABLISHING HUB...</h2>
        <div class="scan-line"></div>
    </div>

    <header>
        <div class="logo">GIBRAN_MAINFRAME v7.0</div>
        <div style="font-family: 'Orbitron'; font-size: 10px; color: var(--neon-green);">STATUS: SYNCED</div>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showPage('main-hub', this)">[ MAIN HUB ]</button>
        <button class="tab-btn" onclick="showPage('analytics-hub', this)">[ ANALYTICS ]</button>
    </div>

    <div id="main-hub" class="page active">
        <div class="container">
            <div class="card">
                <div class="card-h">FORM SETORAN</div>
                <div class="form-group"><label>NAMA PENYETOR</label><input type="text"></div>
                <div class="form-group"><label>TANGGAL</label><input type="date"></div>
                <div class="form-group"><label>BUKTI FOTO</label><input type="file" accept="image/*"></div>
                <div class="form-group"><label>TANDA TANGAN</label><canvas id="sig-setor" class="sig-pad"></canvas></div>
                <button class="btn" onclick="alert('Sent to: tempat masuk nya data')">KIRIM SETORAN</button>
            </div>

            <div class="card">
                <div class="card-h">FORM LAPORAN</div>
                <div class="form-group"><label>NAMA PELAPOR</label><input type="text"></div>
                <div class="form-group"><label>TANGGAL</label><input type="date"></div>
                <div class="form-group"><label>FOTO LAPORAN</label><input type="file" accept="image/*"></div>
                <div class="form-group"><label>TANDA TANGAN</label><canvas id="sig-lapor" class="sig-pad"></canvas></div>
                <button class="btn" onclick="alert('Sent to: tempat masuk nya data')">KIRIM LAPORAN</button>
            </div>

            <div class="card">
                <div class="card-h">CATATAN & KALKULATOR</div>
                <textarea id="note-text" rows="3" placeholder="Notes..."></textarea>
                <button class="btn" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="alert('Saved to: catatan')">SAVE NOTE</button>
                <div class="calc-display" id="display">0</div>
                <div class="calc-grid">
                    <button class="calc-btn" onclick="inputCalc('7')">7</button><button class="calc-btn" onclick="inputCalc('8')">8</button><button class="calc-btn" onclick="inputCalc('9')">9</button><button class="calc-btn" onclick="inputCalc('/')">/</button>
                    <button class="calc-btn" onclick="inputCalc('4')">4</button><button class="calc-btn" onclick="inputCalc('5')">5</button><button class="calc-btn" onclick="inputCalc('6')">6</button><button class="calc-btn" onclick="inputCalc('*')">*</button>
                    <button class="calc-btn" onclick="inputCalc('1')">1</button><button class="calc-btn" onclick="inputCalc('2')">2</button><button class="calc-btn" onclick="inputCalc('3')">3</button><button class="calc-btn" onclick="inputCalc('-')">-</button>
                    <button class="calc-btn" onclick="clearCalc()">C</button><button class="calc-btn" onclick="inputCalc('0')">0</button><button class="calc-btn" onclick="calculate()">=</button><button class="calc-btn" onclick="inputCalc('+')">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="analytics-hub" class="page">
        <div class="container" style="grid-template-columns: 1fr;">
            <div class="card" style="height: 450px;">
                <div class="card-h">MAIN ANALYTICS DATA FLOW</div>
                <canvas id="bigChart"></canvas>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="card"><div class="card-h">SETORAN STATS</div><canvas id="chart1"></canvas></div>
                <div class="card"><div class="card-h">LAPORAN STATS</div><canvas id="chart2"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        // Tab System
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'analytics-hub') initBigCharts();
        }

        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);

        // Calc Logic
        let currentInput = "";
        function inputCalc(val) { currentInput += val; document.getElementById('display').innerText = currentInput; }
        function clearCalc() { currentInput = ""; document.getElementById('display').innerText = "0"; }
        function calculate() { try { currentInput = eval(currentInput).toString(); document.getElementById('display').innerText = currentInput; } catch { document.getElementById('display').innerText = "ERR"; } }

        // Signature Logic
        function setupSig(id) {
            const canvas = document.getElementById(id); const sctx = canvas.getContext('2d'); let drawing = false;
            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => { drawing = false; sctx.beginPath(); });
            canvas.addEventListener('mousemove', (e) => {
                if (!drawing) return; sctx.lineWidth = 2; sctx.strokeStyle = '#00ff88';
                const rect = canvas.getBoundingClientRect(); sctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); sctx.stroke();
            });
        }
        setupSig('sig-setor'); setupSig('sig-lapor');

        // Charts Logic
        function initBigCharts() {
            const commonOptions = { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } } } };
            
            new Chart(document.getElementById('bigChart'), {
                type: 'line',
                data: { labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'], datasets: [{ label: 'Traffic', data: [30, 50, 40, 70, 60, 90, 100], borderColor: '#00d2ff', fill: true, backgroundColor: 'rgba(0,210,255,0.1)', tension: 0.4 }] },
                options: commonOptions
            });

            new Chart(document.getElementById('chart1'), {
                type: 'bar',
                data: { labels: ['A', 'B', 'C'], datasets: [{ data: [12, 19, 3], backgroundColor: '#00ff88' }] },
                options: commonOptions
            });

            new Chart(document.getElementById('chart2'), {
                type: 'doughnut',
                data: { labels: ['X', 'Y'], datasets: [{ data: [10, 5], backgroundColor: ['#ff4444', '#00d2ff'] }] },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
