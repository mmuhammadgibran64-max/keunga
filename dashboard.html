<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.3 | GUDANG SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --bg: #050505; --card: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 100px; }

        .logo { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.4rem; margin-bottom: 40px; text-shadow: 0 0 10px var(--cyan); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.2); color: #888; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); border-color: var(--cyan); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; }

        .flex-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 9px; color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; outline: none; font-size: 13px; box-sizing: border-box; }
        
        .btn-main { padding: 14px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-purple { background: var(--purple); color: white; }
        .btn-green { background: #00ff88; color: black; margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 12px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .act-btn { padding: 5px 10px; border-radius: 5px; border: none; font-size: 9px; cursor: pointer; font-family: 'Orbitron'; margin-right: 5px; }
        .del-btn { background: var(--red); color: white; }
        .down-btn { background: var(--cyan); color: black; }

        @media print {
            nav, .btn-main, .act-btn, .card-h, input, label { display: none !important; }
            body { background: white; color: black; }
            .wrapper { display: block; }
            .card { border: 1px solid black; }
            table { color: black; }
            th { border-bottom: 2px solid black; color: black; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn" onclick="show('mon-view', this)">MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT DATA</button>
        <button class="nav-btn active" onclick="show('gudang-view', this)">GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section">
            <div class="card"><div class="card-h">LIVE MONITOR DATA</div><div id="data-list">Loading...</div></div>
        </div>

        <div id="input-view" class="section">
             <div class="card"><div class="card-h">INPUT SETORAN / LAPORAN</div><p>Fitur Aktif...</p></div>
        </div>

        <div id="gudang-view" class="section active">
            <div class="card">
                <div class="card-h">INPUT STOK BARANG</div>
                <div class="flex-grid">
                    <div><label>NAMA BARANG</label><input type="text" id="g-nama"></div>
                    <div><label>TIPE</label><input type="text" id="g-tipe"></div>
                    <div><label>JUMLAH</label><input type="number" id="g-jumlah"></div>
                    <div><label>STOK</label><input type="number" id="g-stok"></div>
                </div>
                <button class="btn-main btn-purple" onclick="saveGudang()">SIMPAN STOK GUDANG</button>
            </div>

            <div class="card">
                <div class="card-h">DAFTAR STOK GUDANG</div>
                <button class="btn-main btn-green" onclick="window.print()">🖨️ PRINT SEMUA STOK (LAPORAN FISIK)</button>
                <div style="overflow-x:auto;">
                    <table id="stok-table">
                        <thead>
                            <tr>
                                <th>NAMA</th>
                                <th>TIPE</th>
                                <th>UKURAN/JML</th>
                                <th>STOK</th>
                                <th>AKSI</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card"><div class="card-h">CLOUD NOTES</div><textarea id="cloud-note" style="height:300px"></textarea></div>
        </div>
    </main>
</div>

<script>
    // CONFIG FIREBASE
    const confGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const appGudang = firebase.initializeApp(confGudang, "GUDANG_APP");
    const dbGudang = firebase.database(appGudang);

    // Navigasi
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // CRUD GUDANG
    function saveGudang() {
        const data = {
            nama: document.getElementById('g-nama').value,
            tipe: document.getElementById('g-tipe').value,
            jumlah: document.getElementById('g-jumlah').value,
            stok: document.getElementById('g-stok').value,
            timestamp: new Date().toLocaleString()
        };
        if(data.nama) {
            dbGudang.ref('stok_barang').push(data).then(() => {
                alert("Data Berhasil Disimpan!");
                document.querySelectorAll('#gudang-view input').forEach(i => i.value = "");
            });
        } else { alert("Minimal isi Nama Barang!"); }
    }

    // Load Data ke Tabel
    dbGudang.ref('stok_barang').on('value', snapshot => {
        const tbody = document.getElementById('tbody-gudang');
        tbody.innerHTML = "";
        snapshot.forEach(child => {
            const v = child.val();
            const k = child.key;
            tbody.innerHTML += `
                <tr>
                    <td>${v.nama}</td>
                    <td>${v.tipe}</td>
                    <td>${v.jumlah}</td>
                    <td>${v.stok}</td>
                    <td>
                        <button class="act-btn del-btn" onclick="hapusData('${k}')">HAPUS</button>
                        <button class="act-btn down-btn" onclick="downloadPDF('${v.nama}', '${v.tipe}', '${v.stok}')">DOWNLOAD</button>
                    </td>
                </tr>
            `;
        });
    });

    function hapusData(key) {
        if(confirm("Yakin mau hapus data ini?")) {
            dbGudang.ref('stok_barang/' + key).remove();
        }
    }

    function downloadPDF(nama, tipe, stok) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.text("BUKTI STOK GIBRAN_HUB", 10, 10);
        doc.setFont("helvetica", "normal");
        doc.text(`Nama Barang: ${nama}`, 10, 20);
        doc.text(`Tipe: ${tipe}`, 10, 30);
        doc.text(`Jumlah Stok: ${stok}`, 10, 40);
        doc.text(`Dicetak pada: ${new Date().toLocaleString()}`, 10, 50);
        doc.save(`stok_${nama}.pdf`);
    }

    function logout() { localStorage.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
