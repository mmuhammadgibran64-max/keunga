<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | MAINFRAME DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --neon-blue: #00d2ff; 
            --neon-green: #00ff88;
            --bg-dark: #05070a; 
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-dark); color: white; 
            font-family: 'Rajdhani', sans-serif; 
        }

        /* --- LOADING SCREEN (5-10 Detik) --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .loader-circle {
            width: 80px; height: 80px;
            border: 4px solid rgba(0, 210, 255, 0.1);
            border-top: 4px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- DASHBOARD MAIN --- */
        #dashboard { display: none; padding: 25px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 15px; margin-bottom: 30px;
        }

        .logo-text { 
            font-family: 'Orbitron'; font-size: 1.5rem; 
            color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); 
        }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 15px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-title {
            font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 20px;
            color: var(--neon-blue); letter-spacing: 2px;
        }

        /* Jotform Container */
        .jotform-frame {
            width: 100%; height: 500px; border: none; border-radius: 10px;
            background: transparent;
        }

        .btn-exit {
            padding: 5px 15px; border: 1px solid #ff4444; color: #ff4444;
            text-decoration: none; font-family: 'Orbitron'; font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-circle"></div>
        <h2 style="font-family: 'Orbitron'; margin-top: 25px; letter-spacing: 3px; font-size: 1rem;">DECRYPTING ACCESS...</h2>
        <p id="progress-text" style="color: var(--neon-blue); font-size: 0.8rem;">Syncing with "tempat masuk nya data"...</p>
    </div>

    <div id="dashboard">
        <header>
            <div class="logo-text">MAINFRAME_GIBRAN</div>
            <a href="index.html" class="btn-exit">TERMINATE SESSION</a>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-title">● ANALYTICS_DATA_FLOW</div>
                <canvas id="mainChart"></canvas>
            </div>

            <div class="card">
                <div class="card-title">● DATABASE_INPUT (JOTFORM)</div>
                <iframe class="jotform-frame" src="https://form.jotform.com/260617899577074"></iframe>
            </div>

            <div class="card" style="display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                <div class="card-title">SERVER_STATUS</div>
                <h1 style="color: var(--neon-green); margin: 10px 0;">ACTIVE</h1>
                <p style="font-size: 0.9rem; opacity: 0.7;">Target Sheet:<br><span style="color: var(--neon-blue);">tempat masuk nya data</span></p>
                <div style="margin-top: 20px; font-size: 0.7rem; border-top: 1px solid #333; width: 100%; padding-top: 15px;">
                    ENCRYPTION: AES-256<br>
                    Uptime: 99.9%
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulasi Loading 7 Detik
        let prog = 0;
        const progText = document.getElementById('progress-text');
        
        let interval = setInterval(() => {
            prog += 1;
            if(prog == 40) progText.innerText = "Bypassing Firewall...";
            if(prog == 80) progText.innerText = "Opening Secure Line...";
            
            if(prog >= 100) {
                clearInterval(interval);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initChart();
            }
        }, 70); // Kecepatan loading

        // Inisialisasi Grafik
        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                    datasets: [{
                        label: 'Data Traffic',
                        data: [5, 15, 10, 25, 20, 35],
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { color: '#222' } } }
                }
            });
        }
    </script>
</body>
</html>
