<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v20.0 | FULL DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --green: #00ff88; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--purple); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .logo { font-family: 'Orbitron'; color: var(--red); font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(112, 0, 255, 0.3); color: var(--purple); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .nav-btn.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #100a1a, #050505); padding-bottom: 100px; }
        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--red); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,0,85,0.2); padding-bottom: 8px; }

        label { display: block; font-size: 10px; color: var(--purple); font-family: 'Orbitron'; margin: 10px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(112, 0, 255, 0.2); color: white; border-radius: 8px; font-size: 13px; outline: none; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 20px; color: white; }
        
        .img-prev { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 1px solid var(--purple); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { text-align: left; color: var(--purple); border-bottom: 1px solid var(--purple); padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('dash-view', this)">● MONITORING DASHBOARD</button>
        <button class="nav-btn" onclick="show('input-view', this)">● INPUT SETOR/LAPOR</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">● GUDANG & NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">● LOGOUT</button>
    </nav>

    <main>
        <div id="dash-view" class="section active">
            <div class="grid">
                <div class="card">
                    <div class="card-h">LIVE MONITOR SETORAN</div>
                    <canvas id="chartS" height="150"></canvas>
                </div>
                <div class="card">
                    <div class="card-h">LIVE MONITOR LAPORAN</div>
                    <canvas id="chartL" height="150"></canvas>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="grid">
                <div class="card">
                    <div class="card-h">FORM SETORAN</div>
                    <input type="file" accept="image/*" capture="camera" onchange="preview(this, 'ps')" id="s-img">
                    <img id="ps" class="img-prev">
                    <label>Nama Penyetor</label><input type="text" id="s-nama">
                    <label>Tanggal Setor</label><input type="date" id="s-tgl">
                    <label>Setor Ke</label><select id="s-ke"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>Tanda Tangan</label><input type="text" id="s-ttd">
                    <button class="btn-send" style="background:var(--red)" onclick="kirim('setoran','s')">KIRIM SETORAN</button>
                </div>
                <div class="card">
                    <div class="card-h" style="color:var(--green); border-color:var(--green)">FORM LAPORAN</div>
                    <input type="file" accept="image/*" capture="camera" onchange="preview(this, 'pl')" id="l-img">
                    <img id="pl" class="img-prev">
                    <label>Nama Pelapor</label><input type="text" id="l-nama">
                    <label>Tanggal Lapor</label><input type="date" id="l-tgl">
                    <label>Lapor Ke</label><select id="l-ke"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>Tanda Tangan</label><input type="text" id="l-ttd">
                    <button class="btn-send" style="background:var(--green); color:black" onclick="kirim('laporan','l')">KIRIM LAPORAN</button>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="grid">
                <div class="card">
                    <div class="card-h">INPUT GUDANG</div>
                    <input type="text" id="gn" placeholder="Nama Barang">
                    <input type="text" id="gt" placeholder="Tipe">
                    <input type="text" id="gu" placeholder="Ukuran">
                    <input type="number" id="gs" placeholder="Stok">
                    <button class="btn-send" style="background:var(--purple)" onclick="saveG()">SIMPAN STOK</button>
                </div>
                <div class="card">
                    <div class="card-h">CLOUD NOTES</div>
                    <textarea id="notes" rows="10" style="width:100%; background:transparent; color:white; border:1px solid var(--purple)"></textarea>
                </div>
            </div>
            <div class="card" style="margin-top:20px">
                <div class="card-h">STOK GUDANG & SEARCH</div>
                <input type="text" id="gcari" placeholder="Cari barang..." onkeyup="search()">
                <table>
                    <thead><tr><th>NAMA</th><th>TIPE</th><th>UKURAN</th><th>STOK</th></tr></thead>
                    <tbody id="gtable"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>



<script>
    // CONFIG TRIPLE DB
    const configU = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const configG = { databaseURL: "https://gudang-barang-893cd-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const configN = { databaseURL: "https://catatankakulator-default-rtdb.firebaseio.com" };

    firebase.initializeApp(configU, "appU");
    firebase.initializeApp(configG, "appG");
    firebase.initializeApp(configN, "appN");

    const dbU = firebase.database(firebase.app("appU"));
    const dbG = firebase.database(firebase.app("appG"));
    const dbN = firebase.database(firebase.app("appN"));

    // MONITORING DASHBOARD (CHART)
    const ctxS = document.getElementById('chartS');
    const chartS = new Chart(ctxS, { type: 'bar', data: { labels: ['Setoran'], datasets: [{ label: 'Total', data: [0], backgroundColor: '#ff0055' }] } });
    dbU.ref('setoran').on('value', s => { chartS.data.datasets[0].data = [s.numChildren()]; chartS.update(); });

    const ctxL = document.getElementById('chartL');
    const chartL = new Chart(ctxL, { type: 'bar', data: { labels: ['Laporan'], datasets: [{ label: 'Total', data: [0], backgroundColor: '#00ff88' }] } });
    dbU.ref('laporan').on('value', s => { chartL.data.datasets[0].data = [s.numChildren()]; chartL.update(); });

    // KIRIM SETORAN/LAPORAN
    async function kirim(folder, pre) {
        const file = document.getElementById(pre+'-img').files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const data = { 
                nama: val(pre+'-nama'), tgl: val(pre+'-tgl'), 
                ke: val(pre+'-ke'), ttd: val(pre+'-ttd'), img: reader.result 
            };
            await dbU.ref(folder+'/').push(data);
            alert("SENT!"); location.reload();
        }
    }

    // GUDANG & NOTES
    function saveG() {
        const d = { nm: val('gn'), tp: val('gt'), uk: val('gu'), st: val('gs') };
        dbG.ref('stok/').push(d).then(() => alert("SAVED!"));
    }

    dbG.ref('stok/').on('value', s => {
        const tb = document.getElementById('gtable'); tb.innerHTML = "";
        s.forEach(c => { const v = c.val(); tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.tp}</td><td>${v.uk}</td><td>${v.st}</td></tr>`; });
    });

    const nArea = document.getElementById('notes');
    dbN.ref('notes').on('value', s => { if(s.val() && !nArea.matches(':focus')) nArea.value = s.val().txt; });
    nArea.oninput = (e) => dbN.ref('notes').set({ txt: e.target.value });

    // HELPERS
    function val(id) { return document.getElementById(id).value; }
    function show(id, b) { 
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active')); 
        b.classList.add('active'); 
    }
    function preview(input, id) { 
        const r = new FileReader(); 
        r.onload = e => { document.getElementById(id).src = e.target.result; document.getElementById(id).style.display='block'; }; 
        r.readAsDataURL(input.files[0]); 
    }
    function logout() { localStorage.removeItem('gibran_user'); window.location.href = 'index.html'; }
</script>
</body>
</html>
