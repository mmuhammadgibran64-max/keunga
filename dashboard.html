<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.9 | TOTAL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.98); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 100px; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.1); color: #888; padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 10px; text-align: left; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; }
        input, select { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 250px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 8px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo" style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:30px;">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ PENGATURAN</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card">
                <div class="card-h">TOTAL REKAP DATA (GRAFIK)</div>
                <canvas id="rekapChart" style="max-height: 250px;"></canvas>
            </div>
            <div class="card">
                <div class="card-h">MONITORING TRANSAKSI</div>
                <div style="overflow-x:auto;"><table><thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TUJUAN</th></tr></thead><tbody id="tbody-monitor"></tbody></table></div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col card"><div class="card-h">LAPORAN</div><input type="text" id="l-nama" placeholder="Nama"><input type="date" id="l-tgl"><button class="btn-main" style="background:var(--red); color:white" onclick="sendLaporan()">KIRIM</button></div>
                <div class="flex-col card"><div class="card-h">SETORAN</div><input type="text" id="s-nama" placeholder="Nama"><input type="date" id="s-tgl"><button class="btn-main" style="background:var(--cyan); color:black" onclick="sendSetoran()">KIRIM</button></div>
            </div>
            <div class="card" style="border: 1px solid var(--gold);">
                <div class="card-h">DOMPET DIGITAL - SISA SALDO</div>
                <h2 id="saldo-akhir" style="color:var(--gold); font-family:'Orbitron';">Rp 0</h2>
                <div class="flex-row">
                    <input type="number" id="w-masuk" placeholder="Pemasukan" class="flex-col">
                    <input type="number" id="w-keluar" placeholder="Sisa Saldo" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--gold); color:black" onclick="updateWallet()">SIMPAN SALDO</button>
                <button class="btn-main" style="background:#00ff88; color:black; width:150px;" onclick="window.print()">🖨️ PRINT SALDO</button>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">GUDANG SYSTEM - INPUT BARANG</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Nama Barang" class="flex-col">
                    <input type="text" id="g-jenis" placeholder="Jenis Barang" class="flex-col">
                    <input type="number" id="g-jumlah" placeholder="Jumlah Barang" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok Barang" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--purple); color:white" onclick="sendGudang()">SIMPAN GUDANG</button>
            </div>
            <div class="card">
                <div class="card-h">DAFTAR STOK GUDANG</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NAMA</th><th>JENIS</th><th>JUMLAH</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card"><div class="card-h">CLOUD NOTES</div><textarea id="cloud-note" style="height:300px; width:100%; background:transparent; color:white; border:1px solid #333;"></textarea></div>
        </div>

        <div id="setting-view" class="section">
            <div class="card">
                <div class="card-h">PENGATURAN PROFIL</div>
                <input type="text" id="p-nama" placeholder="Nama Admin">
                <input type="text" id="p-wa" placeholder="Nomor WA">
                <button class="btn-main" style="background:var(--cyan); color:black" onclick="saveProfile()">UPDATE PROFIL</button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- SEMUA CONFIG FIREBASE ---
    const confData = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const confGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const confWallet = { databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com" };

    const appData = firebase.initializeApp(confData, "DATA");
    const appGudang = firebase.initializeApp(confGudang, "GUDANG");
    const appWallet = firebase.initializeApp(confWallet, "WALLET");

    const dbData = firebase.database(appData);
    const dbGudang = firebase.database(appGudang);
    const dbWallet = firebase.database(appWallet);

    // --- GRAFIK CHART.JS ---
    let myChart;
    function initChart(l, s) {
        const ctx = document.getElementById('rekapChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['LAPORAN', 'SETORAN'],
                datasets: [{
                    label: 'Total Data Masuk',
                    data: [l, s],
                    backgroundColor: ['#ff0055', '#00d4ff']
                }]
            },
            options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
        });
    }

    // --- GUDANG SYSTEM LOGIC ---
    function sendGudang() {
        const d = { nm: val('g-nama'), jn: val('g-jenis'), jml: val('g-jumlah'), st: val('g-stok') };
        if(d.nm) dbGudang.ref('stok').push(d).then(() => alert("Stok Disimpan!"));
    }
    dbGudang.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val(); const k = c.key;
            tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.jn}</td><td>${v.jml}</td><td>${v.st}</td>
            <td><button onclick="dbGudang.ref('stok/${k}').remove()" style="background:red; border:none; color:white; padding:4px; font-size:9px; cursor:pointer;">HAPUS</button></td></tr>`;
        });
    });

    // --- SISA SALDO / WALLET LOGIC ---
    function updateWallet() {
        const m = parseInt(val('w-masuk')) || 0;
        const s = parseInt(val('w-keluar')) || 0;
        dbWallet.ref('saldo').push({ masuk: m, sisa: s, tgl: new Date().toLocaleString() });
    }
    dbWallet.ref('saldo').on('value', s => {
        let total = 0;
        s.forEach(c => { total += (c.val().masuk - c.val().sisa); });
        document.getElementById('saldo-akhir').innerText = "Rp " + total.toLocaleString();
    });

    // --- MONITORING & REKAP ---
    dbData.ref('transaksi').on('value', snapshot => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = "";
        let L=0, S=0;
        snapshot.forEach(c => {
            const v = c.val(); if(v.tipe === "LAPORAN") L++; else S++;
            tb.innerHTML += `<tr><td>${v.tipe}</td><td>${v.nama}</td><td>${v.tanggal}</td><td>${v.tujuan}</td></tr>`;
        });
        initChart(L, S);
    });

    // --- UTILS ---
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function val(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
