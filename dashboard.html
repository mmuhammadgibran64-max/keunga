<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v27.1 | FULL FINANCE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.98); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: #000; border-right: 2px solid var(--cyan); padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 80px; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.1); color: #888; padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 12px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 6px; }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 250px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 6px; margin-bottom: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 8px; font-family: 'Orbitron'; font-size: 8px; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .act-btn { padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 9px; font-family: 'Orbitron'; margin-right: 5px; color: white; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo" style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:20px; font-size:18px;">GIBRAN HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING & REKAP</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT DATA & WALLET</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG SYSTEM</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ PENGATURAN & CS</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">LIVE DATA CHART</div><canvas id="rekapChart" style="max-height: 200px;"></canvas></div>
            <div class="card"><div class="card-h">MONITORING TRANSAKSI</div><div style="overflow-x:auto;"><table><thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TUJUAN</th></tr></thead><tbody id="tbody-monitor"></tbody></table></div></div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col card"><div class="card-h">LAPORAN</div><input type="text" id="l-nama" placeholder="Nama"><input type="date" id="l-tgl"><button class="btn-main" style="background:var(--red); color:white" onclick="simpanData('LAPORAN', 'l-')">KIRIM</button></div>
                <div class="flex-col card"><div class="card-h">SETORAN</div><input type="text" id="s-nama" placeholder="Nama"><input type="date" id="s-tgl"><button class="btn-main" style="background:var(--cyan); color:black" onclick="simpanData('SETORAN', 's-')">KIRIM</button></div>
            </div>

            <div class="card" style="border: 1px solid var(--gold);">
                <div class="card-h">DOMPET DIGITAL - SISA SALDO</div>
                <h2 id="saldo-akhir" style="color:var(--gold); font-family:'Orbitron';">Rp 0</h2>
                <div class="flex-row">
                    <input type="number" id="w-masuk" placeholder="Pemasukan" class="flex-col">
                    <input type="number" id="w-keluar" placeholder="Pengeluaran/Sisa" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--gold); color:black" onclick="updateWallet()">UPDATE SALDO</button>
                
                <div style="margin-top:20px;">
                    <div class="card-h">RIWAYAT TRANSAKSI SALDO (HAPUS & DOWNLOAD)</div>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead><tr><th>TANGGAL</th><th>MASUK</th><th>KELUAR</th><th>AKSI</th></tr></thead>
                            <tbody id="tbody-wallet"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">GUDANG - INPUT BARANG</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Nama Barang" class="flex-col">
                    <input type="text" id="g-jenis" placeholder="Jenis" class="flex-col">
                    <input type="number" id="g-jumlah" placeholder="Jumlah" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--purple); color:white" onclick="sendGudang()">SIMPAN GUDANG</button>
            </div>
            <div class="card"><div class="card-h">STOK GUDANG</div><div style="overflow-x:auto;"><table><thead><tr><th>NAMA</th><th>JENIS</th><th>JML</th><th>STOK</th><th>AKSI</th></tr></thead><tbody id="tbody-gudang"></tbody></table></div></div>
        </div>

        <div id="notes-view" class="section"> <div class="card"><div class="card-h">CLOUD NOTES</div><textarea id="cloud-note" style="height:350px;"></textarea></div> </div>
        <div id="setting-view" class="section"> <div class="card"><div class="card-h">PENGATURAN</div><p>Fitur CS & Profil Aktif...</p></div> </div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIGS ---
    const confData = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const confGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const confWallet = { databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com" };

    const appData = firebase.initializeApp(confData, "DATA");
    const appGudang = firebase.initializeApp(confGudang, "GUDANG");
    const appWallet = firebase.initializeApp(confWallet, "WALLET");

    const dbData = firebase.database(appData);
    const dbGudang = firebase.database(appGudang);
    const dbWallet = firebase.database(appWallet);

    // --- FUNGSI WALLET (SISA SALDO) DENGAN HAPUS & DOWNLOAD ---
    function updateWallet() {
        const m = parseInt(val('w-masuk')) || 0, k = parseInt(val('w-keluar')) || 0;
        if(m === 0 && k === 0) return alert("Isi data dulu!");
        dbWallet.ref('riwayat').push({ tgl: new Date().toLocaleString(), masuk: m, keluar: k }).then(() => {
            document.getElementById('w-masuk').value = ""; document.getElementById('w-keluar').value = "";
        });
    }

    dbWallet.ref('riwayat').on('value', s => {
        const tb = document.getElementById('tbody-wallet'); tb.innerHTML = "";
        let total = 0;
        s.forEach(c => {
            const v = c.val(), k = c.key;
            total += (v.masuk - v.keluar);
            tb.innerHTML += `<tr>
                <td>${v.tgl}</td>
                <td style="color:#00ff88">Rp ${v.masuk.toLocaleString()}</td>
                <td style="color:#ff0055">Rp ${v.keluar.toLocaleString()}</td>
                <td>
                    <button class="act-btn" style="background:red;" onclick="delW('${k}')">HAPUS</button>
                    <button class="act-btn" style="background:var(--cyan); color:black;" onclick="dlW('${v.tgl}',${v.masuk},${v.keluar})">DL</button>
                </td>
            </tr>`;
        });
        document.getElementById('saldo-akhir').innerText = "Rp " + total.toLocaleString();
    });

    function delW(id) { if(confirm("Hapus data saldo ini?")) dbWallet.ref('riwayat/'+id).remove(); }
    
    function dlW(tgl, m, k) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.setFontSize(18); doc.text("STRUK DOMPET DIGITAL", 10, 20);
        doc.setFontSize(12); doc.text(`Tanggal: ${tgl}`, 10, 40);
        doc.text(`Pemasukan: Rp ${m.toLocaleString()}`, 10, 50);
        doc.text(`Pengeluaran: Rp ${k.toLocaleString()}`, 10, 60);
        doc.text(`Status: BERHASIL`, 10, 70);
        doc.save(`Saldo_${tgl}.pdf`);
    }

    // --- FUNGSI GUDANG ---
    function sendGudang() {
        const d = { nm: val('g-nama'), jn: val('g-jenis'), jml: val('g-jumlah'), st: val('g-stok') };
        if(d.nm) dbGudang.ref('stok').push(d);
    }
    dbGudang.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val();
            tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.jn}</td><td>${v.jml}</td><td>${v.st}</td>
            <td><button class="act-btn" style="background:red;" onclick="dbGudang.ref('stok/${c.key}').remove()">HAPUS</button></td></tr>`;
        });
    });

    // --- FUNGSI TRANSAKSI & LAINNYA ---
    function simpanData(tipe, pre) {
        const d = { tipe, nama: val(pre+'nama'), tanggal: val(pre+'tgl') };
        if(d.nama) dbData.ref('transaksi').push(d);
    }
    dbData.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = "";
        s.forEach(c => { const v = c.val(); tb.innerHTML += `<tr><td>${v.tipe}</td><td>${v.nama}</td><td>${v.tanggal}</td><td>UNIT</td></tr>`; });
    });

    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function val(id) { return document.getElementById(id).value; }
    function logout() { window.location.href='index.html'; }
</script>
</body>
</html>
