<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kirim Setoran - Gibran Hub</title>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
  
  :root {
    --bg: #0d0b14;
    --card: #1e1830;
    --purple: #7c3aed;
    --text: #f1f0f5;
    --text-dim: #a09abd;
    --border: rgba(124,58,237,0.25);
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 20px;
  }

  .container { max-width: 450px; margin: auto; }

  h2 { font-weight: 800; margin-bottom: 5px; color: var(--purple); }
  p { font-size: 13px; color: var(--text-dim); margin-bottom: 25px; }

  /* Upload Box */
  .upload-box {
    border: 2px dashed var(--purple);
    background: rgba(124, 58, 237, 0.05);
    border-radius: 20px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .upload-box b { display: block; margin-top: 10px; font-size: 14px; }

  /* Form */
  label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim); margin: 15px 0 8px; text-transform: uppercase; }
  
  input, select {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #151125;
    color: white;
    font-family: inherit;
    margin-bottom: 15px;
  }

  /* Signature */
  .sig-wrapper {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  canvas#sig-canvas { width: 100%; height: 180px; touch-action: none; }
  .btn-clear {
    position: absolute; top: 10px; right: 10px;
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444; border: none; padding: 5px 12px;
    border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
  }

  .btn-submit {
    width: 100%;
    padding: 18px;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 16px;
    font-weight: 800;
    font-size: 16px;
    margin-top: 25px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
  }
</style>
</head>
<body>

<div class="container">
  <h2>Unggah Setoran</h2>
  <p>Pastikan semua data sudah benar sebelum dikirim.</p>

  <div class="upload-box" onclick="document.getElementById('file-input').click()">
    <span style="font-size: 40px;">☁️</span>
    <b>Unggah Bukti Setor</b>
    <small style="color: var(--text-dim)">Ketuk untuk memilih foto</small>
    <input type="file" id="file-input" style="display: none">
  </div>

  <label>Nama Penyetor</label>
  <input type="text" id="s-nama" placeholder="Masukkan nama lengkap">

  <label>Setor Ke Siapa</label>
  <select id="s-target">
    <option value="Bu Tati">Bu Tati</option>
    <option value="Bu Ami">Bu Ami</option>
  </select>

  <label>Tanda Tangan Digital</label>
  <div class="sig-wrapper">
    <canvas id="sig-canvas"></canvas>
    <button class="btn-clear" onclick="clearCanvas()">Hapus</button>
  </div>

  <button class="btn-submit" onclick="submitSetoran()">Kirim Setoran ➤</button>
</div>

<script>
  // -- KONFIGURASI FIREBASE LO --
  const firebaseConfig = {
    apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
    authDomain: "tempat-masuk-nya-data.firebaseapp.com",
    databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
    projectId: "tempat-masuk-nya-data",
    storageBucket: "tempat-masuk-nya-data.firebasestorage.app",
    messagingSenderId: "918742049565",
    appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // -- LOGIC TANDA TANGAN --
  const canvas = document.getElementById('sig-canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function start(e) { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); }
  function draw(e) {
    if(!drawing) return;
    const pos = getPos(e);
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#7c3aed";
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
  }
  function stop() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
  canvas.addEventListener('touchend', stop);

  function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

  // -- KIRIM KE DATABASE --
  function submitSetoran() {
    const nama = document.getElementById('s-nama').value;
    const target = document.getElementById('s-target').value;
    const ttd = canvas.toDataURL(); // Mengambil gambar TTD

    if(!nama) return alert("Tolong isi Nama Penyetor!");

    db.ref('setoran_masuk').push({
      nama: nama,
      target: target,
      tanda_tangan: ttd,
      waktu: new Date().toLocaleString()
    }).then(() => {
      alert("✅ Setoran berhasil dikirim!");
      location.reload();
    }).catch((err) => alert("Gagal: " + err.message));
  }
</script>

</body>
</html>
