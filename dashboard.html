<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.1 | ULTIMATE DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --bg: #050505; --card: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .wrapper { display: flex; height: 100vh; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a111a, #050505); }

        /* Sidebar Nav */
        .logo { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.4rem; margin-bottom: 40px; text-shadow: 0 0 10px var(--cyan); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.2); color: #888; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 12px; text-align: left; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); border-color: var(--cyan); }

        /* Components */
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        .card-h { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); margin-bottom: 20px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 10px; }

        input, select, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; background: var(--cyan); color: black; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 12px; font-family: 'Orbitron'; font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING</button>
        <button class="nav-btn" onclick="show('setoran-view', this)">INPUT SETORAN</button>
        <button class="nav-btn" onclick="show('laporan-view', this)">INPUT LAPORAN</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ PENGATURAN</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT SYSTEM</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card">
                <div class="card-h">LIVE STATUS OPERATOR</div>
                <h2 id="user-display">---</h2>
                <p style="color:#00ff88">System Status: Active & Secured</p>
            </div>
            <div class="card">
                <div class="card-h">DATA MONITORING TERPADU</div>
                <div id="data-list">Loading database...</div>
            </div>
        </div>

        <div id="setoran-view" class="section">
            <div class="card">
                <div class="card-h">KHUSUS INPUT SETORAN</div>
                <label>Jumlah Setoran</label><input type="number" id="s-jumlah">
                <label>Tujuan</label><select id="s-tujuan"><option>Kasir Utama</option><option>Bank Central</option></select>
                <button class="btn-main" onclick="simpanSetoran()">KIRIM SETORAN</button>
            </div>
        </div>

        <div id="laporan-view" class="section">
            <div class="card">
                <div class="card-h">LAPORAN KEGIATAN UMUM</div>
                <label>Judul Laporan</label><input type="text" id="l-judul">
                <label>Isi Laporan</label><textarea id="l-isi" rows="5"></textarea>
                <button class="btn-main" onclick="simpanLaporan()">SIMPAN LAPORAN</button>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">INPUT STOK BARANG</div>
                <input type="text" id="g-nama" placeholder="Nama Barang">
                <input type="number" id="g-stok" placeholder="Jumlah">
                <button class="btn-main" onclick="simpanGudang()">TAMBAH STOK</button>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card">
                <div class="card-h">CLOUD NOTES (AUTO-SYNC)</div>
                <textarea id="cloud-note" style="height: 350px; background: rgba(0,0,0,0.3);" placeholder="Ketik catatan di sini..."></textarea>
            </div>
        </div>

        <div id="setting-view" class="section">
            <div class="card">
                <div class="card-h">PENGATURAN SISTEM</div>
                <p>ID Database: <span id="db-id">Gudang-893cd</span></p>
                <button class="btn-main" style="background:#444" onclick="location.reload()">REFRESH SYSTEM</button>
                <p style="margin-top:20px; font-size:12px; color:gray;">Versi Dashboard: v26.1 (Stabil)</p>
            </div>
        </div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG FIX (No Mismatched Braces) ---
    const config = {
        databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // -- Session --
    const user = localStorage.getItem('user_gibran') || "User";
    document.getElementById('user-display').innerText = user;

    // -- Navigasi --
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // -- CRUD Simpel --
    function simpanSetoran() {
        const val = document.getElementById('s-jumlah').value;
        if(val) { db.ref('setoran').push({ user, jumlah: val, tgl: new Date().toLocaleString() }); alert("Setoran Terkirim!"); }
    }

    // -- Notes Sync --
    const noteArea = document.getElementById('cloud-note');
    db.ref('notes').on('value', s => { if(!noteArea.matches(':focus')) noteArea.value = s.val()?.text || ""; });
    noteArea.oninput = (e) => db.ref('notes').set({ text: e.target.value });

    function logout() { localStorage.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
