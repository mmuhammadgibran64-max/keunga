<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v27.2 | FULL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--cyan); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 80px; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.1); color: #888; padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        .section { display: none; } .section.active { display: block; }
        .card { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 12px; border-bottom: 1px solid rgba(0,212,255,0.2); }
        .flex-row { display: flex; gap: 15px; flex-wrap: wrap; } .flex-col { flex: 1; min-width: 250px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 6px; margin-bottom: 8px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 6px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 8px; font-family: 'Orbitron'; font-size: 8px; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .act-btn { padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 8px; font-family: 'Orbitron'; color: white; margin-right: 4px; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:20px;">GIBRAN HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">REKAP & MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">LAPORAN, SETORAN & SALDO</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG SYSTEM</button>
        <button class="nav-btn" onclick="show('setting-view', this)">PENGATURAN & CS</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">LIVE REKAP DATA</div><canvas id="rekapChart" style="max-height: 200px;"></canvas></div>
            <div class="card"><div class="card-h">TRANSAKSI MASUK</div><div style="overflow-x:auto;"><table><thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TTD</th><th>TUJUAN</th></tr></thead><tbody id="tbody-monitor"></tbody></table></div></div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col card">
                    <div class="card-h">INPUT LAPORAN</div>
                    <input type="text" id="l-nama" placeholder="Nama Pelapor">
                    <input type="date" id="l-tgl">
                    <input type="text" id="l-ttd" placeholder="Tanda Tangan">
                    <select id="l-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <button class="btn-main" style="background:var(--red); color:white" onclick="simpan('LAPORAN','l-')">KIRIM LAPORAN</button>
                </div>
                <div class="flex-col card">
                    <div class="card-h">INPUT SETORAN</div>
                    <input type="text" id="s-nama" placeholder="Nama Penyetor">
                    <input type="date" id="s-tgl">
                    <input type="text" id="s-ttd" placeholder="Tanda Tangan">
                    <select id="s-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <button class="btn-main" style="background:var(--cyan); color:black" onclick="simpan('SETORAN','s-')">KIRIM SETORAN</button>
                </div>
            </div>
            <div class="card" style="border: 1px solid var(--gold);">
                <div class="card-h">DOMPET DIGITAL - SISA SALDO</div>
                <h2 id="saldo-akhir" style="color:var(--gold); font-family:'Orbitron';">Rp 0</h2>
                <div class="flex-row"><input type="number" id="w-masuk" placeholder="Masuk" class="flex-col"><input type="number" id="w-keluar" placeholder="Sisa/Keluar" class="flex-col"></div>
                <button class="btn-main" style="background:var(--gold); color:black" onclick="updateW()">UPDATE & SIMPAN</button>
                <div style="margin-top:15px; overflow-x:auto;">
                    <table><thead><tr><th>TGL</th><th>MASUK</th><th>SISA</th><th>AKSI</th></tr></thead><tbody id="tbody-wallet"></tbody></table>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">INPUT BARANG GUDANG</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Nama Barang" class="flex-col">
                    <input type="text" id="g-jenis" placeholder="Jenis" class="flex-col">
                    <input type="number" id="g-jumlah" placeholder="Jumlah" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--cyan); color:black" onclick="sendG()">SIMPAN BARANG</button>
            </div>
            <div class="card"><div class="card-h">STOK GUDANG</div><div style="overflow-x:auto;"><table><thead><tr><th>NAMA</th><th>JENIS</th><th>JML</th><th>STOK</th><th>AKSI</th></tr></thead><tbody id="tbody-gudang"></tbody></table></div></div>
        </div>

        <div id="setting-view" class="section">
            <div class="card"><div class="card-h">PENGATURAN PROFIL</div><input type="text" id="p-nama" placeholder="Nama Admin"><button class="btn-main" onclick="alert('Profil Diupdate')">SIMPAN</button></div>
        </div>
    </main>
</div>

<script>
    // SEMUA CONFIG FIREBASE (TIDAK ADA YANG DIHAPUS)
    const cData = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const cGudang = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const cWallet = { databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com" };

    const appD = firebase.initializeApp(cData, "D");
    const appG = firebase.initializeApp(cGudang, "G");
    const appW = firebase.initializeApp(cWallet, "W");

    const dbD = firebase.database(appD); const dbG = firebase.database(appG); const dbW = firebase.database(appW);

    // FUNGSI TRANSAKSI
    function simpan(t, p) {
        const d = { tipe:t, nama:v(p+'nama'), tgl:v(p+'tgl'), ttd:v(p+'ttd'), tujuan:v(p+'tujuan') };
        if(d.nama) dbD.ref('transaksi').push(d).then(()=>alert("Berhasil!"));
    }
    dbD.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = "";
        let L=0, S=0;
        s.forEach(c => {
            const r = c.val(); r.tipe === "LAPORAN" ? L++ : S++;
            tb.innerHTML += `<tr><td>${r.tipe}</td><td>${r.nama}</td><td>${r.tgl}</td><td>${r.ttd}</td><td>${r.tujuan}</td></tr>`;
        });
        renderChart(L, S);
    });

    // FUNGSI WALLET (HAPUS & DOWNLOAD)
    function updateW() {
        dbW.ref('riwayat').push({ tgl: new Date().toLocaleString(), m: parseInt(v('w-masuk'))||0, k: parseInt(v('w-keluar'))||0 });
    }
    dbW.ref('riwayat').on('value', s => {
        const tb = document.getElementById('tbody-wallet'); tb.innerHTML = ""; let tot = 0;
        s.forEach(c => {
            const r = c.val(); const k = c.key; tot += (r.m - r.k);
            tb.innerHTML += `<tr><td>${r.tgl}</td><td>${r.m}</td><td>${r.k}</td><td>
                <button class="act-btn" style="background:red" onclick="dbW.ref('riwayat/${k}').remove()">HAPUS</button>
                <button class="act-btn" style="background:blue" onclick="dlPDF('${r.tgl}',${r.m},${r.k})">DL</button>
            </td></tr>`;
        });
        document.getElementById('saldo-akhir').innerText = "Rp " + tot.toLocaleString();
    });

    // FUNGSI GUDANG (4 KOLOM)
    function sendG() {
        dbG.ref('stok').push({ n:v('g-nama'), j:v('g-jenis'), jml:v('g-jumlah'), st:v('g-stok') });
    }
    dbG.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const r = c.val();
            tb.innerHTML += `<tr><td>${r.n}</td><td>${r.j}</td><td>${r.jml}</td><td>${r.st}</td><td><button class="act-btn" style="background:red" onclick="dbG.ref('stok/${c.key}').remove()">HAPUS</button></td></tr>`;
        });
    });

    // CHART & UTILS
    let chart;
    function renderChart(l, s) {
        const ctx = document.getElementById('rekapChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'bar', data:{ labels:['LAPORAN','SETORAN'], datasets:[{ data:[l, s], backgroundColor:['#ff0055','#00d4ff'] }] } });
    }
    function dlPDF(t, m, k) {
        const doc = new jspdf.jsPDF(); doc.text(`STRUK SALDO: ${t}\nMasuk: ${m}\nSisa: ${k}`, 10, 10); doc.save(`Struk.pdf`);
    }
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function v(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
