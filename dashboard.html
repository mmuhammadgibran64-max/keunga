<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard Bisnis | Gibran</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
  
  :root {
    --bg: #0d0b14; --card: #1e1830; --purple: #7c3aed; --text: #f1f0f5; --text-dim: #a09abd;
    --border: rgba(124,58,237,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; }
  
  .container { padding: 20px; max-width: 500px; margin: auto; }
  
  /* System Page Switching */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Dashboard UI */
  .hero-card { background: linear-gradient(135deg, var(--purple), #4c1d95); border-radius: 24px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
  .stat-box { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid var(--border); }

  /* Grid Menu */
  .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
  .menu-item { text-align: center; cursor: pointer; transition: 0.2s; }
  .menu-item:active { transform: scale(0.9); }
  .icon-box { width: 55px; height: 55px; background: var(--card); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 8px; border: 1px solid var(--border); }
  .menu-item span { font-size: 11px; font-weight: 700; color: var(--text-dim); }

  /* Form UI (Setoran) */
  label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim); margin: 15px 0 8px; text-transform: uppercase; }
  input, select { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid var(--border); background: #151125; color: white; font-family: inherit; }
  .upload-area { border: 2px dashed var(--purple); background: rgba(124,58,237,0.05); border-radius: 20px; padding: 30px; text-align: center; cursor: pointer; }

  /* Navigasi */
  .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #13101e; display: flex; border-top: 1px solid var(--border); padding: 15px 0; z-index: 1000; }
  .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-dim); cursor: pointer; }
  .nav-item.active { color: var(--purple); }
  .nav-item b { display: block; font-size: 22px; margin-bottom: 4px; }

  .btn-submit { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--purple); color: white; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">

  <div id="pg-dash" class="page active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-weight:800;">Dashboard</h2>
      <div style="background:var(--card); padding:10px; border-radius:12px;">🔔</div>
    </div>

    <div class="hero-card">
      <small style="opacity:0.8;">Total Saldo (Firebase Realtime)</small>
      <h1 id="live-saldo" style="font-size: 32px; margin: 8px 0;">Rp 0</h1>
      <div style="font-size:11px; background:rgba(255,255,255,0.2); display:inline-block; padding:4px 12px; border-radius:20px;">Status: Online</div>
    </div>

    <div class="menu-grid">
      <div class="menu-item" onclick="navTo('pg-setoran')"><div class="icon-box">💰</div><span>Setoran</span></div>
      <div class="menu-item" onclick="navTo('pg-laporan')"><div class="icon-box">📄</div><span>Laporan</span></div>
      <div class="menu-item"><div class="icon-box">📦</div><span>Stok</span></div>
      <div class="menu-item"><div class="icon-box">⚙️</div><span>Setting</span></div>
    </div>

    <h3 style="margin-bottom:15px; font-size:16px;">Grafik Mingguan</h3>
    <div class="stat-box"><canvas id="chartDashboard"></canvas></div>
  </div>

  <div id="pg-setoran" class="page">
    <h2 style="color:var(--purple); margin-bottom:10px;">Kirim Setoran</h2>
    <div class="upload-area" onclick="document.getElementById('f-setor').click()">
      <span style="font-size:35px;">📸</span><br><b>Ambil Foto Bukti</b>
      <input type="file" id="f-setor" style="display:none">
    </div>
    <label>Nama Pengirim</label>
    <input type="text" id="s-nama" placeholder="Masukkan Nama">
    <label>Nominal</label>
    <input type="number" id="s-nominal" placeholder="Contoh: 100000">
    <label>Tujuan</label>
    <select id="s-tujuan"><option>Bu Tati</option><option>Bu Ami</option></select>
    <button class="btn-submit" onclick="pushData('setoran')">Kirim Sekarang ➤</button>
  </div>

</div>

<nav class="nav">
  <div class="nav-item active" onclick="navTo('pg-dash', this)"><b>🏠</b>Home</div>
  <div class="nav-item" onclick="navTo('pg-setoran', this)"><b>💰</b>Setoran</div>
  <div class="nav-item"><b>👤</b>Profil</div>
</nav>

<script>
  // 1. FIREBASE CONFIG LO
  const firebaseConfig = {
    apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
    authDomain: "tempat-masuk-nya-data.firebaseapp.com",
    databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
    projectId: "tempat-masuk-nya-data",
    storageBucket: "tempat-masuk-nya-data.firebasestorage.app",
    messagingSenderId: "918742049565",
    appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // 2. NAVIGASI INTERNAL (Anti 404)
  function navTo(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
  }

  // 3. PUSH DATA KE FIREBASE
  function pushData(type) {
    const nama = document.getElementById('s-nama').value;
    const nominal = Number(document.getElementById('s-nominal').value);
    
    if(!nama || !nominal) return alert("Isi data dengan lengkap!");

    db.ref('bisnis_gibran/' + type).push({
      nama: nama,
      nominal: nominal,
      tujuan: document.getElementById('s-tujuan').value,
      waktu: new Date().toISOString()
    }).then(() => {
      alert("✅ Data Berhasil Masuk!");
      navTo('pg-dash');
    });
  }

  // 4. REALTIME MONITORING (Update Saldo di Dashboard)
  db.ref('bisnis_gibran/setoran').on('value', snap => {
    let total = 0;
    snap.forEach(c => { total += (c.val().nominal || 0); });
    document.getElementById('live-saldo').innerText = "Rp " + total.toLocaleString();
  });

  // 5. CHART JS
  new Chart(document.getElementById('chartDashboard'), {
    type: 'bar',
    data: {
      labels: ['S','S','R','K','J','S','M'],
      datasets: [{ data: [10, 25, 15, 30, 20, 40, 25], backgroundColor: '#7c3aed', borderRadius: 6 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
  });
</script>
</body>
</html>
