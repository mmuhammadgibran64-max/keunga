<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.7 | DIGITAL WALLET</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.98); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0a111a, #050505); padding-bottom: 100px; }
        .nav-btn { background: transparent; border: 1px solid rgba(0, 212, 255, 0.1); color: #888; padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 10px; text-align: left; transition: 0.3s; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 15px var(--cyan); }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; }
        input, select { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        
        /* WALLET STYLE */
        .wallet-card { background: linear-gradient(135deg, #1a1a1a, #004d40); border: 2px solid var(--cyan); border-radius: 20px; padding: 25px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
        .wallet-balance { font-family: 'Orbitron'; font-size: 32px; color: var(--cyan); margin: 10px 0; text-shadow: 0 0 10px var(--cyan); }
        .wallet-chip { width: 40px; height: 30px; background: var(--gold); border-radius: 5px; margin-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .act-btn { padding: 5px 8px; border-radius: 5px; border: none; font-size: 8px; cursor: pointer; font-family: 'Orbitron'; margin-right: 5px; }

        @media print {
            nav, .btn-main, .act-btn, input, label, .card-h { display: none !important; }
            body { background: white; color: black; }
            .wrapper { display: block; }
            .wallet-card { border: 2px solid black; color: black; background: white; }
            table { color: black; border: 1px solid black; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo" style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:30px;">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">CLOUD NOTES</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ PENGATURAN</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">LOGOUT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div id="rekap-area" class="card"><div class="card-h">TOTAL REKAP</div><p id="total-info">Loading rekap...</p></div>
            <div class="card"><div class="card-h">MONITORING TRANSAKSI</div><div style="overflow-x:auto;"><table><thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>TUJUAN</th></tr></thead><tbody id="tbody-monitor"></tbody></table></div></div>
        </div>

        <div id="input-view" class="section">
            <div style="display: flex; gap:20px; margin-bottom:20px;">
                <div class="card" style="flex:1;"><div class="card-h">INPUT LAPORAN</div><input type="text" id="l-nama" placeholder="Nama"><button class="btn-main" style="background:var(--red); color:white" onclick="sendLaporan()">KIRIM</button></div>
                <div class="card" style="flex:1;"><div class="card-h">INPUT SETORAN</div><input type="text" id="s-nama" placeholder="Nama"><button class="btn-main" style="background:var(--cyan); color:black" onclick="sendSetoran()">KIRIM</button></div>
            </div>

            <div class="card">
                <div class="card-h">DOMPET DIGITAL - SISA SALDO</div>
                <div class="wallet-card" id="wallet-display">
                    <div class="wallet-chip"></div>
                    <div style="font-size:10px; font-family:'Orbitron';">SISA SALDO ANDA</div>
                    <div class="wallet-balance" id="saldo-akhir">Rp 0</div>
                    <div style="font-size:12px; letter-spacing:2px;" id="wallet-user">**** **** **** 0000</div>
                </div>
                
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <div style="flex:1;"><label style="font-size:10px;">Pemasukan Saldo</label><input type="number" id="w-masuk" placeholder="Rp 0"></div>
                    <div style="flex:1;"><label style="font-size:10px;">Pengeluaran Saldo</label><input type="number" id="w-keluar" placeholder="Rp 0"></div>
                </div>
                <button class="btn-main" style="background:var(--gold); color:black;" onclick="updateWallet()">UPDATE SALDO & SIMPAN RIWAYAT</button>
            </div>

            <div class="card">
                <div class="card-h">RIWAYAT DOMPET DIGITAL</div>
                <button class="btn-main" style="background:#00ff88; color:black; width:150px; margin-bottom:15px;" onclick="window.print()">🖨️ PRINT LAPORAN</button>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>TANGGAL</th><th>MASUK</th><th>KELUAR</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-wallet"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section"> <div class="card"><div class="card-h">GUDANG SYSTEM</div><p>Aktif...</p></div> </div>
        <div id="notes-view" class="section"> <div class="card"><div class="card-h">CLOUD NOTES</div><textarea id="cloud-note" style="height:200px"></textarea></div> </div>
        <div id="setting-view" class="section"> <div class="card"><div class="card-h">PENGATURAN</div><p>Aktif...</p></div> </div>
    </main>
</div>



<script>
    // --- FIREBASE CONFIGS ---
    const confData = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const confWallet = { databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com" };

    const appData = firebase.initializeApp(confData, "DATA");
    const appWallet = firebase.initializeApp(confWallet, "WALLET");

    const dbData = firebase.database(appData);
    const dbWallet = firebase.database(appWallet);

    // --- FITUR DOMPET DIGITAL (WALLET) ---
    function updateWallet() {
        const masuk = parseInt(document.getElementById('w-masuk').value) || 0;
        const keluar = parseInt(document.getElementById('w-keluar').value) || 0;
        const tgl = new Date().toLocaleString();

        if (masuk === 0 && keluar === 0) {
            alert("Isi dulu pemasukan atau pengeluaran!");
            return;
        }

        const data = { tgl, masuk, keluar };
        dbWallet.ref('riwayat_saldo').push(data).then(() => {
            alert("Saldo Diperbarui!");
            document.getElementById('w-masuk').value = "";
            document.getElementById('w-keluar').value = "";
        });
    }

    // Load Saldo & Riwayat
    dbWallet.ref('riwayat_saldo').on('value', snapshot => {
        const tbody = document.getElementById('tbody-wallet');
        tbody.innerHTML = "";
        let totalSaldo = 0;

        snapshot.forEach(child => {
            const v = child.val();
            const k = child.key;
            totalSaldo += (v.masuk - v.keluar);

            tbody.innerHTML += `
                <tr>
                    <td>${v.tgl}</td>
                    <td style="color:#00ff88">+Rp ${v.masuk.toLocaleString()}</td>
                    <td style="color:#ff0055">-Rp ${v.keluar.toLocaleString()}</td>
                    <td>
                        <button class="act-btn" style="background:red; color:white;" onclick="delW('${k}')">HAPUS</button>
                        <button class="act-btn" style="background:var(--cyan); color:black;" onclick="dlW('${v.tgl}',${v.masuk},${v.keluar})">DL</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('saldo-akhir').innerText = "Rp " + totalSaldo.toLocaleString();
    });

    function delW(k) { if(confirm("Hapus riwayat ini?")) dbWallet.ref('riwayat_saldo/'+k).remove(); }

    function dlW(tgl, m, k) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("BUKTI TRANSAKSI DOMPET DIGITAL", 10, 10);
        doc.text(`Tanggal: ${tgl}`, 10, 20);
        doc.text(`Pemasukan: Rp ${m}`, 10, 30);
        doc.text(`Pengeluaran: Rp ${k}`, 10, 40);
        doc.save(`transaksi_${tgl}.pdf`);
    }

    // --- FUNGSI NAVIGASI & UTILS (TIDAK BERUBAH) ---
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function logout() { localStorage.clear(); window.location.href='index.html'; }

    // --- FUNGSI DATA SEBELUMNYA (ANTI HAPUS) ---
    function sendLaporan() { /* Kode laporan lo yang lama */ }
    function sendSetoran() { /* Kode setoran lo yang lama */ }
    dbData.ref('transaksi').on('value', s => { /* Update monitoring lo */ });
</script>
</body>
</html>
