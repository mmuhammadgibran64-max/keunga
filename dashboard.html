<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v13.5 | ALL-IN-ONE DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; }
        
        /* Sidebar Navigation */
        nav { width: 220px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--neon); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 25px; text-shadow: 0 0 10px var(--neon); }
        .nav-btn { background: transparent; border: 1px solid rgba(0,210,255,0.2); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; border-radius: 4px; transition: 0.3s; text-align: left; }
        .nav-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); font-weight: bold; }
        
        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 20px; background: radial-gradient(circle at top, #0a111a 0%, #05070a 100%); }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grafik Row */
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .chart-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(0,210,255,0.2); border-radius: 12px; padding: 10px; position: relative; }
        .chart-label { font-family: 'Orbitron'; font-size: 8px; color: var(--neon); margin-bottom: 5px; text-align: center; }
        .chart-val { position: absolute; top: 10px; right: 15px; font-family: 'Orbitron'; color: var(--neon-green); font-size: 14px; }

        /* Forms Layout */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.15); padding: 15px; border-radius: 12px; backdrop-filter: blur(10px); }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.7rem; margin-bottom: 12px; border-left: 3px solid var(--neon); padding-left: 8px; }
        
        label { display: block; font-size: 9px; color: var(--neon); font-family: 'Orbitron'; margin-top: 8px; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; font-size: 12px; outline: none; box-sizing: border-box; }
        
        .btn-action { background: var(--neon); color: black; border: none; padding: 12px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 5px; margin-top: 15px; }
        .calc-display { background: #000; padding: 10px; text-align: right; border: 1px solid var(--neon); color: var(--neon-green); font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 8px; border-radius: 5px; }
        img.prev { width: 100%; height: 100px; object-fit: cover; border-radius: 5px; border: 1px solid var(--neon); margin-top: 8px; display: none; }
        
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; color: var(--neon); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="loader"><h2>UPLOADING_SYSTEM...</h2></div>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('main-view', this)">● HUB MONITOR</button>
        <button class="nav-btn" onclick="show('warehouse', this)">● GUDANG</button>
        <button class="nav-btn" onclick="show('notes-view', this)">● NOTES & CALC</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--neon-red);" onclick="logout()">● EXIT</button>
    </nav>

    <main>
        <div id="main-view" class="section active">
            <div class="chart-row">
                <div class="chart-card">
                    <div class="chart-label">SETORAN PROGRESS (0-1000)</div>
                    <div class="chart-val" id="val-setoran">0</div>
                    <canvas id="chartSetoran" height="100"></canvas>
                </div>
                <div class="chart-card">
                    <div class="chart-label">LAPORAN PROGRESS (0-1000)</div>
                    <div class="chart-val" id="val-laporan">0</div>
                    <canvas id="chartLaporan" height="100"></canvas>
                </div>
            </div>

            <div class="grid-container">
                <div class="card">
                    <div class="card-h">FORM SETORAN</div>
                    <label>BUKTI FOTO</label>
                    <input type="file" id="setor-foto" accept="image/*" capture="camera" onchange="preview(this, 'p-setor')">
                    <img id="p-setor" class="prev">
                    <label>NAMA PENYETOR</label><input type="text" id="setor-nama">
                    <label>TANGGAL</label><input type="date" id="setor-tgl">
                    <label>SETOR KE</label>
                    <select id="setor-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>TANDA TANGAN</label><input type="text" id="setor-ttd">
                    <button class="btn-action" onclick="kirimData('setoran', 'setor')">KIRIM SETORAN</button>
                </div>

                <div class="card">
                    <div class="card-h" style="border-color:var(--neon-green); color:var(--neon-green);">FORM LAPORAN</div>
                    <label>BUKTI LAPORAN</label>
                    <input type="file" id="lap-foto" accept="image/*" capture="camera" onchange="preview(this, 'p-lap')">
                    <img id="p-lap" class="prev">
                    <label>NAMA PELAPOR</label><input type="text" id="lap-nama">
                    <label>TANGGAL LAPOR</label><input type="date" id="lap-tgl">
                    <label>LAPOR KE</label>
                    <select id="lap-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <label>TANDA TANGAN</label><input type="text" id="lap-ttd">
                    <button class="btn-action" style="background:var(--neon-green)" onclick="kirimData('laporan', 'lap')">KIRIM LAPORAN</button>
                </div>
            </div>
        </div>

        <div id="warehouse" class="section">
            <div class="card">
                <div class="card-h">GUDANG BARANG</div>
                <label>NAMA BARANG</label><input type="text" id="gd-nama">
                <label>STOK</label><input type="number" id="gd-stok">
                <button class="btn-action" onclick="kirimKeHub('gudang', {item: val('gd-nama'), qty: val('gd-stok')})">UPDATE GUDANG</button>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card">
                <div class="card-h">CLOUD NOTES & CALC</div>
                <textarea id="catatan-cloud" rows="8"></textarea>
                <div class="calc-display" id="calc-val">0</div>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                    <button class="nav-btn" onclick="calc('7')">7</button><button class="nav-btn" onclick="calc('8')">8</button><button class="nav-btn" onclick="calc('9')">9</button><button class="nav-btn" onclick="calc('/')">/</button>
                    <button class="nav-btn" onclick="calc('C')">C</button><button class="nav-btn" onclick="calc('0')">0</button><button class="nav-btn" onclick="calc('=')">=</button><button class="nav-btn" onclick="calc('+')">+</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const configData = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        authDomain: "tempat-masuk-nya-data.firebaseapp.com",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com/",
        projectId: "tempat-masuk-nya-data",
        appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4"
    };
    const configHub = { databaseURL: "https://catatan-ac4a2-default-rtdb.firebaseio.com/" };

    const appData = firebase.initializeApp(configData, "appData");
    const appHub = firebase.initializeApp(configHub, "appHub");
    const dbData = firebase.database(appData);
    const dbHub = firebase.database(appHub);

    // --- CHART LOGIC ---
    function initChart(id, color) {
        return new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels: Array(10).fill(''), datasets: [{ data: [0], borderColor: color, fill: true, backgroundColor: color+'11', tension: 0.4, borderWidth: 2, pointRadius: 0 }]},
            options: { responsive: true, scales: { y: { display: false, max: 1000 }, x: { display: false } }, plugins: { legend: { display: false } } }
        });
    }
    const cSetoran = initChart('chartSetoran', '#00ff88');
    const cLaporan = initChart('chartLaporan', '#00d2ff');

    function animateChart(chart, valId, target) {
        let cur = 0;
        const limit = target > 1000 ? 1000 : target;
        const step = () => {
            if(cur < limit) {
                cur += 10;
                document.getElementById(valId).innerText = cur;
                chart.data.datasets[0].data.push(cur);
                if(chart.data.datasets[0].data.length > 15) chart.data.datasets[0].data.shift();
                chart.update();
                requestAnimationFrame(step);
            }
        };
        step();
    }

    // Monitor Firebase untuk Grafik
    dbData.ref('setoran').on('value', s => animateChart(cSetoran, 'val-setoran', s.numChildren()));
    dbData.ref('laporan').on('value', s => animateChart(cLaporan, 'val-laporan', s.numChildren()));

    // --- FUNGSI KIRIM ---
    async function kirimData(folder, prefix) {
        const file = document.getElementById(prefix + '-foto').files[0];
        const payload = {
            nama: val(prefix + '-nama'),
            tanggal: val(prefix + '-tgl'),
            tujuan: val(prefix + '-tujuan'),
            ttd: val(prefix + '-ttd'),
            waktu: new Date().toLocaleString()
        };
        if(!payload.nama || !file) return alert("DATA TIDAK LENGKAP!");

        document.getElementById('loader').style.display = 'flex';
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function() {
            payload.gambar = reader.result;
            await dbData.ref(folder + '/').push(payload);
            alert("DATA MASUK KE CLOUD!");
            location.reload();
        };
    }

    // --- UI & HUB ---
    function val(id) { return document.getElementById(id).value; }
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function preview(input, imgId) {
        const [file] = input.files;
        if (file) {
            document.getElementById(imgId).src = URL.createObjectURL(file);
            document.getElementById(imgId).style.display = 'block';
        }
    }
    function logout() { localStorage.removeItem('gibran_user'); window.location.href = 'index.html'; }

    // Cloud Notes
    const noteRef = dbHub.ref('gibran_hub/catatan_live');
    noteRef.on('value', s => { if(s.val()) document.getElementById('catatan-cloud').value = s.val().teks; });
    document.getElementById('catatan-cloud').oninput = e => noteRef.set({ teks: e.target.value });

    // Kalkulator
    let curIn = "";
    function calc(v) {
        const d = document.getElementById('calc-val');
        if(v==='C'){curIn=""; d.innerText="0";}
        else if(v==='='){try{curIn=eval(curIn).toString(); d.innerText=curIn;}catch{d.innerText="ERR";}}
        else{curIn+=v; d.innerText=curIn;}
    }
</script>
</body>
</html>
