<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | MAINFRAME v8.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-line { width: 250px; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); position: relative; overflow: hidden; }
        .scan-line::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #fff, transparent); animation: scan 1.5s infinite; }
        @keyframes scan { 100% { left: 100%; } }

        header { padding: 15px 30px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        .logo { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.1); padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.65rem; margin-bottom: 12px; letter-spacing: 2px; border-left: 3px solid var(--neon); padding-left: 10px; }

        .form-group { margin-bottom: 8px; }
        label { display: block; font-size: 9px; margin-bottom: 3px; color: var(--neon); font-family: 'Orbitron'; }
        input, select, textarea { width: 100%; padding: 7px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; box-sizing: border-box; font-size: 11px; }
        
        .btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-family: 'Orbitron'; font-size: 9px; transition: 0.3s; width: 100%; margin-top: 5px; }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        /* Gudang Search Loading */
        #search-loading { display: none; text-align: center; margin-top: 10px; color: var(--neon-green); font-family: 'Orbitron'; font-size: 10px; }
        .search-results { margin-top: 10px; font-size: 11px; border-top: 1px solid rgba(0,210,255,0.2); padding-top: 10px; display: none; }

        /* Calculator */
        .calc-display { background: #000; color: var(--neon-green); padding: 8px; text-align: right; font-family: 'Orbitron'; border: 1px solid var(--neon); margin-bottom: 5px; font-size: 14px; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .calc-btn { padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: white; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">INITIALIZING GUDANG SYSTEM...</h2>
        <div class="scan-line"></div>
    </div>

    <header>
        <div class="logo">GIBRAN_HUB v8.0</div>
        <div style="font-family: 'Orbitron'; font-size: 10px; color: var(--neon-green);">WAREHOUSE NODE: ON</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="card-h">FORM SETORAN</div>
            <div class="form-group"><label>NAMA PENYETOR</label><input type="text"></div>
            <div class="form-group"><label>TANGGAL</label><input type="date"></div>
            <div class="form-group"><label>FOTO BUKTI</label><input type="file" accept="image/*"></div>
            <button class="btn" onclick="alert('Sent to: tempat masuk nya data')">KIRIM SETORAN</button>
        </div>

        <div class="card">
            <div class="card-h">FORM LAPORAN</div>
            <div class="form-group"><label>NAMA PELAPOR</label><input type="text"></div>
            <div class="form-group"><label>TANGGAL</label><input type="date"></div>
            <div class="form-group"><label>FOTO LAPORAN</label><input type="file" accept="image/*"></div>
            <button class="btn" onclick="alert('Sent to: tempat masuk nya data')">KIRIM LAPORAN</button>
        </div>

        <div class="card">
            <div class="card-h">CATATAN & KALKULATOR</div>
            <textarea id="note-text" rows="2" placeholder="Notes..."></textarea>
            <button class="btn" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="alert('Saved to: catatan')">SAVE NOTE</button>
            <div class="calc-display" id="display">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="inputCalc('7')">7</button><button class="calc-btn" onclick="inputCalc('8')">8</button><button class="calc-btn" onclick="inputCalc('9')">9</button><button class="calc-btn" onclick="inputCalc('/')">/</button>
                <button class="calc-btn" onclick="calculate()">=</button><button class="calc-btn" onclick="inputCalc('0')">0</button><button class="calc-btn" onclick="clearCalc()">C</button><button class="calc-btn" onclick="inputCalc('+')">+</button>
            </div>
        </div>

        <div class="card">
            <div class="card-h">GUDANG BARANG</div>
            <div class="form-group"><label>NAMA BARANG</label><input type="text" id="g-nama"></div>
            <div style="display: flex; gap: 5px;">
                <div class="form-group" style="flex:1;"><label>UKURAN</label><input type="text" id="g-ukuran"></div>
                <div class="form-group" style="flex:1;"><label>STOK</label><input type="number" id="g-stok" placeholder="0 = Kosong"></div>
            </div>
            <div style="display: flex; gap: 5px;">
                <div class="form-group" style="flex:1;"><label>TIPE</label><input type="text" id="g-tipe"></div>
                <div class="form-group" style="flex:1;"><label>JENIS</label><input type="text" id="g-jenis"></div>
            </div>
            <button class="btn" style="border-color: var(--neon-green); color: var(--neon-green);" onclick="alert('Data masuk ke sheet: gudang barang')">SIMPAN KE GUDANG</button>
            
            <hr style="border: 0.1px solid rgba(0,210,255,0.1); margin: 10px 0;">
            <label>CARI BARANG DI GUDANG</label>
            <input type="text" id="search-input" placeholder="Ketik nama barang...">
            <button class="btn" onclick="searchGudang()">CARI BARANG</button>
            
            <div id="search-loading">SEARCHING DATABASE...</div>
            <div id="search-results" class="search-results">
                <p id="res-data" style="color: var(--neon);"></p>
                <p id="res-status"></p>
            </div>
        </div>
    </div>

    <script>
        // Loading
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);

        // Calc
        let currentInput = "";
        function inputCalc(val) { currentInput += val; document.getElementById('display').innerText = currentInput; }
        function clearCalc() { currentInput = ""; document.getElementById('display').innerText = "0"; }
        function calculate() { try { currentInput = eval(currentInput).toString(); document.getElementById('display').innerText = currentInput; } catch { document.getElementById('display').innerText = "ERR"; } }

        // Gudang Search Engine Simulation
        function searchGudang() {
            const input = document.getElementById('search-input').value;
            if(!input) return alert('Ketik nama barang dulu, Bro!');
            
            const loading = document.getElementById('search-loading');
            const results = document.getElementById('search-results');
            
            results.style.display = 'none';
            loading.style.display = 'block';

            setTimeout(() => {
                loading.style.display = 'none';
                results.style.display = 'block';
                document.getElementById('res-data').innerText = "FOUND: " + input.toUpperCase();
                document.getElementById('res-status').innerText = "STATUS: TERSEDIA (IN SHEET GUDANG BARANG)";
                document.getElementById('res-status').style.color = "#00ff88";
            }, 3000); // Loading 3 detik biar keren
        }
    </script>
</body>
</html>
