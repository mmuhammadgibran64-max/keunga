<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN MAINFRAME | COMMAND CENTER v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --neon-red: #ff4444; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Loading Screen */
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .scan-line { width: 250px; height: 2px; background: var(--neon); box-shadow: 0 0 15px var(--neon); position: relative; overflow: hidden; }
        .scan-line::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, #fff, transparent); animation: scan 1.5s infinite; }
        @keyframes scan { 100% { left: 100%; } }

        /* Sidebar Layout */
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: rgba(0,0,0,0.9); border-right: 2px solid var(--neon); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: transparent; border: 1px solid rgba(0,210,255,0.3); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-align: left; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); border-color: white; }

        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top, #0a111a 0%, #05070a 100%); }
        
        /* Components */
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.8rem; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; margin-bottom: 10px; font-size: 13px; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 10px; font-family: 'Orbitron'; cursor: pointer; width: 100%; font-size: 11px; font-weight: bold; }
        .btn-danger { background: var(--neon-red); color: white; }

        .hidden-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">ESTABLISHING COMMAND CENTER...</h2>
        <div class="scan-line"></div>
    </div>

    <div class="wrapper">
        <nav>
            <div style="font-family: 'Orbitron'; color: var(--neon); margin-bottom: 30px; font-size: 1.2rem;">GIBRAN HUB</div>
            <button class="nav-btn active" onclick="openSection('main-hub', this)">● MAIN HUB</button>
            <button class="nav-btn" onclick="openSection('warehouse', this)">● WAREHOUSE</button>
            <button class="nav-btn" onclick="openSection('settings', this)">● SETTINGS (ADMIN)</button>
            <div style="margin-top: auto; font-size: 10px; color: var(--neon-green); font-family: 'Orbitron';">WAREHOUSE NODE: ON</div>
        </nav>

        <main>
            <div id="main-hub" class="active-section">
                <div class="grid-3">
                    <div class="card">
                        <div class="card-h">FORM SETORAN</div>
                        <input type="text" placeholder="Nama Penyetor">
                        <input type="date">
                        <input type="file" accept="image/*">
                        <button class="btn-action">KIRIM SETORAN</button>
                    </div>
                    <div class="card">
                        <div class="card-h">FORM LAPORAN</div>
                        <input type="text" placeholder="Nama Pelapor">
                        <input type="date">
                        <input type="file" accept="image/*">
                        <button class="btn-action">KIRIM LAPORAN</button>
                    </div>
                    <div class="card">
                        <div class="card-h">CATATAN & KALKULATOR</div>
                        <textarea rows="3" placeholder="Notes..."></textarea>
                        <button class="btn-action" style="background:var(--neon-green)">SIMPAN CATATAN</button>
                    </div>
                </div>
            </div>

            <div id="warehouse" class="hidden-section">
                <div class="card">
                    <div class="card-h">GUDANG BARANG MANAGEMENT</div>
                    <div class="grid-3">
                        <input type="text" placeholder="Nama Barang">
                        <input type="text" placeholder="Ukuran">
                        <input type="number" placeholder="Stok">
                        <input type="text" placeholder="Tipe">
                        <input type="text" placeholder="Jenis">
                        <button class="btn-action">SIMPAN KE GUDANG</button>
                    </div>
                </div>
            </div>

            <div id="settings" class="hidden-section">
                <div class="grid-3">
                    <div class="card">
                        <div class="card-h">PENGATURAN PROFIL</div>
                        <input type="text" value="GIBRAN ADMIN" readonly>
                        <button class="btn-action">UPDATE PROFIL</button>
                    </div>
                    <div class="card">
                        <div class="card-h">LIVE SUPPORT (CS)</div>
                        <div id="cs-box" style="background: white; border-radius: 5px; height: 100px; overflow: hidden;">
                            <script src='https://www.noupe.com/embed/019c363e1a677de79971b57751677dbb45dd.js'></script>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-h">SISTEM DATA</div>
                        <button class="btn-action" onclick="alert('Backup tersembunyi dibuat ke cloud...')">BACKUP DATA TERSEMBUNYI</button>
                        <button class="btn-action btn-danger" style="margin-top:10px" onclick="confirm('YAKIN HAPUS SEMUA DATA PERMANEN?')">HAPUS DATA PERMANEN</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-h">DISTRIBUSI DATA & DOWNLOAD</div>
                    <p style="font-size: 12px; color: rgba(255,255,255,0.5);">Akses file manager publik untuk download semua data laporan.</p>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-action" onclick="downloadAll()">DOWNLOAD DATA (FILE MANAGER)</button>
                        <button class="btn-action" style="background: #25D366; color: white;" onclick="shareWA()">BAGIKAN KE WA</button>
                        <button class="btn-action" style="background: #555; color: white;" onclick="shareOther()">BAGIKAN LAINNYA</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Loading
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);

        // Section Switcher
        function openSection(id, btn) {
            document.querySelectorAll('main > div').forEach(div => {
                div.className = 'hidden-section';
            });
            document.getElementById(id).className = 'active-section';
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Beneran Download (Membuat file log otomatis)
        function downloadAll() {
            const content = "DATABASE GIBRAN HUB v9.0\nExport Date: " + new Date() + "\nStatus: All Clean.";
            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'GibranHub_Backup.txt';
            a.click();
        }

        // Beneran Share WA
        function shareWA() {
            const url = window.location.href;
            window.open(`https://wa.me/?text=Halo, silakan akses Data Gibran Hub di sini: ${url}`, '_blank');
        }

        // Share API (Beneran bukan simulasi)
        async function shareOther() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Gibran Hub Data',
                        text: 'Cek laporan terbaru di Gibran Hub Mainframe.',
                        url: window.location.href,
                    });
                } catch (err) { console.log('Error sharing: ' + err); }
            } else {
                alert('Browser lo gak dukung Web Share API, pakai WA aja!');
            }
        }
    </script>
</body>
</html>
