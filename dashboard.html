<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v26.0 | DASHBOARD SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --green: #00ff88; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        
        /* Sidebar */
        nav { width: 240px; background: #000; border-right: 2px solid var(--purple); padding: 25px; display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .logo { font-family: 'Orbitron'; color: var(--red); font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(112, 0, 255, 0.3); color: var(--purple); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; outline: none; }
        .nav-btn.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #100a1a, #050505); padding-bottom: 100px; }
        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & UI */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--red); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,0,85,0.2); padding-bottom: 8px; }
        
        /* Form Elements */
        label { display: block; font-size: 10px; color: var(--purple); font-family: 'Orbitron'; margin: 10px 0 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(112, 0, 255, 0.2); color: white; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-send:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        th { text-align: left; color: var(--purple); border-bottom: 2px solid var(--purple); padding: 10px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .action-btn { padding: 5px 8px; font-size: 9px; font-family: 'Orbitron'; border: none; border-radius: 4px; cursor: pointer; margin-right: 3px; color: white; }
        .btn-del { background: var(--red); }
        .btn-pdf { background: var(--purple); }
        .btn-prt { background: var(--green); color: black; }

        /* Print Settings */
        @media print {
            nav, .btn-send, .action-btn, .input-area { display: none !important; }
            main { padding: 0; background: white; color: black; }
            .card { border: none; box-shadow: none; color: black; }
            .section { display: block !important; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('dash-view', this)">● MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">● INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">● GUDANG & STOK</button>
        <button class="nav-btn" onclick="show('notes-view', this)">● CLOUD NOTES</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">● LOGOUT SYSTEM</button>
    </nav>

    <main id="main-content">
        <div id="dash-view" class="section active">
            <div class="grid">
                <div class="card"><canvas id="chartSetoran" height="150"></canvas></div>
                <div class="card">
                    <center>
                        <div style="width:60px; height:60px; border-radius:50%; background:var(--purple); display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:10px;">👤</div>
                        <h3 id="user-display">OPERATOR</h3>
                        <p style="color:gray; font-size:12px;">Status: Online Access</p>
                    </center>
                </div>
            </div>
            <div class="card">
                <div class="card-h">LIVE MONITOR DATA</div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>TGL</th><th>NAMA</th><th>TUJUAN</th><th>PARAF</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-setoran"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="card input-area">
                <div class="card-h">FORM INPUT SETORAN / LAPORAN</div>
                <div class="grid">
                    <div>
                        <label>Nama Pengirim</label><input type="text" id="i-nama">
                        <label>Tanggal</label><input type="date" id="i-tgl">
                    </div>
                    <div>
                        <label>Tujuan Ke</label>
                        <select id="i-ke"><option>BU TATI</option><option>BU AMI</option></select>
                        <label>Paraf / TTD</label><input type="text" id="i-ttd">
                    </div>
                </div>
                <button class="btn-send" style="background:var(--red)" onclick="kirimData()">KIRIM DATA SEKARANG</button>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card input-area">
                <div class="card-h">INPUT BARANG GUDANG</div>
                <div class="grid">
                    <div>
                        <label>Nama Barang</label><input type="text" id="g-nama">
                        <label>Tipe</label><input type="text" id="g-tipe">
                    </div>
                    <div>
                        <label>Ukuran</label><input type="text" id="g-ukuran">
                        <label>Stok (Jumlah)</label><input type="number" id="g-stok">
                    </div>
                </div>
                <button class="btn-send" style="background:var(--purple)" onclick="simpanGudang()">SIMPAN STOK GUDANG</button>
            </div>
            <div class="card" style="margin-top:20px;">
                <div class="card-h">DAFTAR STOK GUDANG</div>
                <div style="overflow-x: auto;">
                    <table id="table-gudang">
                        <thead><tr><th>NAMA</th><th>TIPE</th><th>UKURAN</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
                <button onclick="window.print()" class="btn-send" style="background:var(--green); color:black; margin-top:15px; width:200px;">PRINT SEMUA STOK</button>
            </div>
        </div>

        <div id="notes-view" class="section">
            <div class="card">
                <div class="card-h">PERSONAL CLOUD NOTES</div>
                <textarea id="cloud-note" rows="15" placeholder="Tulis catatan penting di sini... (Auto-sync)"></textarea>
            </div>
        </div>
    </main>
</div>

<script type="text/javascript">var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();(function(){var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];s1.async=true; s1.src='https://embed.tawk.to/6993e93bd5bd3b1c3ca44cb6/1jiv87bnq';s1.charset='UTF-8'; s1.setAttribute('crossorigin','*');s0.parentNode.insertBefore(s1,s0);})();</script>

<script>
    // --- FIREBASE TRIPLE CONFIG ---
    const configU = { databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com" };
    const configG = { databaseURL: "https://gudang-barang-893cd-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const configN = { databaseURL: "https://catatankakulator-default-rtdb.firebaseio.com" };

    firebase.initializeApp(configU, "U");
    firebase.initializeApp(configG, "G");
    firebase.initializeApp(configN, "N");

    const dbU = firebase.database(firebase.app("U"));
    const dbG = firebase.database(firebase.app("G"));
    const dbN = firebase.database(firebase.app("N"));

    // --- SESSION CHECK ---
    window.onload = () => {
        const user = localStorage.getItem('user_gibran');
        if(!user) { window.location.href='index.html'; }
        else { document.getElementById('user-display').innerText = user; }
    };

    // --- LOGIKA GUDANG ---
    function simpanGudang() {
        const d = { nm:val('g-nama'), tp:val('g-tipe'), uk:val('g-ukuran'), st:val('g-stok') };
        if(d.nm && d.st) {
            dbG.ref('stok_barang').push(d).then(() => { alert("Stok Berhasil Disimpan!"); resetG(); });
        } else { alert("Nama & Stok wajib diisi!"); }
    }
    dbG.ref('stok_barang').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val(); const k = c.key;
            tb.innerHTML += `<tr><td>${v.nm}</td><td>${v.tp}</td><td>${v.uk}</td><td>${v.st}</td>
            <td><button class="action-btn btn-pdf" onclick="dlPDF('${v.nm}','${v.tp}','${v.st}')">PDF</button>
            <button class="action-btn btn-del" onclick="delG('${k}')">HAPUS</button></td></tr>`;
        });
    });
    function delG(k) { if(confirm("Hapus barang?")) dbG.ref('stok_barang/'+k).remove(); }
    function dlPDF(n,t,s) {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text(`LAPORAN GUDANG: ${n}\nTipe: ${t}\nStok: ${s}`, 10, 20);
        doc.save(`Stok_${n}.pdf`);
    }

    // --- LOGIKA SETORAN ---
    function kirimData() {
        const d = { nama:val('i-nama'), tgl:val('i-tgl'), ke:val('i-ke'), ttd:val('i-ttd') };
        if(d.nama) { dbU.ref('setoran').push(d).then(() => { alert("Data Terkirim!"); }); }
    }
    dbU.ref('setoran').on('value', s => {
        const tb = document.getElementById('tbody-setoran'); tb.innerHTML = "";
        s.forEach(c => {
            const v = c.val(); const k = c.key;
            tb.innerHTML += `<tr><td>${v.tgl}</td><td>${v.nama}</td><td>${v.ke}</td><td>${v.ttd}</td>
            <td><button class="action-btn btn-prt" onclick="window.print()">PRINT</button>
            <button class="action-btn btn-del" onclick="delS('${k}')">HAPUS</button></td></tr>`;
        });
    });
    function delS(k) { if(confirm("Hapus data ini?")) dbU.ref('setoran/'+k).remove(); }

    // --- CLOUD NOTES AUTO-SYNC ---
    const noteArea = document.getElementById('cloud-note');
    dbN.ref('user_notes').on('value', s => { if(s.val() && !noteArea.matches(':focus')) noteArea.value = s.val().text; });
    noteArea.oninput = (e) => dbN.ref('user_notes').set({ text: e.target.value });

    // --- UTILS ---
    function val(id) { return document.getElementById(id).value; }
    function resetG() { ['g-nama','g-tipe','g-ukuran','g-stok'].forEach(id => document.getElementById(id).value = ""); }
    function show(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function logout() { localStorage.clear(); window.location.href='index.html'; }

    // --- CHART ---
    const ctx = document.getElementById('chartSetoran').getContext('2d');
    const chartSetoran = new Chart(ctx, { type: 'bar', data: { labels: ['Total Setoran'], datasets: [{ label: 'Data', data: [0], backgroundColor: '#ff0055' }] } });
    dbU.ref('setoran').on('value', s => { chartSetoran.data.datasets[0].data = [s.numChildren()]; chartSetoran.update(); });
</script>
</body>
</html>
