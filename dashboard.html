<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v28.4 | ULTIMATE PRINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.95); --purple: #bc13fe; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 12px; box-shadow: 5px 0 20px rgba(0, 212, 255, 0.2); }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0d1621, #050505); padding-bottom: 100px; }
        
        .nav-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.1); color: #777; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 10px; text-align: left; transition: 0.4s; letter-spacing: 1px; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); border: 1px solid var(--cyan); font-weight: bold; }
        
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .card-h { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }

        .flex-row { display: flex; gap: 20px; flex-wrap: wrap; }
        .flex-col { flex: 1; min-width: 280px; }

        label { font-size: 11px; color: #aaa; margin-bottom: 6px; display: block; font-family: 'Orbitron'; }
        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 15px; font-family: 'Rajdhani'; outline: none; }
        
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 12px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .act-btn { padding: 8px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 8px; font-family: 'Orbitron'; color: white; transition: 0.3s; margin-right: 2px; }
        img.table-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; border: 1px solid var(--cyan); }
    </style>
</head>
<body>

<div class="wrapper">
    <nav>
        <div style="font-family:'Orbitron'; color:var(--cyan); text-align:center; margin-bottom:30px; font-size:22px; letter-spacing: 4px; text-shadow: 0 0 10px var(--cyan);">GIBRAN<br>HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">📊 MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">📝 INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">📦 GUDANG</button>
        <button class="nav-btn" onclick="show('setting-view', this)">💰 DOMPET & SETTING</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">LIVE ANALYTICS</div><canvas id="rekapChart" style="max-height: 220px;"></canvas></div>
            <div class="card">
                <div class="card-h">RECENT TRANSACTIONS</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>BUKTI</th><th>TUJUAN</th><th>AKSI</th></tr>
                        </thead>
                        <tbody id="tbody-monitor"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div class="flex-row">
                <div class="flex-col card">
                    <div class="card-h">INPUT LAPORAN</div>
                    <label>NAMA PELAPOR</label><input type="text" id="l-nama" placeholder="Nama">
                    <label>TANGGAL</label><input type="date" id="l-tgl">
                    <label>BUKTI</label><input type="file" id="l-bukti" accept="image/*">
                    <label>TTD</label><input type="text" id="l-ttd" placeholder="Nama TTD">
                    <label>KE</label>
                    <select id="l-tujuan"><option value="BU TATI">BU TATI</option><option value="BU AMI">BU AMI</option></select>
                    <button class="btn-main" style="background:var(--red); color:white" onclick="simpan('LAPORAN','l-')">KIRIM</button>
                </div>
                <div class="flex-col card">
                    <div class="card-h">INPUT SETORAN</div>
                    <label>NAMA PENYETOR</label><input type="text" id="s-nama" placeholder="Nama">
                    <label>TANGGAL</label><input type="date" id="s-tgl">
                    <label>BUKTI</label><input type="file" id="s-bukti" accept="image/*">
                    <label>TTD</label><input type="text" id="s-ttd" placeholder="Nama TTD">
                    <label>KE</label>
                    <select id="s-tujuan"><option value="BU TATI">BU TATI</option><option value="BU AMI">BU AMI</option></select>
                    <button class="btn-main" style="background:var(--cyan); color:black" onclick="simpan('SETORAN','s-')">KIRIM</button>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">GUDANG ENTRY</div>
                <div class="flex-row">
                    <input type="text" id="g-nama" placeholder="Barang" class="flex-col">
                    <input type="text" id="g-jenis" placeholder="Jenis" class="flex-col">
                    <input type="number" id="g-jumlah" placeholder="Jumlah" class="flex-col">
                    <input type="number" id="g-stok" placeholder="Stok" class="flex-col">
                </div>
                <button class="btn-main" style="background:var(--purple); color:white" onclick="sendG()">UPDATE GUDANG</button>
            </div>
            <div class="card">
                <div class="card-h">INVENTORY LIST</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NAMA</th><th>JENIS</th><th>JML</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="setting-view" class="section">
            <div class="card" style="border: 2px solid var(--gold);">
                <div class="card-h" style="color:var(--gold)">WALLET MANAGEMENT</div>
                <div style="text-align: center; margin-bottom: 25px;">
                    <span style="font-size: 11px; color: var(--gold); font-family: 'Orbitron';">SALDO AKHIR</span>
                    <h1 id="saldo-akhir" style="color:white; font-family:'Orbitron'; margin: 10px 0; font-size: 45px; text-shadow: 0 0 15px var(--gold);">Rp 0</h1>
                </div>
                <div class="flex-row">
                    <div class="flex-col"><label>MASUK</label><input type="number" id="w-masuk" placeholder="0"></div>
                    <div class="flex-col"><label>KELUAR</label><input type="number" id="w-keluar" placeholder="0"></div>
                </div>
                <button class="btn-main" style="background:var(--gold); color:black;" onclick="updateW()">SIMPAN SALDO</button>

                <div style="margin-top: 35px;">
                    <div class="card-h">HISTORY TRANSAKSI WALLET</div>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr><th>WAKTU</th><th>MASUK</th><th>KELUAR</th><th>AKSI</th></tr>
                            </thead>
                            <tbody id="tbody-wallet"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // CONFIGS
    const configA = { apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs", authDomain: "tempat-masuk-nya-data.firebaseapp.com", databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com", projectId: "tempat-masuk-nya-data", appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4" };
    const configB = { apiKey: "AIzaSyCdNwDr9lUsUE2iv43vW6q89VZMXPix8us", authDomain: "sisa-saldo.firebaseapp.com", databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com", projectId: "sisa-saldo", appId: "1:152603234485:web:1f82e28d57b2a5f2d8aefc" };
    const configG = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };

    if (!firebase.apps.length) firebase.initializeApp(configA);
    const appG = firebase.apps.find(a => a.name === "G") || firebase.initializeApp(configG, "G");
    const appW = firebase.apps.find(a => a.name === "W") || firebase.initializeApp(configB, "W");

    const dbD = firebase.database();       
    const dbG = firebase.database(appG);    
    const dbW = firebase.database(appW);    

    // --- FUNGSI PRINT & PDF GLOBAL ---
    function printUniversal(judul, detail) {
        const p = window.open('', '_blank');
        p.document.write(`<html><head><title>Print_Struk</title><style>body{font-family:sans-serif;padding:30px;}.b{border:1px solid #000;padding:20px;width:280px;margin:auto;}h3{text-align:center;margin-top:0; border-bottom:1px solid #000; padding-bottom:10px;}</style></head><body><div class="b"><h3>${judul}</h3>${detail}<hr><p style="font-size:10px;text-align:center">${new Date().toLocaleString()}</p></div><script>window.print();window.close();<\/script></body></html>`);
    }

    function dlPDFUniversal(filename, content) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("GIBRAN HUB - OFFICIAL REPORT", 10, 20);
        doc.text("---------------------------------------", 10, 25);
        let y = 40;
        content.forEach(line => { doc.text(line, 10, y); y += 10; });
        doc.save(filename + ".pdf");
    }

    // --- LOGIC GUDANG ---
    function sendG() {
        const n = v('g-nama'), j = v('g-jenis'), jm = v('g-jumlah'), s = v('g-stok');
        if(!n) return alert("Isi Nama Barang!");
        dbG.ref('stok').push({ nm:n, jn:j, jml:jm, st:s }).then(()=>alert("Gudang Updated!"));
    }
    dbG.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => {
            const r = c.val();
            tb.innerHTML += `<tr><td>${r.nm}</td><td>${r.jn}</td><td>${r.jml}</td><td>${r.st}</td>
            <td>
                <button class="act-btn" style="background:#333" onclick="dbG.ref('stok/${c.key}').remove()">X</button>
                <button class="act-btn" style="background:var(--cyan); color:black" onclick="dlPDFUniversal('Stok_${r.nm}', ['Barang: ${r.nm}', 'Jenis: ${r.jn}', 'Jumlah: ${r.jml}', 'Sisa: ${r.st}'])">SAVE</button>
                <button class="act-btn" style="background:var(--purple)" onclick="printUniversal('STRUK GUDANG', '<p>Barang: ${r.nm}</p><p>Jenis: ${r.jn}</p><p>Jumlah: ${r.jml}</p><p>Sisa: ${r.st}</p>')">PRINT</button>
            </td></tr>`;
        });
    });

    // --- LOGIC WALLET ---
    function updateW() {
        const m = parseInt(v('w-masuk')) || 0, k = parseInt(v('w-keluar')) || 0;
        if(m === 0 && k === 0) return alert("Isi data!");
        dbW.ref('riwayat').push({ tgl: new Date().toLocaleString('id-ID'), m: m, k: k });
        document.getElementById('w-masuk').value = ""; document.getElementById('w-keluar').value = "";
    }
    dbW.ref('riwayat').on('value', s => {
        const tb = document.getElementById('tbody-wallet'); tb.innerHTML = ""; let tot = 0;
        s.forEach(c => {
            const r = c.val(); tot += (r.m - r.k);
            tb.innerHTML += `<tr><td>${r.tgl}</td><td style="color:var(--cyan)">+ ${r.m.toLocaleString()}</td><td style="color:var(--red)">- ${r.k.toLocaleString()}</td>
            <td>
                <button class="act-btn" style="background:#333" onclick="dbW.ref('riwayat/${c.key}').remove()">X</button>
                <button class="act-btn" style="background:var(--cyan); color:black" onclick="dlPDFUniversal('Wallet_${r.tgl}', ['Waktu: ${r.tgl}', 'Masuk: Rp ${r.m}', 'Keluar: Rp ${r.k}'])">SAVE</button>
                <button class="act-btn" style="background:var(--purple)" onclick="printUniversal('STRUK DOMPET', '<p>Waktu: ${r.tgl}</p><p>Masuk: Rp ${r.m.toLocaleString()}</p><p>Keluar: Rp ${r.k.toLocaleString()}</p>')">PRINT</button>
            </td></tr>`;
        });
        document.getElementById('saldo-akhir').innerText = "Rp " + tot.toLocaleString();
    });

    // --- LOGIC MONITORING ---
    function simpan(tipe, pre) {
        const f = document.getElementById(pre+'bukti');
        const d = { tipe: tipe, nama: v(pre+'nama'), tgl: v(pre+'tgl'), ttd: v(pre+'ttd'), tujuan: v(pre+'tujuan'), waktu: new Date().toLocaleString() };
        if(f.files[0]) {
            const r = new FileReader(); r.onload = (e) => { d.img = e.target.result; dbD.ref('transaksi').push(d).then(()=>alert("Terkirim!")); };
            r.readAsDataURL(f.files[0]);
        } else { dbD.ref('transaksi').push(d).then(()=>alert("Terkirim!")); }
    }
    dbD.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = ""; let L=0, S=0;
        s.forEach(c => { const r = c.val(); r.tipe === "LAPORAN" ? L++ : S++;
            tb.innerHTML += `<tr><td>${r.tipe}</td><td>${r.nama}</td><td>${r.tgl}</td><td>${r.img ? `<img src="${r.img}" class="table-img" onclick="window.open(this.src)">` : '-'}</td><td>${r.tujuan}</td><td><button class="act-btn" style="background:#333" onclick="dbD.ref('transaksi/${c.key}').remove()">X</button></td></tr>`;
        }); renderChart(L,S);
    });

    // UTILS
    let chart;
    function renderChart(l, s) {
        const ctx = document.getElementById('rekapChart').getContext('2d'); if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'bar', data:{ labels:['LAPORAN','SETORAN'], datasets:[{ label:'Data', data:[l, s], backgroundColor:['#ff0055','#00d4ff'] }] }, options:{plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, grid:{color:'rgba(255,255,255,0.05)'}}}} });
    }
    function show(id, btn) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function v(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
