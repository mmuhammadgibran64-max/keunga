<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v13 | FULL FIREBASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        #loader { position: fixed; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 250px; background: rgba(0,0,0,0.95); border-right: 2px solid var(--neon); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-family: 'Orbitron'; color: var(--neon); font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; text-shadow: 0 0 10px var(--neon); }
        .nav-btn { background: transparent; border: 1px solid rgba(0,210,255,0.2); color: var(--neon); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; text-align: left; border-radius: 4px; transition: 0.3s; outline: none; }
        .nav-btn.active { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); font-weight: bold; }
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top, #0a111a 0%, #05070a 100%); }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card-bg); border: 1px solid rgba(0, 210, 255, 0.15); padding: 20px; border-radius: 12px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        .card-h { font-family: 'Orbitron'; color: var(--neon); font-size: 0.75rem; margin-bottom: 15px; border-left: 3px solid var(--neon); padding-left: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,210,255,0.3); color: white; border-radius: 5px; margin-bottom: 10px; font-size: 13px; outline: none; box-sizing: border-box; font-family: 'Rajdhani'; }
        .btn-action { background: var(--neon); color: black; border: none; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-action:hover { box-shadow: 0 0 20px var(--neon); transform: scale(1.02); }
        .calc-display { background: #000; padding: 15px; text-align: right; border: 1px solid var(--neon); color: var(--neon-green); font-family: 'Orbitron'; font-size: 1.5rem; margin-bottom: 10px; border-radius: 5px; min-height: 40px; }
        .status-bar { position: fixed; bottom: 10px; right: 20px; font-size: 9px; color: var(--neon-green); font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="loader"><h2 style="font-family: Orbitron; color: var(--neon);">CONNECTING_TO_FIREBASE...</h2></div>

    <div class="wrapper">
        <nav>
            <div class="logo">GIBRAN_HUB v13</div>
            <button class="nav-btn active" onclick="show('main-hub', this)">● DASHBOARD</button>
            <button class="nav-btn" onclick="show('warehouse', this)">● GUDANG BARANG</button>
            <button class="nav-btn" onclick="show('sales', this)">● PENJUALAN & ABSEN</button>
            <button class="nav-btn" onclick="show('settings', this)">● PENGATURAN</button>
        </nav>

        <main>
            <div id="main-hub" class="section active">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="card">
                        <div class="card-h">FORM LAPORAN & SETORAN</div>
                        <select id="lap-jenis"><option>LAPORAN HARIAN</option><option>SETORAN BU TATI</option></select>
                        <input type="text" id="lap-nama" placeholder="Input Nama Penyetor">
                        <textarea id="lap-catatan" rows="3" placeholder="Tambahkan catatan jika ada..."></textarea>
                        <button class="btn-action" onclick="kirimKeFirebase('laporan', {jenis: val('lap-jenis'), nama: val('lap-nama'), note: val('lap-catatan')})">KIRIM KE FIREBASE</button>
                    </div>
                    <div class="card">
                        <div class="card-h">CLOUD NOTES (AUTO-SAVE)</div>
                        <textarea id="catatan-cloud" rows="5" placeholder="Ketik di sini... data otomatis sinkron ke Firebase."></textarea>
                        <div class="calc-display" id="calc-val">0</div>
                        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px;">
                            <button class="nav-btn" onclick="calc('7')">7</button><button class="nav-btn" onclick="calc('8')">8</button><button class="nav-btn" onclick="calc('9')">9</button><button class="nav-btn" onclick="calc('/')">/</button>
                            <button class="nav-btn" onclick="calc('C')">C</button><button class="nav-btn" onclick="calc('0')">0</button><button class="nav-btn" onclick="calc('=')">=</button><button class="nav-btn" onclick="calc('+')">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="warehouse" class="section">
                <div class="card">
                    <div class="card-h">GUDANG BARANG MANAGEMENT</div>
                    <input type="text" id="gd-nama" placeholder="Nama Barang">
                    <input type="number" id="gd-stok" placeholder="Jumlah Stok">
                    <button class="btn-action" onclick="kirimKeFirebase('gudang', {item: val('gd-nama'), stok: val('gd-stok')})">UPDATE STOK</button>
                </div>
            </div>

            <div id="sales" class="section">
                <div class="card">
                    <div class="card-h">PENJUALAN & ABSENSI</div>
                    <input type="number" id="sl-duit" placeholder="Total Penghasilan (Rp)">
                    <button class="btn-action" style="background:var(--neon-green)" onclick="kirimKeFirebase('sales', {duit: val('sl-duit')})">SIMPAN DATA SALES</button>
                </div>
            </div>

            <div id="settings" class="section">
                <div class="card" style="text-align: center;">
                    <div class="card-h">PROFIL ADMIN</div>
                    <button class="btn-action" onclick="location.reload()">REBOOT SYSTEM</button>
                </div>
            </div>
        </main>
    </div>

    <div class="status-bar" id="sync-status">FIREBASE: CONNECTED</div>

    <script>
        // 1. GANTI DENGAN URL DATABASE LO
        const firebaseConfig = {
            databaseURL: "https://catatan-ac4a2-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. FUNGSI KIRIM DATA (FULL FIREBASE)
        function kirimKeFirebase(folder, dataObj) {
            document.getElementById('loader').style.display = 'flex';
            dataObj.waktu = new Date().toLocaleString();
            
            // Push data ke folder yang dipilih di Firebase
            db.ref('gibran_hub/' + folder).push(dataObj)
            .then(() => {
                alert("BERHASIL: Data sudah masuk ke Kotak Firebase!");
                location.reload();
            })
            .catch((e) => {
                alert("GAGAL: Cek Rules Firebase lo!");
                document.getElementById('loader').style.display = 'none';
            });
        }

        // 3. AUTO-SYNC CATATAN (REAL-TIME)
        const noteRef = db.ref('gibran_hub/catatan_live');
        noteRef.on('value', (s) => { 
            if(s.val()) document.getElementById('catatan-cloud').value = s.val().teks; 
        });

        document.getElementById('catatan-cloud').addEventListener('input', (e) => {
            noteRef.set({ teks: e.target.value, updated: new Date().toLocaleTimeString() });
            document.getElementById('sync-status').innerText = "FIREBASE: SYNCING...";
            setTimeout(() => document.getElementById('sync-status').innerText = "FIREBASE: CONNECTED", 1000);
        });

        // 4. NAVIGASI & HELPERS
        function val(id) { return document.getElementById(id).value; }
        function show(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 5. KALKULATOR
        let inputCur = "";
        function calc(v) {
            const d = document.getElementById('calc-val');
            if(v==='C'){inputCur=""; d.innerText="0";}
            else if(v==='='){try{inputCur=eval(inputCur).toString(); d.innerText=inputCur;}catch{d.innerText="ERR";}}
            else{inputCur+=v; d.innerText=inputCur;}
        }

        window.onload = () => {
            setTimeout(() => document.getElementById('loader').style.display='none', 1000);
        };
    </script>
</body>
</html>
