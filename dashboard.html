<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v19.0 | DETAIL FORM SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --purple: #7000ff; --green: #00ff88; --bg: #050505; --card: rgba(20, 20, 20, 0.9); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }
        .wrapper { display: flex; height: 100vh; }
        nav { width: 240px; background: #000; border-right: 2px solid var(--purple); padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .logo { font-family: 'Orbitron'; color: var(--red); font-size: 1.2rem; margin-bottom: 30px; text-shadow: 0 0 10px var(--red); text-align: center; }
        .nav-btn { background: transparent; border: 1px solid rgba(112, 0, 255, 0.3); color: var(--purple); padding: 12px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 8px; text-align: left; transition: 0.3s; }
        .nav-btn.active { background: var(--purple); color: white; box-shadow: 0 0 15px var(--purple); }
        
        main { flex: 1; overflow-y: auto; padding: 25px; background: radial-gradient(circle at top right, #100a1a, #050505); padding-bottom: 100px; }
        .section { display: none; animation: slideUp 0.4s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-h { font-family: 'Orbitron'; font-size: 11px; color: var(--red); margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,0,85,0.2); padding-bottom: 8px; }

        label { display: block; font-size: 10px; color: var(--purple); font-family: 'Orbitron'; margin: 10px 0 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(112, 0, 255, 0.2); color: white; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; }
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; margin-top: 20px; color: white; transition: 0.3s; }
        
        .img-prev { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 1px dashed var(--purple); margin-top: 10px; display: none; }
        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; color: var(--red); font-family: 'Orbitron'; }
    </style>
</head>
<body>

<div id="loader"><h2>UPLOADING_DATA...</h2></div>

<div class="wrapper">
    <nav>
        <div class="logo">GIBRAN_HUB</div>
        <button class="nav-btn active" onclick="show('mon-view', this)">● INPUT DATA</button>
        <button class="nav-btn" onclick="show('notes-view', this)">● NOTES & CALC</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">● GUDANG BARANG</button>
        <button class="nav-btn" style="margin-top:auto; color:var(--red);" onclick="logout()">● EXIT</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="grid">
                <div class="card">
                    <div class="card-h">FORM BUKTI SETORAN</div>
                    <label>BUKTI SETOR (FOTO)</label>
                    <input type="file" id="s-foto" accept="image/*" capture="camera" onchange="preview(this, 'p-s')">
                    <img id="p-s" class="img-prev">

                    <label>NAMA YANG SETOR</label>
                    <input type="text" id="s-nama" placeholder="Ketik nama...">
                    
                    <label>TANGGAL SETOR</label>
                    <input type="date" id="s-tgl">

                    <label>SETOR KE SIAPA</label>
                    <select id="s-ke">
                        <option value="BU TATI">BU TATI</option>
                        <option value="BU AMI">BU AMI</option>
                    </select>

                    <label>TANDA TANGAN (NAMA TERANG)</label>
                    <input type="text" id="s-ttd" placeholder="Paraf nama...">

                    <button class="btn-send" style="background: var(--red);" onclick="kirim('setoran', 's')">KIRIM SETORAN</button>
                </div>

                <div class="card">
                    <div class="card-h" style="color:var(--green); border-color:var(--green);">FORM BUKTI LAPORAN</div>
                    <label>BUKTI LAPORAN (FOTO)</label>
                    <input type="file" id="l-foto" accept="image/*" capture="camera" onchange="preview(this, 'p-l')">
                    <img id="p-l" class="img-prev">

                    <label>NAMA YANG LAPOR</label>
                    <input type="text" id="l-nama" placeholder="Ketik nama...">

                    <label>TANGGAL LAPOR</label>
                    <input type="date" id="l-tgl">

                    <label>LAPOR KE SIAPA</label>
                    <select id="l-ke">
                        <option value="BU TATI">BU TATI</option>
                        <option value="BU AMI">BU AMI</option>
                    </select>

                    <label>TANDA TANGAN (NAMA TERANG)</label>
                    <input type="text" id="l-ttd" placeholder="Paraf nama...">

                    <button class="btn-send" style="background: var(--green); color: black;" onclick="kirim('laporan', 'l')">KIRIM LAPORAN</button>
                </div>
            </div>
        </div>
        
        <div id="notes-view" class="section">... (Notes & Calc View) ...</div>
        <div id="gudang-view" class="section">... (Gudang View) ...</div>
    </main>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const configUtama = {
        apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs",
        authDomain: "tempat-masuk-nya-data.firebaseapp.com",
        databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com",
        projectId: "tempat-masuk-nya-data"
    };
    
    // Inisialisasi Firebase Utama
    firebase.initializeApp(configUtama, "utama");
    const dbUtama = firebase.database(firebase.app("utama"));

    // --- FUNGSI KIRIM DATA ---
    async function kirim(folder, pre) {
        const file = document.getElementById(pre + '-foto').files[0];
        const data = {
            nama: val(pre + '-nama'),
            tanggal: val(pre + '-tgl'),
            tujuan: val(pre + '-ke'),
            ttd: val(pre + '-ttd'),
            waktu_system: new Date().toLocaleString()
        };

        if(!file || !data.nama || !data.tanggal) return alert("FOTO, NAMA, & TANGGAL WAJIB DIISI!");

        document.getElementById('loader').style.display = 'flex';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async function() {
            data.bukti_foto = reader.result; // Simpan foto sebagai Base64
            try {
                await dbUtama.ref(folder + '/').push(data);
                alert("DATA " + folder.toUpperCase() + " BERHASIL DIKIRIM!");
                location.reload();
            } catch (e) {
                alert("Gagal: " + e.message);
                document.getElementById('loader').style.display = 'none';
            }
        };
    }

    // --- UI HELPERS ---
    function val(id) { return document.getElementById(id).value; }
    
    function preview(input, imgId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById(imgId).src = e.target.result;
                document.getElementById(imgId).style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function show(id, b) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        b.classList.add('active');
    }

    function logout() { localStorage.removeItem('gibran_user'); window.location.href = 'index.html'; }
</script>
</body>
</html>
