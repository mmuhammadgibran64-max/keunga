<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB v29.2 | PREMIUM LANDING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --red: #ff0055; --cyan: #00d4ff; --gold: #ffcc00; --bg: #050505; --card: rgba(15, 15, 15, 0.95); --purple: #bc13fe; --green: #00ff88; --nav-w: 250px; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; }

        /* === LANDING PAGE DENGAN BACKGROUND KEUANGAN === */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* BACKGROUND DARI GAMBAR YANG LO KASIH */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://i.ibb.co/v6mYfXy/keuangan-png.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 1s ease-in-out;
        }

        /* Overlay efek gradasi tambahan biar teks kebaca */
        #landing-overlay::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--bg) 90%);
            z-index: -1;
        }

        .logo-anim {
            width: 120px; height: 120px; border: 4px solid var(--cyan); border-radius: 50%;
            border-top: 4px solid transparent; animation: spin 1s linear infinite; margin-bottom: 25px;
            box-shadow: 0 0 30px var(--cyan);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .landing-content { text-align: center; display: none; z-index: 10; }
        .landing-title { font-family: 'Orbitron'; font-size: 40px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); margin-bottom: 5px; letter-spacing: 5px; }
        .landing-sub { color: var(--gold); font-size: 16px; margin-bottom: 40px; letter-spacing: 3px; font-weight: bold; text-transform: uppercase; }
        
        .btn-start {
            padding: 18px 50px; background: rgba(0, 212, 255, 0.1); border: 2px solid var(--cyan); color: var(--cyan);
            font-family: 'Orbitron'; cursor: pointer; border-radius: 5px; transition: 0.4s;
            font-weight: bold; letter-spacing: 3px; backdrop-filter: blur(5px);
        }
        .btn-start:hover { background: var(--cyan); color: black; box-shadow: 0 0 50px var(--cyan); transform: scale(1.1); }

        /* === DASHBOARD AREA === */
        .wrapper { display: flex; height: 100vh; opacity: 0; transition: 1s; }
        nav { width: var(--nav-w); background: #000; border-right: 2px solid var(--cyan); padding: 25px; display: flex; flex-direction: column; gap: 12px; box-shadow: 5px 0 20px rgba(0, 212, 255, 0.2); z-index: 100; transition: 0.3s; }
        main { flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at top right, #0d1621, #050505); padding-bottom: 100px; }
        
        .nav-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 212, 255, 0.1); color: #777; padding: 14px; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border-radius: 10px; text-align: left; transition: 0.4s; letter-spacing: 1px; width: 100%; }
        .nav-btn.active, .nav-btn:hover { background: var(--cyan); color: black; box-shadow: 0 0 20px var(--cyan); border: 1px solid var(--cyan); font-weight: bold; }
        
        .section { display: none; }
        .section.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .card-h { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); margin-bottom: 15px; border-bottom: 1px solid rgba(0,212,255,0.2); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }

        input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(0, 212, 255, 0.2); color: white; border-radius: 8px; margin-bottom: 15px; font-family: 'Rajdhani'; outline: none; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: var(--cyan); border-bottom: 2px solid var(--cyan); padding: 12px; font-family: 'Orbitron'; font-size: 9px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .act-btn { padding: 8px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 8px; font-family: 'Orbitron'; color: white; transition: 0.3s; margin-right: 2px; display: inline-block; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--cyan); object-fit: cover; margin-bottom: 10px; }
        img.table-img { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; border: 1px solid var(--cyan); cursor: pointer; }

        .view-mode-btn { padding: 10px; background: #222; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Orbitron'; font-size: 9px; cursor: pointer; border-radius: 5px; margin-right: 5px; transition: 0.3s; }
        .view-mode-btn.active { background: var(--cyan); color: #000; }
    </style>
</head>
<body>

<div id="landing-overlay">
    <div class="logo-anim" id="splash-loader"></div>
    <div class="landing-content" id="landing-text">
        <div class="landing-title">GIBRAN HUB</div>
        <div class="landing-sub">SISTEM KEUANGAN TERENKRIPSI</div>
        <button class="btn-start" onclick="enterApp()">OTORISASI AKSES</button>
    </div>
</div>

<div class="wrapper" id="main-wrapper">
    <nav id="sidebar">
        <div style="text-align:center; margin-bottom:20px;">
            <img id="display-foto" src="https://via.placeholder.com/80" class="profile-img">
            <div id="display-nama" style="font-family:'Orbitron'; color:var(--cyan); font-size:12px; letter-spacing:1px;">GIBRAN HUB</div>
        </div>
        <button class="nav-btn active" onclick="show('mon-view', this)">📊 MONITORING</button>
        <button class="nav-btn" onclick="show('input-view', this)">📝 INPUT DATA</button>
        <button class="nav-btn" onclick="show('gudang-view', this)">📦 GUDANG</button>
        <button class="nav-btn" onclick="show('wallet-view', this)">💰 DOMPET</button>
        <button class="nav-btn" onclick="show('setting-view', this)">⚙️ PENGATURAN</button>
    </nav>

    <main>
        <div id="mon-view" class="section active">
            <div class="card"><div class="card-h">LIVE ANALYTICS</div><canvas id="rekapChart" style="max-height: 220px;"></canvas></div>
            <div class="card">
                <div class="card-h">RECENT TRANSACTIONS</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>TIPE</th><th>NAMA</th><th>TGL</th><th>BUKTI</th><th>TUJUAN</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-monitor"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="input-view" class="section">
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div class="card" style="flex:1; min-width:300px;">
                    <div class="card-h">INPUT LAPORAN</div>
                    <label>NAMA</label><input type="text" id="l-nama">
                    <label>TANGGAL</label><input type="date" id="l-tgl">
                    <label>BUKTI</label><input type="file" id="l-bukti" accept="image/*">
                    <label>TTD</label><input type="text" id="l-ttd">
                    <label>KE</label><select id="l-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <button class="btn-main" style="background:var(--red); color:white" onclick="simpan('LAPORAN','l-')">KIRIM</button>
                </div>
                <div class="card" style="flex:1; min-width:300px;">
                    <div class="card-h">INPUT SETORAN</div>
                    <label>NAMA</label><input type="text" id="s-nama">
                    <label>TANGGAL</label><input type="date" id="s-tgl">
                    <label>BUKTI</label><input type="file" id="s-bukti" accept="image/*">
                    <label>TTD</label><input type="text" id="s-ttd">
                    <label>KE</label><select id="s-tujuan"><option>BU TATI</option><option>BU AMI</option></select>
                    <button class="btn-main" style="background:var(--cyan); color:black" onclick="simpan('SETORAN','s-')">KIRIM</button>
                </div>
            </div>
        </div>

        <div id="gudang-view" class="section">
            <div class="card">
                <div class="card-h">GUDANG ENTRY</div>
                <input type="text" id="g-nama" placeholder="Barang">
                <input type="number" id="g-stok" placeholder="Stok">
                <button class="btn-main" style="background:var(--purple); color:white" onclick="sendG()">UPDATE GUDANG</button>
            </div>
            <div class="card">
                <div class="card-h">INVENTORY LIST</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>NAMA</th><th>STOK</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-gudang"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="wallet-view" class="section">
            <div class="card" style="border: 2px solid var(--gold);">
                <div class="card-h" style="color:var(--gold)">WALLET MANAGEMENT</div>
                <div style="text-align: center; margin-bottom: 25px;">
                    <h1 id="saldo-akhir" style="color:white; font-family:'Orbitron'; font-size: 45px; text-shadow: 0 0 15px var(--gold);">Rp 0</h1>
                </div>
                <input type="number" id="w-masuk" placeholder="Masuk Rp">
                <input type="number" id="w-keluar" placeholder="Keluar Rp">
                <button class="btn-main" style="background:var(--gold); color:black;" onclick="updateW()">SIMPAN SALDO</button>
                <div style="margin-top: 30px;">
                    <table>
                        <thead><tr><th>WAKTU</th><th>MASUK</th><th>KELUAR</th><th>AKSI</th></tr></thead>
                        <tbody id="tbody-wallet"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="setting-view" class="section">
            <div class="card">
                <div class="card-h">PENGATURAN PROFIL</div>
                <input type="text" id="prof-nama" placeholder="Nama Usaha">
                <input type="file" id="prof-file">
                <button class="btn-main" style="background:var(--cyan); color:black;" onclick="saveProfile()">UPDATE</button>
            </div>
            <div class="card">
                <div class="card-h">MODE TAMPILAN</div>
                <button class="view-mode-btn active" onclick="setMode('pc')">🖥️ PC</button>
                <button class="view-mode-btn" onclick="setMode('hp')">🤳 HP</button>
            </div>
        </div>
    </main>
</div>

<script>
    // --- LANDING CONTROL ---
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash-loader').style.display = 'none';
            document.getElementById('landing-text').style.display = 'block';
        }, 2000);
    };

    function enterApp() {
        document.getElementById('landing-overlay').style.transform = 'translateY(-100%)';
        setTimeout(() => {
            document.getElementById('landing-overlay').style.display = 'none';
            document.getElementById('main-wrapper').style.opacity = '1';
        }, 800);
    }

    // --- FIREBASE CONFIGS ---
    const configA = { apiKey: "AIzaSyDj1f5YlwkT8ZraW9l7QZe6cQTgjsTSPBs", authDomain: "tempat-masuk-nya-data.firebaseapp.com", databaseURL: "https://tempat-masuk-nya-data-default-rtdb.firebaseio.com", projectId: "tempat-masuk-nya-data", appId: "1:918742049565:web:4490b03c04f5bf75e3f7f4" };
    const configW = { apiKey: "AIzaSyCdNwDr9lUsUE2iv43vW6q89VZMXPix8us", authDomain: "sisa-saldo.firebaseapp.com", databaseURL: "https://sisa-saldo-default-rtdb.firebaseio.com", projectId: "sisa-saldo", appId: "1:152603234485:web:1f82e28d57b2a5f2d8aefc" };
    const configG = { databaseURL: "https://gudang-barang-893cd-default-rtdb.firebaseio.com" };
    const configP = { apiKey: "AIzaSyDHZv0Ofds9O3Tyg0PJzjj326eG1hbDhug", authDomain: "nama--profile.firebaseapp.com", databaseURL: "https://nama--profile-default-rtdb.firebaseio.com", projectId: "nama--profile", appId: "1:341046321280:web:29f9e0ea8dc7ae64198665" };

    firebase.initializeApp(configA); const dbD = firebase.database();
    const appW = firebase.initializeApp(configW, "W"); const dbW = firebase.database(appW);
    const appG = firebase.initializeApp(configG, "G"); const dbG = firebase.database(appG);
    const appP = firebase.initializeApp(configP, "P"); const dbP = firebase.database(appP);

    // --- MONITORING ---
    function simpan(tipe, pre) {
        const tgl = document.getElementById(pre+'tgl').value;
        const d = { tipe: tipe, nama: v(pre+'nama'), tgl: tgl, ttd: v(pre+'ttd'), tujuan: v(pre+'tujuan') };
        const f = document.getElementById(pre+'bukti').files[0];
        if(f) {
            const r = new FileReader(); r.onload = (e) => { d.img = e.target.result; dbD.ref('transaksi').push(d).then(()=>alert("Berhasil!")); };
            r.readAsDataURL(f);
        } else { dbD.ref('transaksi').push(d).then(()=>alert("Berhasil!")); }
    }
    dbD.ref('transaksi').on('value', s => {
        const tb = document.getElementById('tbody-monitor'); tb.innerHTML = ""; let L=0, S=0;
        s.forEach(c => { const r = c.val(); r.tipe === "LAPORAN" ? L++ : S++;
            tb.innerHTML += `<tr><td>${r.tipe}</td><td>${r.nama}</td><td>${r.tgl}</td><td>${r.img ? `<img src="${r.img}" class="table-img" onclick="window.open(this.src)">` : '-'}</td><td>${r.tujuan}</td>
            <td><button class="act-btn" style="background:#333" onclick="dbD.ref('transaksi/${c.key}').remove()">X</button></td></tr>`;
        }); renderChart(L,S);
    });

    // --- GUDANG ---
    function sendG() { dbG.ref('stok').push({ nm:v('g-nama'), st:v('g-stok') }); }
    dbG.ref('stok').on('value', s => {
        const tb = document.getElementById('tbody-gudang'); tb.innerHTML = "";
        s.forEach(c => { const r = c.val(); tb.innerHTML += `<tr><td>${r.nm}</td><td>${r.st}</td><td><button class="act-btn" style="background:#333" onclick="dbG.ref('stok/${c.key}').remove()">X</button></td></tr>`; });
    });

    // --- WALLET ---
    function updateW() { dbW.ref('riwayat').push({ tgl: new Date().toLocaleString(), m: parseInt(v('w-masuk'))||0, k: parseInt(v('w-keluar'))||0 }); }
    dbW.ref('riwayat').on('value', s => {
        const tb = document.getElementById('tbody-wallet'); tb.innerHTML = ""; let tot = 0;
        s.forEach(c => { const r = c.val(); tot += (r.m - r.k); tb.innerHTML += `<tr><td>${r.tgl}</td><td style="color:var(--green)">+${r.m}</td><td style="color:var(--red)">-${r.k}</td><td><button class="act-btn" style="background:#333" onclick="dbW.ref('riwayat/${c.key}').remove()">X</button></td></tr>`; });
        document.getElementById('saldo-akhir').innerText = "Rp " + tot.toLocaleString();
    });

    // --- UTILS ---
    function show(id, btn) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function v(id) { return document.getElementById(id).value; }
    let chart;
    function renderChart(l, s) {
        const ctx = document.getElementById('rekapChart').getContext('2d'); if(chart) chart.destroy();
        chart = new Chart(ctx, { type:'bar', data:{ labels:['LAPORAN','SETORAN'], datasets:[{ data:[l, s], backgroundColor:['#ff0055','#00d4ff'] }] }, options:{plugins:{legend:{display:false}}} });
    }
    function setMode(m) { const n = document.getElementById('sidebar'); n.style.width = (m==='hp')?'70px':'250px'; }
</script>
</body>
</html>
