<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | AUTH SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #00d2ff; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: rgba(255,255,255,0.05); border: 2px solid var(--neon); padding: 30px; border-radius: 15px; width: 320px; text-align: center; backdrop-filter: blur(10px); }
        input { width: 100%; margin-bottom: 12px; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        .tab-btn { background: none; color: var(--neon); border: none; cursor: pointer; font-size: 12px; margin: 10px; opacity: 0.6; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid var(--neon); }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center; color: var(--neon); }
    </style>
</head>
<body>

<div id="loader"><h2>SYNCHRONIZING...</h2></div>

<div class="auth-card">
    <h2 style="color:var(--neon)">GIBRAN_HUB</h2>
    <div style="margin-bottom: 20px;">
        <button class="tab-btn active" id="t-log" onclick="setMode('login')">LOGIN</button>
        <button class="tab-btn" id="t-reg" onclick="setMode('reg')">DAFTAR</button>
    </div>

    <div id="reg-box" style="display:none">
        <input type="text" id="r-nama" placeholder="Nama Lengkap">
        <input type="text" id="r-wa" placeholder="Nomor WA">
        <input type="text" id="r-alamat" placeholder="Alamat">
        <input type="password" id="r-pass" placeholder="Password">
        <button onclick="doReg()">DAFTAR AKUN</button>
    </div>

    <div id="log-box">
        <input type="text" id="l-nama" placeholder="Nama">
        <input type="text" id="l-wa" placeholder="Nomor WA">
        <button onclick="doLog()">MASUK KE DASHBOARD</button>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyB4ZKcy0TGDQ_i5LGXIsFH9pSSXGfifzqg",
        authDomain: "daftar-akun-2f94c.firebaseapp.com",
        databaseURL: "https://daftar-akun-2f94c-default-rtdb.firebaseio.com",
        projectId: "daftar-akun-2f94c",
        appId: "1:225880747346:web:e6565efca909fb2f4c1e8b"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    function setMode(m) {
        document.getElementById('reg-box').style.display = m === 'reg' ? 'block' : 'none';
        document.getElementById('log-box').style.display = m === 'login' ? 'block' : 'none';
        document.getElementById('t-reg').classList.toggle('active', m === 'reg');
        document.getElementById('t-log').classList.toggle('active', m === 'login');
    }

    async function doReg() {
        const d = { nama: val('r-nama'), wa: val('r-wa'), alamat: val('r-alamat'), password: val('r-pass'), time: Date.now() };
        if(!d.nama || !d.wa) return alert("Isi Data!");
        await db.ref('users/' + d.wa).set(d);
        alert("Berhasil Daftar!"); setMode('login');
    }

    async function doLog() {
        const n = val('l-nama'), w = val('l-wa');
        document.getElementById('loader').style.display = 'flex';
        const snap = await db.ref('users/' + w).once('value');
        const user = snap.val();
        if(user && user.nama === n) {
            // Simpan nama di browser supaya di dashboard bisa dipanggil
            localStorage.setItem('gibran_user', user.nama);
            window.location.href = "dashboard.html"; // PINDAH KE DASHBOARD
        } else {
            alert("Data Salah!");
            document.getElementById('loader').style.display = 'none';
        }
    }
    function val(id) { return document.getElementById(id).value; }
</script>
</body>
</html>
