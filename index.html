<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GIBRAN HUB | REGISTER</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #ffca28; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; margin-bottom: 15px; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ffca28; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }
        a { color: #ffca28; text-decoration: none; font-size: 12px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #ffca28;">DAFTAR AKUN</h2>
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="text" id="wa" placeholder="Nomor WA (628...)">
        <button onclick="daftar()">DAFTAR SEKARANG</button>
        <a href="login.html">Sudah punya akun? Login</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC_89eDNhdOojD_w8cCYADrF6Sj5R64mro",
            authDomain: "login-1f788.firebaseapp.com",
            databaseURL: "https://login-1f788-default-rtdb.firebaseio.com",
            projectId: "login-1f788",
            storageBucket: "login-1f788.firebasestorage.app",
            appId: "1:180921561129:web:6e4d60a74a871691346c38"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function daftar() {
            const nama = document.getElementById('nama').value;
            const wa = document.getElementById('wa').value;
            const waktu = new Date().toLocaleString();

            if(!nama || !wa) return alert("Isi semua data!");

            db.ref('users/' + wa).set({ nama, wa, waktu })
            .then(() => {
                alert("Pendaftaran Berhasil!");
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
