<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | OFFICIAL ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff0055; --purple: #7000ff; --bg: #050505; --cyan: #00d4ff; }
        
        /* FIX BACKGROUND: Biar tetep muncul di semua perangkat */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Rajdhani', sans-serif; 
            background-color: #000; color: white; overflow: hidden;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* MENGGUNAKAN DUA METODE: GRADIENT + IMAGE URL */
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%), 
                        url('https://i.ibb.co/v6mYfXy/keuangan-png.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
            /* Efek Zoom pelan ala Android */
            animation: kenBurns 15s infinite alternate;
        }

        @keyframes kenBurns {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease-out;
        }

        .logo-box {
            position: relative; width: 120px; height: 120px;
            border: 2px solid var(--cyan); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px var(--cyan);
            animation: logoPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes logoPop { from { transform: scale(0); rotate: -20deg; } to { transform: scale(1); rotate: 0; } }

        /* AUTH BOX */
        .auth-wrapper {
            height: 100%; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 1.5s ease; padding: 20px;
        }

        .auth-card {
            background: rgba(0, 0, 0, 0.6); /* Transparan Kaca */
            padding: 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 350px; backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-family: 'Orbitron'; font-size: 10px; color: var(--cyan); margin-bottom: 8px; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 15px; 
            color: white; outline: none; box-sizing: border-box; font-size: 14px;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; 
            color: white; font-family: 'Orbitron'; font-size: 12px; cursor: pointer; 
            font-weight: bold; margin-top: 10px; transition: 0.3s; 
        }
        .btn-login { background: linear-gradient(45deg, var(--purple), #4e00b3); box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3); }
        .btn-reg { background: linear-gradient(45deg, var(--red), #b3003b); box-shadow: 0 10px 20px rgba(255, 0, 85, 0.3); }

        .form-box { display: none; }
        .form-box.active { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-layer"></div>

<div id="splash-screen">
    <div class="logo-box">
        <span style="font-family:'Orbitron'; font-size: 40px; color:var(--cyan);">G</span>
    </div>
    <h1 style="font-family:'Orbitron'; font-size: 18px; margin-top: 20px; letter-spacing: 5px;">GIBRAN HUB</h1>
    <div style="width: 100px; height: 2px; background: rgba(0,212,255,0.2); margin-top: 15px; overflow: hidden;">
        <div id="loader" style="width: 0%; height: 100%; background: var(--cyan); transition: 2s;"></div>
    </div>
</div>

<div class="auth-wrapper" id="auth-ui">
    <div class="auth-card">
        <h2 style="font-family:'Orbitron'; font-size: 18px; text-align: center; color: var(--cyan); margin-bottom: 30px;">AUTHENTICATION</h2>

        <div id="loginForm" class="form-box active">
            <div class="input-group"><label>OPERATOR NAME</label><input type="text" id="logNama" placeholder="Nama Operator"></div>
            <div class="input-group"><label>WHATSAPP</label><input type="tel" id="logWA" placeholder="08xxxxxxxx"></div>
            <button class="btn btn-login" id="btnMasuk">LOGIN SYSTEM</button>
            <p onclick="toggle('reg')" style="text-align:center; font-size:12px; color:#aaa; margin-top:20px; cursor:pointer;">New User? <span style="color:var(--cyan)">Register</span></p>
        </div>

        <div id="regForm" class="form-box">
            <div class="input-group"><label>NAMA LENGKAP</label><input type="text" id="regNama"></div>
            <div class="input-group"><label>WHATSAPP</label><input type="tel" id="regWA"></div>
            <div class="input-group"><label>PASSWORD</label><input type="password" id="regPass"></div>
            <button class="btn btn-reg" id="btnDaftar">SIGN UP</button>
            <p onclick="toggle('login')" style="text-align:center; font-size:12px; color:#aaa; margin-top:20px; cursor:pointer;">Have account? <span style="color:var(--red)">Login</span></p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const configDaftar = { apiKey: "AIzaSyB4ZKcy0TGDQ_i5LGXIsFH9pSSXGfifzqg", databaseURL: "https://daftar-akun-2f94c-default-rtdb.firebaseio.com" };
    const configLogin = { apiKey: "AIzaSyC_89eDNhdOojD_w8cCYADrF6Sj5R64mro", databaseURL: "https://login-1f788-default-rtdb.firebaseio.com" };

    const dbDaftar = getDatabase(initializeApp(configDaftar, "appDaftar"));
    const dbLogin = getDatabase(initializeApp(configLogin, "appLogin"));

    // SPLASH TIMING
    window.onload = () => {
        document.getElementById('loader').style.width = '100%';
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('auth-ui').style.opacity = '1';
            }, 1000);
        }, 2500);
    };

    // DAFTAR
    document.getElementById('btnDaftar').onclick = async () => {
        const n = document.getElementById('regNama').value;
        const w = document.getElementById('regWA').value;
        const p = document.getElementById('regPass').value;
        if(n && w && p) {
            await set(ref(dbDaftar, 'users/' + w), { nama:n, wa:w, pass:p });
            alert("Registered!"); window.location.reload();
        }
    };

    // LOGIN
    document.getElementById('btnMasuk').onclick = async () => {
        const n = document.getElementById('logNama').value;
        const w = document.getElementById('logWA').value;
        if(n && w) {
            await set(push(ref(dbLogin, 'data_login')), { nama:n, wa:w, time: new Date().toLocaleString() });
            localStorage.setItem('user_gibran', n);
            window.location.href = "dashboard.html";
        }
    };
</script>

<script>
    function toggle(t) {
        document.getElementById('loginForm').classList.toggle('active', t === 'login');
        document.getElementById('regForm').classList.toggle('active', t === 'reg');
    }
</script>
</body>
</html>
