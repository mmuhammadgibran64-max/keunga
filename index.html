<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | DATABASE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --neon: #00d2ff; --neon-green: #3ecf8e; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a1913 0%, #05070a 100%);
            text-align: center;
        }

        .logo-main {
            font-family: 'Orbitron';
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1rem; color: #888; letter-spacing: 3px; margin-bottom: 40px; text-transform: uppercase;
        }

        .btn-scroll {
            background: transparent; border: 2px solid var(--neon-green); color: var(--neon-green);
            padding: 15px 35px; font-family: 'Orbitron'; font-size: 12px; cursor: pointer;
            border-radius: 4px; transition: 0.4s; text-decoration: none;
        }

        .btn-scroll:hover { background: var(--neon-green); color: black; box-shadow: 0 0 30px var(--neon-green); }

        /* --- FORM SECTION --- */
        .form-section {
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 60px 20px;
        }

        .card {
            background: var(--card-bg); border: 1px solid rgba(62, 207, 142, 0.2);
            padding: 30px; border-radius: 15px; backdrop-filter: blur(20px);
            width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .card-h {
            font-family: 'Orbitron'; color: var(--neon-green); font-size: 1rem; margin-bottom: 25px;
            text-align: center; border-bottom: 1px solid rgba(62,207,142,0.1); padding-bottom: 15px;
        }

        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 10px; color: var(--neon-green); font-family: 'Orbitron'; margin-bottom: 5px; opacity: 0.8; }
        
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(62, 207, 142, 0.2); color: white; border-radius: 6px; 
            font-size: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-green); background: rgba(62, 207, 142, 0.05); }

        .pass-container { position: relative; }
        .toggle-pass {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            cursor: pointer; font-size: 10px; color: var(--neon-green); font-family: 'Orbitron';
            background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px;
        }

        .btn-send {
            background: var(--neon-green); color: black; border: none; padding: 18px; 
            font-family: 'Orbitron'; font-size: 12px; cursor: pointer; width: 100%; 
            font-weight: bold; border-radius: 6px; transition: 0.4s; margin-top: 10px;
        }
        .btn-send:hover { box-shadow: 0 0 25px var(--neon-green); transform: translateY(-2px); }

        .status { text-align: center; font-size: 10px; margin-top: 15px; color: var(--neon-green); font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="logo-main">GIBRAN_HUB</h1>
        <p class="tagline">Cloud Integrated Database v15.0</p>
        <a href="#register" class="btn-scroll">AKSES PENDAFTARAN</a>
    </section>

    <section id="register" class="form-section">
        <div class="card">
            <div class="card-h">SUPABASE_REGISTRATION</div>
            
            <form id="user-form">
                <div class="input-group">
                    <label>NAMA LENGKAP</label>
                    <input type="text" id="nama" placeholder="Masukkan Nama" required>
                </div>
                <div class="input-group">
                    <label>NOMOR WHATSAPP</label>
                    <input type="number" id="wa" placeholder="628xxxxxxxx" required>
                </div>
                <div class="input-group">
                    <label>ALAMAT</label>
                    <input type="text" id="alamat" placeholder="Alamat Domisili" required>
                </div>
                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="pass-container">
                        <input type="password" id="password" placeholder="******" required>
                        <span class="toggle-pass" onclick="togglePassword()">SHOW</span>
                    </div>
                </div>
                <button type="submit" class="btn-send" id="btn-submit">SIMPAN DATA KE SUPABASE</button>
            </form>
            <div id="msg" class="status">READY_TO_SYNC</div>
        </div>
    </section>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://pjmezagwbktbqgzwwzwt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbWV6YWd3Ymt0YnFnzwzwtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEwNDcsImV4cCI6MjA4ODI0NzA0N30.LEQ99Vi-J6zAstTzQGvczN1208a_cIfPKR-Wy3viUHk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi Intip Password
        function togglePassword() {
            const p = document.getElementById('password');
            const btn = document.querySelector('.toggle-pass');
            if (p.type === "password") {
                p.type = "text"; btn.innerText = "HIDE";
            } else {
                p.type = "password"; btn.innerText = "SHOW";
            }
        }

        const form = document.getElementById('user-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('msg');

            btn.disabled = true;
            btn.innerText = "SINKRONISASI...";
            msg.innerText = "MENGHUBUNGKAN KE SERVER...";

            // KIRIM DATA KE TABEL 'daftar akun'
            const { data, error } = await supabaseClient
                .from('daftar akun') // Sesuaikan dengan nama tabel lo
                .insert([
                    { 
                        nama: document.getElementById('nama').value, 
                        wa: document.getElementById('wa').value, 
                        alamat: document.getElementById('alamat').value, 
                        password: document.getElementById('password').value 
                    }
                ]);

            if (error) {
                console.error('Error:', error);
                msg.innerText = "GAGAL: " + error.message;
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            } else {
                msg.innerText = "DATA BERHASIL TERSIMPAN DI CLOUD! ✓";
                btn.innerText = "SUCCESS";
                form.reset();
                setTimeout(() => { window.location.href = "#"; }, 2000);
            }
            
            setTimeout(() => { 
                btn.disabled = false; btn.innerText = "SIMPAN KE SUPABASE"; msg.innerText = "READY_TO_SYNC"; 
            }, 5000);
        });
    </script>
</body>
</html>
