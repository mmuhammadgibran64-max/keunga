<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | EXCLUSIVE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }

        /* --- HERO LANDING SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #101926 0%, #05070a 100%);
            text-align: center;
        }

        .logo-main {
            font-family: 'Orbitron';
            font-size: clamp(2.5rem, 12vw, 5rem);
            color: var(--neon);
            text-shadow: 0 0 25px var(--neon);
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1rem;
            color: #888;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn-start {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 18px 40px;
            font-family: 'Orbitron';
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.4s;
            text-decoration: none;
            letter-spacing: 2px;
        }

        .btn-start:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 40px var(--neon-green);
        }

        /* --- FORM REGISTRASI SECTION --- */
        .form-section {
            min-height: 100vh;
            padding: 80px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #05070a;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 40px 30px;
            border-radius: 15px;
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        .card-h {
            font-family: 'Orbitron';
            color: var(--neon);
            font-size: 1.1rem;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0,210,255,0.2);
            padding-bottom: 15px;
        }

        .input-group { margin-bottom: 20px; position: relative; }
        
        label { display: block; font-size: 11px; color: var(--neon); font-family: 'Orbitron'; margin-bottom: 8px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(0,210,255,0.2); color: white; border-radius: 8px; 
            font-size: 16px; outline: none; transition: 0.3s; font-family: 'Rajdhani';
        }

        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,210,255,0.2); }

        /* --- FITUR SHOW/HIDE PASSWORD --- */
        .pass-container { position: relative; }
        .toggle-pass {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 11px;
            color: var(--neon);
            font-family: 'Orbitron';
            user-select: none;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0,210,255,0.3);
        }

        .btn-send {
            background: var(--neon-green); color: black; border: none; padding: 20px; 
            font-family: 'Orbitron'; font-size: 13px; cursor: pointer; width: 100%; 
            font-weight: bold; border-radius: 8px; transition: 0.4s; margin-top: 10px;
        }

        .btn-send:hover { box-shadow: 0 0 30px var(--neon-green); transform: translateY(-2px); }

        .status-msg { text-align: center; font-size: 11px; margin-top: 20px; color: var(--neon); font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="logo-main">GIBRAN_HUB</h1>
        <p class="tagline">Secure Data Entry System v13.5</p>
        <a href="#register" class="btn-start">MULAI REGISTRASI</a>
    </section>

    <section id="register" class="form-section">
        <div class="card">
            <div class="card-h">USER_REGISTRATION</div>
            
            <form id="user-form">
                <div class="input-group">
                    <label>NAMA LENGKAP</label>
                    <input type="text" name="data[nama]" placeholder="Input Nama" required>
                </div>
                
                <div class="input-group">
                    <label>NOMOR WHATSAPP</label>
                    <input type="number" name="data[nomor wa]" placeholder="628xxxxxxxx" required>
                </div>
                
                <div class="input-group">
                    <label>ALAMAT</label>
                    <input type="text" name="data[alamat]" placeholder="Alamat Lengkap" required>
                </div>
                
                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="pass-container">
                        <input type="password" name="data[password]" id="passInput" placeholder="******" required>
                        <span class="toggle-pass" onclick="togglePassword()">SHOW</span>
                    </div>
                </div>
                
                <input type="hidden" name="data[timestamp]" id="ts">

                <button type="submit" class="btn-send" id="btn-submit">SIMPAN KE GOOGLE SHEET</button>
            </form>
            
            <div id="msg" class="status-msg">SIAP MENERIMA DATA...</div>
        </div>
    </section>

    <script>
        // Fungsi Show/Hide Password
        function togglePassword() {
            const passInput = document.getElementById('passInput');
            const toggleBtn = document.querySelector('.toggle-pass');
            
            if (passInput.type === "password") {
                passInput.type = "text";
                toggleBtn.innerText = "HIDE";
                toggleBtn.style.color = "var(--neon-green)";
            } else {
                passInput.type = "password";
                toggleBtn.innerText = "SHOW";
                toggleBtn.style.color = "var(--neon)";
            }
        }

        // Fungsi Kirim Data ke SheetDB
        const form = document.getElementById('user-form');
        const apiURL = "https://sheetdb.io/api/v1/k4t892whs0zgw";

        form.addEventListener("submit", e => {
            e.preventDefault();
            
            // Generate Timestamp Lokal
            const now = new Date();
            document.getElementById('ts').value = now.toLocaleString('id-ID');
            
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerText = "SEDANG MENGIRIM...";
            msg.innerText = "MENGHUBUNGKAN KE SERVER DATABASE...";

            fetch(apiURL, {
                method: "POST",
                body: new FormData(document.getElementById("user-form")),
            }).then(res => {
                if(res.ok) {
                    msg.innerText = "DATA BERHASIL DISIMPAN! ✓";
                    btn.innerText = "BERHASIL";
                    form.reset();
                    // Kembali ke atas setelah 2 detik
                    setTimeout(() => { window.location.href = "#"; }, 2000);
                } else {
                    throw new Error('Gagal terhubung ke API');
                }
            })
            .catch(err => {
                msg.innerText = "GAGAL! PERIKSA KONEKSI INTERNET.";
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            })
            .finally(() => {
                setTimeout(() => { 
                    btn.disabled = false;
                    btn.innerText = "SIMPAN KE GOOGLE SHEET";
                    msg.innerText = "SIAP MENERIMA DATA..."; 
                }, 4000);
            });
        });
    </script>
</body>
</html>
