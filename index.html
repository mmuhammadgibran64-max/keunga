<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | ALL-IN-ONE SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #ffca28; --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(255, 202, 40, 0.2); }
        
        /* Navigasi Tab */
        .tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .tab { padding: 10px; cursor: pointer; color: #888; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
        
        .form-content { display: none; }
        .form-content.active { display: block; }

        input { width: 100%; margin-bottom: 15px; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--neon); }
        
        button { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        button:hover { transform: scale(1.02); }
        
        #msg { font-size: 10px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <div class="tabs">
        <div class="tab active" onclick="openTab('daftar')">DAFTAR</div>
        <div class="tab" onclick="openTab('login')">LOGIN</div>
    </div>

    <div id="daftar" class="form-content active">
        <h3 style="color: var(--neon); margin-bottom: 15px;">BUAT AKUN</h3>
        <input type="text" id="reg_nama" placeholder="Nama Lengkap">
        <input type="text" id="reg_wa" placeholder="Nomor WA (628...)">
        <button onclick="prosesDaftar()">DAFTAR SEKARANG</button>
    </div>

    <div id="login" class="form-content">
        <h3 style="color: var(--neon); margin-bottom: 15px;">MASUK SYSTEM</h3>
        <input type="text" id="log_nama" placeholder="Nama Lengkap">
        <input type="text" id="log_wa" placeholder="Nomor WA">
        <button onclick="prosesLogin()">LOGIN</button>
    </div>

    <p id="msg">SYSTEM READY</p>
</div>

<script>
    // CONFIG FIREBASE (Pake yang lo kasih tadi)
    const firebaseConfig = {
        apiKey: "AIzaSyC_89eDNhdOojD_w8cCYADrF6Sj5R64mro",
        authDomain: "login-1f788.firebaseapp.com",
        databaseURL: "https://login-1f788-default-rtdb.firebaseio.com",
        projectId: "login-1f788",
        storageBucket: "login-1f788.firebasestorage.app",
        appId: "1:180921561129:web:6e4d60a74a871691346c38"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fungsi Pindah Tab
    function openTab(tabName) {
        document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Fungsi Daftar
    function prosesDaftar() {
        const nama = document.getElementById('reg_nama').value;
        const wa = document.getElementById('reg_wa').value;
        const st = document.getElementById('msg');

        if(!nama || !wa) return alert("Isi data dulu!");
        st.innerText = "Mendaftarkan...";

        db.ref('users/' + wa).set({ nama, wa, waktu: new Date().toLocaleString() })
        .then(() => {
            alert("Berhasil Daftar! Silakan pindah ke tab LOGIN.");
            st.innerText = "PENDAFTARAN SUKSES";
        });
    }

    // Fungsi Login
    function prosesLogin() {
        const nama = document.getElementById('log_nama').value;
        const wa = document.getElementById('log_wa').value;
        const st = document.getElementById('msg');

        if(!nama || !wa) return alert("Isi data login!");
        st.innerText = "Mengecek akun...";

        db.ref('users/' + wa).once('value', (snapshot) => {
            if (snapshot.exists() && snapshot.val().nama === nama) {
                alert("LOGIN SUKSES! Selamat datang " + nama);
                st.innerText = "ACCESS GRANTED";
            } else {
                alert("Nama atau Nomor WA salah!");
                st.innerText = "LOGIN GAGAL";
            }
        });
    }
</script>

</body>
</html>
