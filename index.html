<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | DATABASE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --neon-green: #3ecf8e; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { 
            background: var(--card-bg); border: 1px solid rgba(62, 207, 142, 0.3); 
            padding: 35px; border-radius: 20px; width: 100%; max-width: 400px; 
            backdrop-filter: blur(10px); box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        
        .card-h { font-family: 'Orbitron'; color: var(--neon-green); font-size: 1.1rem; margin-bottom: 25px; text-align: center; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 18px; text-align: left; position: relative; }
        label { display: block; font-size: 10px; color: var(--neon-green); font-family: 'Orbitron'; margin-bottom: 6px; }
        
        input { 
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(62, 207, 142, 0.2); color: white; 
            border-radius: 8px; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(62, 207, 142, 0.2); }
        
        /* Tombol Intip Password */
        .toggle-btn {
            position: absolute; right: 10px; top: 32px;
            background: none; border: none; color: var(--neon-green);
            font-family: 'Orbitron'; font-size: 9px; cursor: pointer; opacity: 0.7;
        }

        .btn-send { 
            background: var(--neon-green); color: black; border: none; 
            padding: 16px; font-family: 'Orbitron'; font-size: 12px; 
            cursor: pointer; width: 100%; font-weight: bold; 
            border-radius: 8px; margin-top: 10px; transition: 0.4s;
        }
        .btn-send:hover { transform: translateY(-3px); box-shadow: 0 0 25px var(--neon-green); }
        .btn-send:disabled { background: #444; cursor: not-allowed; }

        #msg { font-size: 10px; margin-top: 15px; color: #888; font-family: 'Orbitron'; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-h">GIBRAN_DATABASE</div>
        <form id="user-form">
            <div class="input-group">
                <label>NAMA USER</label>
                <input type="text" id="nama" placeholder="Nama Lengkap..." required>
            </div>
            <div class="input-group">
                <label>NOMOR WA</label>
                <input type="text" id="wa" placeholder="628xxxxxxx" required>
            </div>
            <div class="input-group">
                <label>ALAMAT</label>
                <input type="text" id="alamat" placeholder="Alamat Domisili..." required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="******" required>
                <button type="button" class="toggle-btn" onclick="togglePass()" id="btn-eye">SHOW</button>
            </div>
            <button type="submit" class="btn-send" id="btn-submit">SIMPAN DATA</button>
        </form>
        <div id="msg">SYSTEM_READY</div>
    </div>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = "https://pjmezagwbktbqgzwwzwt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbWV6YWd3Ymt0YnFnzwzwtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEwNDcsImV4cCI6MjA4ODI0NzA0N30.LEQ99Vi-J6zAstTzQGvczN1208a_cIfPKR-Wy3viUHk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi Show/Hide
        function togglePass() {
            const p = document.getElementById('password');
            const b = document.getElementById('btn-eye');
            if (p.type === "password") {
                p.type = "text"; b.innerText = "HIDE";
            } else {
                p.type = "password"; b.innerText = "SHOW";
            }
        }

        const form = document.getElementById('user-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('msg');

            btn.disabled = true;
            btn.innerText = "MENGIRIM...";
            msg.innerText = "SINKRONISASI KE CLOUD...";

            const dataInput = {
                nama: document.getElementById('nama').value,
                wa: document.getElementById('wa').value,
                alamat: document.getElementById('alamat').value,
                password: document.getElementById('password').value
            };

            // INSERT DATA (Nama tabel: 'daftar akun' sesuai di dashboard lo)
            const { error } = await supabaseClient
                .from('daftar akun')
                .insert([dataInput]);

            if (error) {
                console.error("Gagal:", error);
                alert("GAGAL MENGIRIM! Error: " + error.message);
                msg.innerText = "ERROR_CONNECTION";
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            } else {
                alert("MANTAP! Data berhasil nangkring di Supabase.");
                msg.innerText = "DATA_SYNC_SUCCESS ✓";
                btn.innerText = "BERHASIL";
                form.reset();
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = "SIMPAN DATA";
                    msg.innerText = "SYSTEM_READY";
                }, 3000);
            }
        });
    </script>
</body>
</html>
