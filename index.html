<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | WELCOME SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00d2ff; --neon-green: #00ff88; --bg: #05070a; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; scroll-behavior: smooth; }

        /* --- SECTION 1: LANDING PAGE (HERO) --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #101926 0%, #05070a 100%);
            text-align: center;
            border-bottom: 2px solid var(--neon);
        }

        .logo-main {
            font-family: 'Orbitron';
            font-size: clamp(2rem, 10vw, 4rem);
            color: var(--neon);
            text-shadow: 0 0 20px var(--neon);
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .btn-scroll {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px 30px;
            font-family: 'Orbitron';
            font-size: 12px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s;
            text-decoration: none;
        }

        .btn-scroll:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        /* --- SECTION 2: REGISTRATION FORM --- */
        .form-section {
            min-height: 100vh;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 210, 255, 0.15);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .card-h {
            font-family: 'Orbitron';
            color: var(--neon);
            font-size: 1rem;
            margin-bottom: 25px;
            border-left: 4px solid var(--neon);
            padding-left: 15px;
            text-transform: uppercase;
        }

        label { display: block; font-size: 11px; color: var(--neon); font-family: 'Orbitron'; margin-bottom: 8px; opacity: 0.8; }
        
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(0,210,255,0.2); color: white; border-radius: 8px; 
            margin-bottom: 20px; font-size: 15px; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--neon); background: rgba(0, 210, 255, 0.05); }

        .btn-send {
            background: var(--neon-green); color: black; border: none; padding: 18px; 
            font-family: 'Orbitron'; font-size: 12px; cursor: pointer; width: 100%; 
            font-weight: bold; border-radius: 8px; transition: 0.4s; text-transform: uppercase;
        }

        .btn-send:hover { box-shadow: 0 0 25px var(--neon-green); transform: scale(1.02); }

        .status { text-align: center; font-size: 11px; margin-top: 15px; color: var(--neon); font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="logo-main">GIBRAN_HUB</h1>
        <p class="tagline">Cloud Integrated System v13.5</p>
        <a href="#register" class="btn-scroll">MULAI REGISTRASI</a>
        
        <div style="margin-top: 20px;">
            <a href="dashboard.html" style="color: #444; text-decoration: none; font-size: 10px; font-family: Orbitron;">GO TO DASHBOARD →</a>
        </div>
    </section>

    <section id="register" class="form-section">
        <div class="card">
            <div class="card-h">USER_REGISTRATION</div>
            
            <form id="user-form">
                <label>NAMA LENGKAP</label>
                <input type="text" name="data[nama]" placeholder="Input nama user..." required>
                
                <label>NOMOR WHATSAPP</label>
                <input type="number" name="data[nomor wa]" placeholder="628xxxx" required>
                
                <label>ALAMAT</label>
                <input type="text" name="data[alamat]" placeholder="Alamat lengkap..." required>
                
                <label>PASSWORD</label>
                <input type="password" name="data[password]" placeholder="******" required>
                
                <input type="hidden" name="data[timestamp]" id="ts">

                <button type="submit" class="btn-send" id="btn-submit">SIMPAN DATA KE CLOUD</button>
            </form>
            
            <div id="msg" class="status">SYSTEM_READY</div>
        </div>
    </section>

    <script>
        const form = document.getElementById('user-form');
        const apiURL = "https://sheetdb.io/api/v1/k4t892whs0zgw";

        form.addEventListener("submit", e => {
            e.preventDefault();
            
            // Set waktu pengiriman
            document.getElementById('ts').value = new Date().toLocaleString('id-ID');
            
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('msg');
            
            btn.disabled = true;
            btn.innerText = "UPLOADING...";
            msg.innerText = "CONNECTING_TO_SHEETDB_SERVER...";

            fetch(apiURL, {
                method: "POST",
                body: new FormData(document.getElementById("user-form")),
            }).then(res => {
                if(res.ok) {
                    msg.innerText = "DATA_SAVED_SUCCESSFULLY! ✓";
                    btn.innerText = "SUBMIT_SUCCESS";
                    form.reset();
                    // Balik ke atas setelah sukses
                    setTimeout(() => { window.location.href = "#"; }, 2000);
                } else {
                    throw new Error('API Error');
                }
            })
            .catch(err => {
                msg.innerText = "TRANSMISSION_ERROR_RETRY";
                console.error(err);
            })
            .finally(() => {
                btn.disabled = false;
                setTimeout(() => { 
                    btn.innerText = "SIMPAN DATA KE CLOUD";
                    msg.innerText = "SYSTEM_READY"; 
                }, 4000);
            });
        });
    </script>
</body>
</html>
