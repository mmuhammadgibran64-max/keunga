<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GIBRAN HUB | DATABASE SYNC SUCCESS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #3ecf8e; padding: 30px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(62, 207, 142, 0.2); }
        input { width: 100%; margin-bottom: 15px; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3ecf8e; }
        button { width: 100%; padding: 15px; background: #3ecf8e; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        button:hover { background: #2eb875; }
        #status { font-size: 11px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #3ecf8e; margin-bottom: 20px;">SYSTEM REGISTRATION</h2>
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="text" id="wa" placeholder="Nomor WhatsApp">
        <input type="text" id="alamat" placeholder="Alamat">
        <input type="password" id="password" placeholder="Password">
        <button onclick="kirimData()" id="btn-submit">SIMPAN KE SUPABASE</button>
        <p id="status">STATUS: READY TO SYNC</p>
    </div>

    <script>
        // KUNCI ASLI DARI SCREENSHOT TERBARU LO
        const SUPABASE_URL = "https://pjmezagwbktbqgzwwzwt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbWV6YWd3Ymt0YnFnzwzwtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEwNDcsImV4cCI6MjA4ODI0NzA0N30.LEQ99Vi-J6zAstTzQGvczN1208a_cIfPKR-Wy3viUHk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function kirimData() {
            const btn = document.getElementById('btn-submit');
            const st = document.getElementById('status');
            
            const dataInput = {
                nama: document.getElementById('nama').value,
                wa: document.getElementById('wa').value,
                alamat: document.getElementById('alamat').value,
                password: document.getElementById('password').value
            };

            if(!dataInput.nama || !dataInput.wa) return alert("Isi data dulu!");

            btn.disabled = true;
            st.innerText = "SINKRONISASI KE CLOUD...";

            // Nama tabel 'daftar akun' sesuai dashboard lo
            const { error } = await supabaseClient
                .from('daftar akun') 
                .insert([dataInput]);

            if (error) {
                alert("GAGAL! Error: " + error.message);
                st.innerText = "ERROR: CEK KONEKSI";
                btn.disabled = false;
            } else {
                alert("MANTAP! Data Berhasil Terkirim.");
                st.innerText = "SUCCESS: DATA TERPANTAU ✓";
                btn.disabled = false;
                // Kosongkan form
                document.getElementById('nama').value = "";
                document.getElementById('wa').value = "";
                document.getElementById('alamat').value = "";
                document.getElementById('password').value = "";
            }
        }
    </script>
</body>
</html>
