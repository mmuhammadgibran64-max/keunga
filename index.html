<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>GIBRAN HUB | FINAL SYNC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #3ecf8e; width: 100%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #3ecf8e; text-align: center; font-size: 1.2rem; margin-bottom: 20px; }
        input { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #222; background: #1a1a1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3ecf8e; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2eb875; transform: translateY(-2px); }
        #status { text-align: center; font-size: 12px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h2>DATABASE SYNC</h2>
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="text" id="wa" placeholder="Nomor WhatsApp">
        <input type="text" id="alamat" placeholder="Alamat">
        <input type="password" id="password" placeholder="Password">
        <button onclick="kirimData()" id="btn-submit">KIRIM KE SUPABASE</button>
        <p id="status">Status: Ready</p>
    </div>

    <script>
        const SUPABASE_URL = "https://pjmezagwbktbqgzwwzwt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbWV6YWd3Ymt0YnFnzwzwtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEwNDcsImV4cCI6MjA4ODI0NzA0N30.LEQ99Vi-J6zAstTzQGvczN1208a_cIfPKR-Wy3viUHk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function kirimData() {
            const btn = document.getElementById('btn-submit');
            const st = document.getElementById('status');
            
            const dataInput = {
                nama: document.getElementById('nama').value,
                wa: document.getElementById('wa').value,
                alamat: document.getElementById('alamat').value,
                password: document.getElementById('password').value
            };

            // Cek kalau ada yang kosong
            if (!dataInput.nama || !dataInput.wa) {
                alert("Isi dulu bro namanya!");
                return;
            }

            btn.disabled = true;
            st.innerText = "Status: Mengirim...";

            const { data, error } = await supabaseClient
                .from('daftar_akun') 
                .insert([dataInput]);

            if (error) {
                console.error("Detail Error:", error);
                alert("ADUH GAGAL! Error: " + error.message);
                st.innerText = "Status: Gagal!";
                btn.disabled = false;
            } else {
                alert("MANTAP! Data berhasil masuk ke Supabase.");
                st.innerText = "Status: Berhasil Terkirim!";
                // Reset Form
                document.getElementById('nama').value = "";
                document.getElementById('wa').value = "";
                document.getElementById('alamat').value = "";
                document.getElementById('password').value = "";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
