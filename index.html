<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBRAN HUB | DATABASE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --neon-green: #3ecf8e; --bg: #05070a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(62, 207, 142, 0.2); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        .card-h { font-family: 'Orbitron'; color: var(--neon-green); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        label { display: block; font-size: 10px; color: var(--neon-green); font-family: 'Orbitron'; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(62,207,142,0.2); color: white; border-radius: 6px; outline: none; }
        .btn-send { background: var(--neon-green); color: black; border: none; padding: 15px; font-family: 'Orbitron'; font-size: 12px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 6px; margin-top: 10px; }
        .status { font-size: 10px; margin-top: 15px; color: var(--neon-green); font-family: 'Orbitron'; }
        .toggle-pass { position: absolute; right: 10px; top: 32px; cursor: pointer; font-size: 10px; color: var(--neon-green); }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-h">SUPABASE_REGISTRATION</div>
        <form id="user-form">
            <div class="input-group">
                <label>NAMA LENGKAP</label>
                <input type="text" id="nama" placeholder="Masukkan Nama" required>
            </div>
            <div class="input-group">
                <label>NOMOR WHATSAPP</label>
                <input type="text" id="wa" placeholder="628xxxxxxxx" required>
            </div>
            <div class="input-group">
                <label>ALAMAT</label>
                <input type="text" id="alamat" placeholder="Alamat Domisili" required>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="******" required>
                <span class="toggle-pass" onclick="togglePassword()">SHOW</span>
            </div>
            <button type="submit" class="btn-send" id="btn-submit">SIMPAN KE SUPABASE</button>
        </form>
        <div id="msg" class="status">READY_TO_SYNC</div>
    </div>

    <script>
        const SUPABASE_URL = "https://pjmezagwbktbqgzwwzwt.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbWV6YWd3Ymt0YnFnzwzwtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NzEwNDcsImV4cCI6MjA4ODI0NzA0N30.LEQ99Vi-J6zAstTzQGvczN1208a_cIfPKR-Wy3viUHk";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === "password" ? "text" : "password";
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('msg');

            btn.disabled = true;
            btn.innerText = "SINKRONISASI...";

            // PERHATIKAN: Nama tabel menggunakan spasi sesuai database kamu
            const { error } = await supabaseClient
                .from('daftar akun') 
                .insert([{ 
                    nama: document.getElementById('nama').value, 
                    wa: document.getElementById('wa').value, 
                    alamat: document.getElementById('alamat').value, 
                    password: document.getElementById('password').value 
                }]);

            if (error) {
                msg.innerText = "GAGAL: " + error.message;
                btn.disabled = false;
                btn.innerText = "COBA LAGI";
            } else {
                msg.innerText = "DATA BERHASIL TERSIMPAN! ✓";
                btn.innerText = "SUCCESS";
                document.getElementById('user-form').reset();
            }
        });
    </script>
</body>
</html>
